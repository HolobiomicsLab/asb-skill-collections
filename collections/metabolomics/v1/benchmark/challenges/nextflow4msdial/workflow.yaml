narrative:
  tagline: Nextflow4MS-DIAL is a reproducible Nextflow workflow for processing LC-HRMS
    metabolomics data through a containerized MS-DIAL to MSFLO pipeline, with support
    for Docker and Singularity container backends.
  pseudo_abstract: 'The Nextflow4MS-DIAL workflow implements a containerized sequential
    pipeline that processes .mzML LC-MS metabolomics data through MS-DIAL followed
    by MSFLO. The workflow is designed to support multiple container execution mechanisms:
    Docker-based container execution for standard environments and Singularity-based
    container execution for high-performance computing environments. This containerized
    approach enables reproducible metabolomics data processing across different computational
    infrastructures.'
  research_questions:
  - What is the sequential pipeline architecture of the containerized MS-DIAL to MSFLO
    workflow, and how does it process .mzML input files within Nextflow?
  - Does the Nextflow4MS-DIAL workflow execute successfully using Docker containerization
    on publicly available .mzML LC-MS metabolomics data?
  - Does the Nextflow4MS-DIAL workflow successfully execute on a Singularity container
    backend with public LC-MS .mzML data?
  methods_summary: "Select containerization backend (Docker or Singularity) based\
    \ on target compute environment. Load and validate .mzML input files in Nextflow\
    \ execution context. Execute MS-DIAL in containerized environment to detect peaks\
    \ and identify features. Stream MS-DIAL outputs into MSFLO module running in same\
    \ container orchestration. Collect and export final MSFLO processed feature table\
    \ and annotation artifacts. Validation: Verify MSFLO output files exist and contain\
    \ expected feature annotations. Verify Nextflow \u226522.10.0 installation and\
    \ clone the Nextflow4MS-DIAL repository Obtain a public .mzML LC-MS metabolomics\
    \ dataset and configure workflow input parameters Enable Docker container backend\
    \ and configure containerized MS-DIAL and MSFLO environment Execute the Nextflow\
    \ workflow pipeline, processing .mzML data through MS-DIAL feature detection and\
    \ alignment, then MSFLO post-processing Monitor execution logs and validate that\
    \ workflow completes without error and produces expected output files (feature\
    \ tables, aligned matrices, annotations) Validation: Nextflow exits with status\
    \ code 0, all pipeline stages report completion, and output directory contains\
    \ non-empty feature table and annotation files matching expected schema Clone\
    \ the Nextflow4MS-DIAL repository from the public GitHub source. Verify Nextflow\
    \ \u226522.10.0 installation and Singularity container runtime availability. Obtain\
    \ or select a public .mzML LC-MS metabolomics dataset from a public repository\
    \ (MetaboLights, MassIVE, PRIDE). Configure Nextflow workflow profile to use Singularity\
    \ as the container executor backend. Execute the MS-DIAL \u2192 MSFLO containerized\
    \ processing pipeline on the input .mzML data via nextflow run. Validation: Confirm\
    \ workflow completion via execution report, verify presence of MS-DIAL feature\
    \ tables and MSFLO output files, and check that no fatal errors or task failures\
    \ are reported in the Nextflow log."
  domain: metabolomics
