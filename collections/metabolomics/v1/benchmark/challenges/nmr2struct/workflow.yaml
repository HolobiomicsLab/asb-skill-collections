  claims:
  - claim_text: Rapid determination of molecular structures can greatly accelerate
      workflows across many chemical disciplines.
    claim_type: finding
    speculative: false
  - claim_text: Elucidating structure using only one-dimensional NMR spectra remains
      an extremely challenging problem because of the combinatorial explosion of the
      number of possible molecules as the number of constituent atoms is increased.
    claim_type: finding
    speculative: false
  - claim_text: "A multitask machine learning framework can predict molecular structure\
      \ (formula and connectivity) from 1D \xB9H and/or \xB9\xB3C NMR spectra."
    claim_type: finding
    speculative: false
    entity_id: MultitaskLearningFramework
  - claim_text: A transformer architecture can be constructed to efficiently solve
      the task of assembling large numbers of molecular fragments into molecular structures.
    claim_type: finding
    speculative: false
  - claim_text: The framework demonstrates effectiveness on molecules with up to 19
      heavy (non-hydrogen) atoms.
    claim_type: finding
    speculative: false
  - claim_text: For molecules with up to 19 heavy atoms, there are trillions of possible
      structures.
    claim_type: finding
    speculative: true
  speculative: false
