narrative:
  tagline: A web application platform for storing and sharing paired omics data that
    links mass spectrometry spectra with genomic information and experimental metadata
    through a JSON schema-based format.
  pseudo_abstract: 'Reproduces 2 reported results: A JSON schema file located at app/public/schema.json
    defines the required format for paired omics data projects in the platform. A
    JSON schema (app/public/schema.json) has been published to formally describe the
    required format of paired omics data projects stored in the platform. Reconstructs
    2 described mechanisms (described in the paper but not separately evaluated there):
    The platform links MS/MS mass spectra with genome identifiers and other metadata,
    enabling integration of genomic information with mass spectrometry data within
    stored project JSON documents. The platform stores paired omics data projects
    using a JSON schema format (app/public/schema.json) that defines project structure,
    which serves as the basis for implementing field-level validation rules including
    URL format constraints.'
  research_questions:
  - What is the formal specification for the structure and constraints that uploaded
    JSON project documents must satisfy in the Pairing Omics Data Platform?
  - How does the paired-data-form platform enrich a project JSON document by linking
    a genome identifier to organism name information from an external registry?
  - Do all project JSON documents currently deposited in the Paired Omics Data Platform
    conform to the published JSON Schema specification?
  - How should the validation system detect and flag URL fields in project JSON documents
    that contain whitespace characters, which are invalid in URLs?
  methods_summary: 'Load the candidate JSON project document from the upload endpoint.
    Load the JSON Schema definition from app/public/schema.json. Apply JSON Schema
    validation using a conformant validator library. Collect and report validation
    status (pass/fail) and enumerate any schema constraint violations. Validation:
    the task is successful when the validation report correctly identifies all schema
    violations or confirms full conformance against the published schema. Load the
    input project JSON document and extract the genome identifier field. Query an
    external organism/genome registry using the extracted identifier to retrieve the
    standardized organism name. Merge the retrieved organism name into the project
    JSON document as a new or updated field. Serialize and validate the enriched JSON
    document for well-formedness and required field presence. Validation: Verify that
    the enriched JSON is well-formed, contains the original genome identifier, and
    has a non-empty organism name field populated from the registry. Retrieve the
    complete set of published project JSON documents from the Paired Omics Data Platform.
    Load the canonical JSON Schema from app/public/schema.json in the iomega/paired-data-form
    repository. Validate each project JSON document against the schema, recording
    conformance status and any violations. Generate a structured validation report
    listing project identifiers and validation outcomes. Validation: All retrieved
    project documents must conform to the published schema with zero schema validation
    errors. Load and parse the project JSON document. Identify all fields with URL
    type designation in the document schema. Scan each URL field for the presence
    of whitespace characters (spaces, tabs, newlines, etc.). Record and report all
    URLs containing whitespace with their field locations. Validation: accept output
    if all URL fields in the document have been scanned and all whitespace-containing
    URLs are flagged.'
