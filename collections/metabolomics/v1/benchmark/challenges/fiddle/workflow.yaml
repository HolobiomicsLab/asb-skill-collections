narrative:
  tagline: FIDDLE is a deep learning method for predicting molecular formulas from
    MS/MS spectra. This repository provides the full research codebase for model training,
    evaluation, and paper reproduction.
  pseudo_abstract: 'Reproduces 3 reported results: The provided document does not
    contain explicit reporting of dataset split counts (28,751 training and 3,195
    test compounds) or details of the instrument allowlist fix methodology needed
    to verify this sub-task. The rescore model has been redesigned with a Siamese
    architecture in version 2.0.0, indicating a structural change to the model components
    that would affect encoder freezing and training behavior. The rescore model in
    FIDDLE v2.0.0 has been redesigned with a Siamese architecture, which is the operative
    inference architecture for the test. Reconstructs 2 described mechanisms (described
    in the paper but not separately evaluated there): The document does not provide
    explicit details about the prepare_augment_rescore.py script''s operations, data
    augmentation procedures, or rescore training data generation mechanisms within
    the available text. The FIDDLE repository contains code for model training, evaluation,
    and paper reproduction, with full research codebase available for inspection of
    preprocessing steps including spectrum handling.'
  research_questions:
  - Does applying the updated instrument allowlist fix (adding 'ftms' to gnps_orbitrap)
    to the dataset result in the reported training and test split counts of 28,751
    and 3,195 compounds respectively?
  - What data preparation operations does the prepare_augment_rescore.py script apply
    to TCN train and test sets before rescore model training?
  - Does the rescore model training script freeze the TCN spectrum encoder and train
    only the FormulaEncoder and RescoreHead components?
  - Does the FIDDLE v2.0.0 model with its redesigned Siamese rescore architecture
    successfully complete inference on GNPS caffeine spectra and produce scored molecular
    formula candidates?
  - Is the precursor m/z value (env[:, 0]) consistently zeroed before spectrum encoding
    across the three main execution scripts in the FIDDLE codebase?
  methods_summary: 'Load raw GNPS spectral dataset with instrument metadata annotations.
    Update instrument allowlist configuration by adding ''ftms'' to gnps_orbitrap
    category. Apply filtering logic to select compounds matching the updated allowlist.
    Execute train-test split using msfiddle preprocessing module with the corrected
    configuration. Extract training set size (target: 28,751) and test set size (target:
    3,195) from split output. Validation: Verify training count equals 28,751 and
    test count equals 3,195 exactly; output passes if both counts match reported baseline.
    Load TCN train and test spectra with formula annotations. Cap the number of positive
    examples per molecular formula to enforce balance. Generate negative examples
    by pairing spectra within a precursor m/z window. Downsample combined positive
    and negative examples to 1:1 ratio. Validation: Output train and test sets conform
    to expected format and contain correct positive/negative counts and ratio. Load
    and freeze pre-trained TCN spectrum encoder to preserve learned spectral feature
    representations Initialize trainable FormulaEncoder and RescoreHead modules Train
    encoder and head modules using binary cross-entropy loss on annotated MS/MS spectra
    Monitor formula_acc (with H) on validation set after each epoch Save checkpoint
    only when validation formula_acc improves; serialize formula_encoder_state_dict
    and rescore_head_state_dict Validation: checkpoint is accepted when formula_acc
    (with H) on validation set reaches or exceeds reported baseline performance threshold
    Load the trained FIDDLE v2.0.0 model checkpoint from the zenodo deposit. Retrieve
    caffeine (C8H10N4O2) MS/MS spectra from the GNPS public library. Execute test_caffeine.py
    via the msfiddle Python API to perform inference on the spectra. Apply the Siamese
    rescore architecture to rank molecular formula candidates by prediction score.
    Validation: Output file exists, is a valid CSV or JSON, contains at least one
    scored formula candidate row, and inference script exits without error. Retrieve
    the three Python execution scripts (run_fiddle.py, train_rescore.py, test_caffeine.py)
    from the FIDDLE repository. Locate the preprocessing block in each script where
    the spectrum feature array (env) is prepared before TCN encoder input. Extract
    and document the exact code line(s) that set env[:, 0] to zero, including surrounding
    context and parameter names. Compare the implementation across all three scripts
    to verify that the zeroing operation is identical in index, operation type, and
    timing. Validation: Confirm that all three scripts implement env[:, 0] = 0 (or
    equivalent) consistently before TCN encoder invocation; report pass if all three
    match, fail if any divergence is found.'
  domain: metabolomics
  techniques:
