narrative:
  tagline: mineMS2 couples frequent fragmentation pattern mining with GNPS molecular
    networks to identify and interpret m/z difference patterns that explain network
    components in MS/MS spectral libraries.
  pseudo_abstract: The mineMS2 package enables discovery of frequent patterns in MS/MS
    spectra by mining fragmentation graphs, where each pattern is a graph of ion peaks
    connected by m/z differences. When applied to the Penicillium nordicum dataset
    (51 MS/MS spectra), the workflow extracted nine network components from a precomputed
    GNPS molecular network and identified explaining patterns for each component using
    precision, recall, and F1-score metrics. For component 8 (a high-similarity pair
    with precursor m/z 370.1283 and 404.0891), pattern P70 achieved an F1-score of
    1, meaning it explained all component spectra without explaining any spectra outside
    the component, while other top-5 candidate patterns maintained recall of 1 but
    showed lower precision. The method identified that 19 of 21 spectra in the largest
    component shared an m/z difference of 99.0683 (consistent with valine loss in
    tetrapeptides), and discovered that an m/z difference of 186.079 (possibly tryptophan
    loss) appeared across seven spectra not all directly linked in the molecular network,
    revealing new similarities independent of network thresholds.
  research_questions:
  - When findPatternsExplainingComponents is applied to component 8 (a high-similarity
    pair of spectra with precursor m/z values 370.1283 and 404.0891) using recall-precision-size
    metrics and top=5, does pattern P70 achieve perfect F1-score while other top-5
    patterns maintain recall=1 but exhibit lower precision?
  methods_summary: "Load pre-processed Penicillium nordicum ms2Lib object with discretized\
    \ m/z differences and extracted closed subgraph patterns. Load GNPS molecular\
    \ network as igraph object and extract connected components, cliques, and high-similarity\
    \ node pairs. Execute findPatternsExplainingComponents algorithm with metric=c('recall','precision','size')\
    \ and top=5 to rank patterns by their explanatory power. Compute F1-scores for\
    \ each pattern\u2013component pair as the harmonic mean of recall and precision.\
    \ Extract and tabulate results for component 8 (m/z 370.1283 and 404.0891), verifying\
    \ P70 achieves F1=1.0 and all competing top-5 patterns have recall=1.0 but lower\
    \ precision. Validation: Output must contain verifiable metric values showing\
    \ P70 with F1-score=1.0 and all other top-5 patterns with recall=1.0 and 0<precision<1.0\
    \ for component 8."
  domain: metabolomics
  techniques:
  - database-annotation
  - dereplication
  - molecular-networking
  - spectral-library-matching
  - substructure-mining
  - tandem-ms
