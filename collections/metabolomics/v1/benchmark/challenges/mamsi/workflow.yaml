    speculative: false
    entity_id: MamsiPls_component
  - claim_text: MamsiPls is based on the MB-PLS package by Baum et al., 2019.
    claim_type: finding
    speculative: false
    entity_id: MamsiPls_component
  - claim_text: The default number of latent variables (LV) for MamsiPls is 2.
    claim_type: finding
    speculative: false
    entity_id: MamsiPls_component
  - claim_text: The default method used to derive model attributes in MamsiPls is
