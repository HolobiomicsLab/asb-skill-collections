  claims:
  - claim_text: MAMSI is a Python framework designed for the integration of multi-assay
      mass spectrometry datasets.
    claim_type: finding
    speculative: false
    entity_id: MAMSI_system
  - claim_text: MAMSI provides a platform for linking statistically significant features
      of untargeted multi-assay LC-MS metabolomics datasets into clusters defined
      by their structural properties based on mass-to-charge ratio and retention time.
    claim_type: finding
    speculative: false
    entity_id: MAMSI_system
  - claim_text: The MAMSI framework was tested on metabolomics phenotyping data but
      should be usable with other types of LC-MS data.
    claim_type: finding
    speculative: false
    entity_id: MAMSI_system
  - claim_text: MamsiPls is a class that extends the MB_PLS class by extra methods
      convenient in Chemometrics and Metabolomics research.
