  task_openness: mixed
  method_alternatives:
  - UNIPALS, SIMPLS, KERNEL methods as alternatives to NIPALS
  - k-fold cross-validation or Monte Carlo cross-validation for LV estimation
  - constant threshold or silhouette score for flattening correlation clusters
  - different linkage methods for hierarchical clustering
  - different norm orders for NIPALS convergence calculation
  substitution_constraints:
  - sparse_data parameter must be True to accept sparse data with NIPALS algorithm
  - full_svd should be set to False when using very large quadratic matrices
  - annotate parameter only works for data analyzed by National Phenome Centre
  - fname parameter required when savefig=True for saving plots
  - linkage_method weighted and centroid only available for constant flattening method
instructions: Reproduce the 5-step workflow below. Honor each step's IO contract;
  produce the files listed under 'Final expected outputs'.
expected_final_outputs:
- path: Interactive HTML network visualization file generated by pyvis.network with
    nodes colored by correlation cluster, edges weighted by link type, and optional
    labels
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: NetworkX graph object with nodes (features) and weighted edges (structural
    and correlation links) that can be saved, exported, or imported into Cytoscape
    for manual curation
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Structural cluster results table containing cluster ID, cluster size, member
    features, isotopologue group, adduct group, and cross-assay link status for 'all
    adducts' mode
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Structural cluster results table for 'most-common adducts' mode with identical
    columns as 'all adducts' mode output
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Comparative summary table with rows for each adduct mode, columns: Total
    Clusters, Mean Cluster Size, Median Cluster Size, Max Cluster Size, Feature Coverage
    (%)'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Cluster assignment table (CSV) with columns: feature_id, constant_threshold_cluster,
    silhouette_cluster, assignment_change (boolean)'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Silhouette score plot (PNG) showing silhouette coefficient as a function of
    cluster count, with optimal k marked
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Cluster cardinality comparison table (CSV) with columns: method, num_clusters,
    cluster_id, num_features, mean_silhouette_coeff'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Agreement metrics summary (TXT or JSON) reporting adjusted Rand index and
    normalized mutual information between constant-threshold and silhouette solutions
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
