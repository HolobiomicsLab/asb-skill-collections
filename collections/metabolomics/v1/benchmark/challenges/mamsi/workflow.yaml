narrative:
  tagline: MAMSI is a Python framework for integrating multi-assay LC-MS metabolomics
    datasets and identifying statistically significant features through multi-block
    partial least squares (MB-PLS) analysis coupled with structural clustering based
    on mass-to-charge ratio and retention time.
  pseudo_abstract: MAMSI provides tools for analyzing untargeted multi-assay LC-MS
    metabolomics datasets through multi-block PLS discriminant analysis to identify
    statistically significant predictive features. The framework implements multi-block
    variable importance in projection (MB-VIP) with permutation testing to derive
    empirical p-values for feature ranking. Significant features are then organized
    into structural clusters using retention time windows and mass-to-charge ratio
    tolerances; the clustering mechanism searches for isotopologue signatures (mass
    differences of 1.00335 Da), common adduct signatures via hypothetical neutral
    mass matching, and cross-assay links. The structural relationships between features
    can be visualized as a network graph and exported as a NetworkX object for interactive
    analysis in Cytoscape. The framework was tested and demonstrated on metabolomics
    phenotyping data from the AddNeuroMed cohort but is designed for general applicability
    to LC-MS datasets.
  research_questions:
  - What are the model performance metrics and statistically significant metabolomic
    features identified when applying the full MAMSI pipeline (MB-PLS model fitting,
    MB-VIP feature selection, and cross-validation) to multi-assay LC-MS metabolomics
    datasets?
  - How does the MamsiStructSearch module group statistically significant LC-MS features
    into structural clusters using mass-to-charge ratio and retention time information?
  - How does MAMSI convert structural cluster assignments into an interactive network
    graph representation suitable for visualization and analysis?
  - How do structural cluster outputs (cluster count and size distribution) differ
    between using all adducts versus only the most-common adducts in the MAMSI framework's
    adduct signature search?
  - Does the silhouette flattening method produce different structural cluster assignments
    compared to the default constant-threshold method in the MAMSI structural clustering
    pipeline?
  methods_summary: "Load multi-assay LC-MS intensity data (HPOS, LPOS, LNEG) and clinical\
    \ outcome variable; apply assay-specific column name prefixes for downstream traceability.\
    \ Partition data into training (90%) and test (10%) sets using stratified random\
    \ split, maintaining block alignment. Fit multiblock PLS discriminant model on\
    \ training data using NIPALS algorithm with unit-variance standardization; compute\
    \ super-scores, block loadings, and regression coefficients. Estimate optimal\
    \ latent variable count via k-fold cross-validation (k=5) using AUC metric; identify\
    \ plateau at lowest LV count with stable validation performance. Evaluate final\
    \ model on held-out test set; record classification metrics (accuracy, recall,\
    \ specificity, F1-score, AUC) and confusion matrix. Calculate Multi-Block Variable\
    \ Importance in Projection (MB-VIP) scores summarizing feature importance across\
    \ all latent variables weighted by variance explained. Perform empirical permutation\
    \ testing (n\u226510,000 permutations) by repeated Y-shuffling and model refitting;\
    \ compute empirical p-values as proportion of null VIP scores exceeding observed.\
    \ Filter features at p<0.01 significance threshold and export ranked feature importance\
    \ table with MB-VIP scores and empirical p-values. Validation: confirmed output\
    \ table row count, column names, and p-value range [0, 1]. References: source\
    \ article (DOI: 10.1371/journal.pcbi.1011814) Extract m/z, RT, and assay identity\
    \ from LC-MS feature column names. Partition features into retention-time windows\
    \ and search each window for isotopologue mass differences (1.00335 Da). Calculate\
    \ hypothetical neutral masses for each feature under common ESI adducts and group\
    \ features with matching neutral masses within ppm tolerance. Merge overlapping\
    \ isotopologue and adduct clusters into unified structural clusters. Perform hierarchical\
    \ correlation clustering using Pearson/Spearman correlation and flatten via constant\
    \ threshold or silhouette-score optimization. Assign each feature a structural\
    \ cluster ID, adduct group, isotopologue pattern label, and correlation cluster\
    \ ID; optionally annotate with compound name. Validation: structural clusters\
    \ must contain \u22652 co-eluting features per isotopologue or adduct group; silhouette\
    \ score \u22650.20 indicates acceptable cluster separation; cross-assay links\
    \ validated by neutral-mass match within ppm tolerance. References: source article\
    \ (DOI: 10.1371/journal.pcbi.1011814) Extract structural and correlation cluster\
    \ assignments from upstream MamsiStructSearch outputs (isotopologue groups, adduct\
    \ groups, cross-assay links, correlation cluster labels). Instantiate NetworkX\
    \ graph and populate nodes with feature identifiers and node attributes (assay,\
    \ m/z, RT, cluster memberships, optional compound annotations). Encode structural\
    \ relationships as weighted edges: isotopologue links (weight=1), adduct links\
    \ (weight=5), cross-assay links (weight=10), correlation co-membership (weight=15).\
    \ Optionally filter to linked features only or include all features based on include_all\
    \ parameter. Render interactive pyvis.network visualization with spring layout,\
    \ node coloring by correlation cluster, and edge thickness scaled by link weight;\
    \ save to HTML file. Validation: verify NetworkX object contains correct node\
    \ count, edge count, and edge weight distribution matching structural cluster\
    \ topology; confirm HTML renders without JavaScript errors and interactive features\
    \ (pan, zoom, node drag) are functional. References: source article (DOI: 10.1371/journal.pcbi.1011814)\
    \ Load LC-MS feature intensity data with retention time and m/z metadata into\
    \ MamsiStructSearch. Execute structural clustering with 'all adducts' mode: identify\
    \ isotopologues (1.00335 Da threshold), detect adduct patterns (15 ppm tolerance),\
    \ merge overlapping clusters. Compute cluster statistics for 'all adducts': total\
    \ count, size distribution (mean, median, max), feature coverage percentage. Repeat\
    \ clustering and statistics with 'most-common adducts' mode. Compare outputs:\
    \ tabulate cluster counts, sizes, and coverage; compute absolute and percentage\
    \ differences between modes. Validation: verify that both modes produce cluster\
    \ assignments for \u226580% of input features; confirm cluster count and size\
    \ statistics are computed correctly by manual spot-check on a subset of clusters.\
    \ References: source article (DOI: 10.1371/journal.pcbi.1011814) Load the correlation\
    \ matrix and hierarchical linkage tree from a prior constant-threshold clustering\
    \ run (cut_threshold=0.7, linkage_method='complete', metric='euclidean'). Re-flatten\
    \ the dendrogram using silhouette-score optimization (flat_method='silhouette',\
    \ max_clusters=11) to identify the cluster count that maximizes mean silhouette\
    \ coefficient. Extract cluster labels for all features under both flattening strategies\
    \ and align them in a comparison table. Compute inter-solution agreement metrics\
    \ (adjusted Rand index, normalized mutual information) to quantify the degree\
    \ of concordance between constant-threshold and silhouette-based cluster assignments.\
    \ Validation: silhouette plot exhibits a clear maximum silhouette coefficient\
    \ at an intermediate cluster count (reported as 8 in the reference materials);\
    \ cluster comparison table shows \u226570% of features reassigned to different\
    \ clusters when switching methods, confirming substantive methodological impact.\
    \ References: source article (DOI: 10.1371/journal.pcbi.1011814)"
