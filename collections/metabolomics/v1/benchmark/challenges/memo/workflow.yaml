narrative:
  tagline: MEMO is a retention-time agnostic method for aligning metabolomics samples
    using MS2 fragmentation spectra. It generates MS2 fingerprints by counting peak
    occurrences and neutral losses, enabling sample comparison through alignment and
    visualization.
  pseudo_abstract: 'Reproduces 3 reported results: MEMO generates MS2 fingerprints
    by counting the occurrence of MS2 peaks and neutral losses in each sample, which
    are then aligned to compare different samples. MEMO generates MS2 fingerprints
    by counting the occurrence of MS2 peaks and neutral losses in each sample, which
    serve as the basis for sample comparison and alignment. MEMO enables alignment
    of MS2 fingerprints generated from separate samples to compare them in a second
    stage. Reconstructs 2 described mechanisms (described in the paper but not separately
    evaluated there): MS2 fingerprints are generated by counting the occurrence of
    MS2 peaks and neutral losses (relative to the precursor ion) in each sample, producing
    a numeric fingerprint representation. MEMO applies MDS/PCoA visualization techniques
    to aligned MS2 fingerprints to generate low-dimensional embeddings that enable
    visual comparison of different samples.'
  research_questions:
  - How are MS2 peaks and neutral losses counted and aggregated from a set of MS2
    spectra to produce a per-sample MS2 fingerprint vector?
  - Does the memo_from_unaligned component correctly generate a MemoMatrix object
    with the expected structure and content when applied to unaligned MS2 spectra
    files?
  - Does the memo_from_aligned component correctly generate a MemoMatrix with the
    expected structure and content when applied to aligned feature tables with associated
    MS2 spectra?
  - What is the output format and structure when two separately generated MemoMatrix
    objects are merged using the merged_memo() function?
  - How do MDS or PCoA visualization techniques operate on MS2 fingerprint data to
    produce low-dimensional sample comparison plots?
  methods_summary: 'Parse MS2 spectra files using matchms to extract precursor m/z
    and fragment peaks. Count occurrences of all detected m/z peaks within each sample
    across all constituent spectra. Calculate neutral losses by subtracting fragment
    m/z from precursor m/z for each peak. Count occurrences of all unique neutral
    losses within each sample. Aggregate and combine peak and neutral loss counts
    into a single numeric fingerprint vector per sample using spec2vec document representation.
    Validation: fingerprint vectors must have non-zero counts for peaks and losses
    present in the sample and dimensionality consistent with the union of all observed
    peaks and losses across the sample set. Load and parse unaligned MS2 spectra files
    using matchms to extract fragmentation peaks and precursor masses. Count occurrences
    of MS2 peaks and neutral losses (mass differences to precursor) within each sample
    to construct MS2 fingerprints. Invoke memo_from_unaligned to align fingerprints
    across samples and generate the MemoMatrix object. Validate matrix structure:
    verify sample-by-feature dimensionality, presence of metadata attributes, and
    consistency with unit test expectations. Validation: confirm MemoMatrix object
    is correctly instantiated with non-empty feature counts and sample labels matching
    input file names or identifiers. Load and parse aligned feature table(s) and associated
    MS2 spectra data using matchms-compatible formats. Extract MS2 peaks and neutral
    losses from spectra and count their occurrence per sample. Generate MemoMatrix
    by organizing occurrence counts into a features-by-samples 2D matrix. Validate
    matrix structure (dimensions, data types, feature/sample identifiers) against
    schema and unit test expectations. Validation: Confirm MemoMatrix dimensions match
    input sample and feature cardinality, all entries are non-negative integers, and
    row/column labels are preserved and match reference outputs from memo_publication_examples.
    Load first MemoMatrix object from input file or object store Load second MemoMatrix
    object from input file or object store Invoke merged_memo() function to combine
    both matrices into unified structure with all features from both inputs Validate
    merged output contains all expected columns and correct dimensionality Export
    merged MemoMatrix to serialized file format (pickle or equivalent) Load the MemoMatrix
    containing sample-level MS2 fingerprint vectors or counts Compute pairwise distances
    between samples using an appropriate metric (cosine, Euclidean, or Jaccard) Apply
    MDS or PCoA to embed the high-dimensional distance matrix into 2D coordinates
    Generate a 2D scatter plot with samples colored or labeled by experimental group
    or sample type Validation: Verify that the embedding preserves expected sample
    clustering patterns and is interpretable relative to sample metadata or treatment
    groups'
  domain: bioinformatics
  techniques:
  - machine-learning
  - dimensionality-reduction
  - clustering
  - spectral-library-matching
