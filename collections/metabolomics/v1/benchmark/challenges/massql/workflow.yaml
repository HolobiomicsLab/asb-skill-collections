narrative:
  tagline: MassQL is a domain-specific query language designed for mass spectrometry
    data, inspired by SQL but incorporating mass spectrometry-centric assumptions
    to enable natural and precise querying across spectra and repositories.
  pseudo_abstract: 'MassQL implements a query language for mass spectrometry following
    four core design principles: Expressiveness to capture complex mass spectrometry
    patterns, Precision to exactly prescribe data discovery without ambiguity, Scalability
    to query from individual spectra to entire repositories, and Relatively Natural
    readability and writeability for mass spectrometry users. The package includes
    automated testing infrastructure comprising a unit test suite and a periodic package-testing
    workflow, both of which execute successfully as indicated by their associated
    CI badges in the project repository.'
  research_questions:
  - How does the Mass Spec Query Language parser convert MassQL query strings into
    structured representations while satisfying the design principles of expressiveness,
    precision, scalability, and natural language readability?
  - Does the MassQL repository's unit test suite pass successfully when executed via
    the test-unit.yml CI workflow?
  - Does the MassQL package pass its periodic integration test suite as indicated
    by the test-package.yml CI workflow?
  methods_summary: 'Define MassQL grammar extending SQL with MS-specific constructs
    aligned to four design principles (Expressiveness, Precision, Scalability, Natural
    Language). Implement lexer to tokenize MassQL query strings into recognized tokens
    (SQL keywords, MS operators, literals). Implement parser (recursive descent or
    LALR) to construct an Abstract Syntax Tree from token stream. Validate AST against
    design principles: confirm unambiguous MS pattern expression, support for single-spectrum
    to repository-scale queries, and human readability. Validation: Parser successfully
    parses conformant MassQL queries without ambiguity and rejects non-conformant
    input with diagnostic error messages; validation report confirms alignment with
    all four design principles. Clone the MassQL repository from GitHub Install all
    required dependencies and runtime environment Execute the unit test suite via
    test-unit.yml CI workflow Collect and structure test results (pass/fail counts,
    logs, error details) Validation: All tests pass and badge state matches the reported
    passing condition Retrieve the published MassQL source code from the mwang87/MassQueryLanguage
    GitHub repository. Parse the test-package.yml CI workflow file to identify integration
    test targets, commands, and acceptance criteria. Execute the integration test
    suite in a clean environment matching the CI specification. Capture structured
    test results (pass/fail status, execution time, error messages) for each test
    case. Validation: All tests specified in test-package.yml pass without error,
    and the structured report documents 100% completion of the test matrix.'
  domain: bioinformatics
  techniques:
  - natural-language-processing
