    claim_type: finding
    speculative: false
    entity_id: massql_system
  - claim_text: MassQL is designed to be scalable for querying from one spectrum to
      entire repositories of data.
    claim_type: finding
    speculative: false
    entity_id: massql_system
  - claim_text: MassQL is designed to be relatively natural and easy to read and write
