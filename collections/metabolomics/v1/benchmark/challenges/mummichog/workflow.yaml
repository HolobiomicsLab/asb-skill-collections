narrative:
  tagline: Mummichog is a Python program for analyzing high-throughput untargeted
    metabolomics data by leveraging metabolic network organization to predict functional
    activity directly from feature tables, bypassing the need for metabolite identification.
  pseudo_abstract: This work describes Mummichog's metabolic network-based feature-table
    analysis pipeline as a mechanism for functional activity prediction without explicit
    metabolite identification. The project has been relocated to the metabolomics-cloud
    GitHub organization; however, the provided documentation does not contain verification
    that the relocated package installs and runs correctly from its new location.
  research_questions:
  - How does Mummichog 3 accept untargeted metabolomics feature tables as input and
    predict functional activity by mapping features onto metabolic networks without
    requiring metabolite identification?
  - Has the Mummichog 3 codebase been successfully relocated to the metabolomics-cloud
    GitHub organization and verified to install and function correctly in its new
    location?
  methods_summary: 'Load feature table with m/z, retention time, and sample intensity
    data. Initialize metabolic network database and retrieve network structure (nodes
    = metabolites, edges = reactions). Map feature m/z values to metabolic network
    nodes using mass-to-charge tolerance matching. Propagate feature signal intensity
    through connected network pathways to infer metabolic module activity. Aggregate
    network-level activity signals and generate functional predictions without explicit
    metabolite identification. Validation: Confirm functional activity predictions
    are generated and network mapping statistics show connectivity across multiple
    metabolic modules. Audit current Mummichog 3 structure and dependencies against
    metabolomics-cloud standards. Adapt package metadata, module structure, documentation,
    and CI/CD workflows to conform to organization conventions. Create and populate
    migrated repository at metabolomics-cloud/mummichog with updated codebase. Verify
    installation from clean environment using pip install. Execute functional prediction
    workflows on test metabolomics data to confirm runtime correctness. Validation:
    Installation completes without errors, all unit and integration tests pass, and
    functional prediction output on test data matches expected metabolic network-based
    predictions.'
  domain: metabolomics
  techniques:
