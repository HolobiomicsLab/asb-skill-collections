narrative:
  tagline: DeepION is a deep learning model that learns low-dimensional representations
    of ion images for mass spectrometry imaging through contrastive learning, with
    specialized augmentation strategies for co-localized ions (COL mode) and isotope
    ions (ISO mode).
  pseudo_abstract: 'DeepION comprises four modules for processing ion images in mass
    spectrometry imaging. The Data Augmentation module applies mode-specific transformations:
    COL mode uses color jitter, filtering, Poisson noise, and random missing value,
    while ISO mode adds an intensity-dependent missing value process. Two augmented
    images from the same source are propagated through a pair of parameter-shared
    ResNet18-based encoders to produce 512-dimensional representation vectors. The
    Projection and Prediction modules then process these vectors to avoid solution
    collapse while optimizing for maximum similarity between augmentations of the
    same ion image through contrastive loss.'
  research_questions:
  - What are the specific augmentation operations applied in the COL and ISO modes
    of the DeepION data augmentation pipeline T, and how do they differ?
  - How does the Encoder module in DeepION process two augmented ion images through
    shared-weight ResNet18 encoders to produce 512-dimensional representation vectors?
  - How do the Projection and Prediction modules operate on 512-dimensional encoder
    outputs to prevent representation collapse during contrastive learning of ion
    images?
  methods_summary: "Load the original ion image as input Apply COL mode augmentation\
    \ sequence: color jitter \u2192 filtering \u2192 Poisson noise \u2192 random missing\
    \ value, producing two independent augmented samples Apply ISO mode augmentation\
    \ sequence: execute all COL mode operations, then apply intensity-dependent missing\
    \ value targeting high or low intensity pixels, producing two independent augmented\
    \ samples Validation: verify that each mode produces exactly two augmented images\
    \ with no pixel value clipping or NaN artifacts; confirm intensity-dependent missing\
    \ value in ISO mode correlates with input intensity distribution Define ResNet18\
    \ architecture with input compatibility for ion images and 512-dimensional output\
    \ layer Instantiate shared-weight encoder module using single ResNet18 instance\
    \ for both augmented images Configure parameter sharing constraints to ensure\
    \ identical weights across encoder branches Implement bidirectional forward pass\
    \ accepting two augmented images and outputting paired representation vectors\
    \ Validation: Verify output tensor shapes match expected dimensions (batch_size\
    \ \xD7 512) and confirm parameter identity between branches Load 512-dimensional\
    \ encoder outputs from paired ResNet18 networks processing augmented ion image\
    \ pairs. Pass encoder outputs through a learnable Projection module to map to\
    \ a contrastive learning space. Pass projected vectors through a learnable Prediction\
    \ module to introduce asymmetry and prevent solution collapse. Compute contrastive\
    \ loss (e.g., NT-Xent or SimCLR loss) between predictions of augmented pairs,\
    \ maximizing similarity within pairs and minimizing across pairs. Optimize Projection\
    \ and Prediction module parameters via backpropagation while maintaining encoder\
    \ representations. Validation: contrastive loss converges to a stable minimum\
    \ and learned representations preserve ion-image-specific structure (verified\
    \ by downstream clustering or classification performance on COL/ISO modes)."
  domain: bioinformatics
  techniques:
  - deep-learning
