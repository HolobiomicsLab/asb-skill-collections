narrative:
  tagline: QComics is an R package designed to provide quick quality assessments of
    metabolomics or lipidomics studies by processing pooled QCpool samples measured
    at regular intervals during analytical sequences.
  pseudo_abstract: The QComics package processes pooled QCpool samples that must be
    measured at regular intervals during one or more analytical sequences and exported
    from Sciex Multiquant software (> v3.0.3) as text files. The package incorporates
    mechanisms for detecting QCpool measurement intervals from Sciex Multiquant TXT
    exports and reconstructing quality overview summaries from parsed QCpool positional
    data to generate quality assessment information for metabolomics and lipidomics
    studies.
  research_questions:
  - How does the QComics package parse Sciex Multiquant TXT export files to identify
    and locate QCpool samples that were injected at regular intervals across metabolomics
    or lipidomics sequences?
  - What metrics does QComics compute from QCpool injection data to assess metabolomics
    or lipidomics study quality?
  methods_summary: 'Load and parse the Sciex Multiquant TXT export to extract sample
    names and injection sequence metadata. Scan sample identifiers and metadata fields
    to locate QCpool entries using naming patterns or annotations. Map each QCpool
    sample to its injection index, sequence identifier, and position within the analytical
    run. Analyze QCpool spacing to confirm regularity of insertion intervals. Validation:
    Output table contains all QCpool samples with correct injection indices and documented
    intervals match expected study design spacing. Load and parse QCpool positional
    table from Sciex Multiquant txt export, extracting compound identifiers and signal
    intensities across sequential injections. Calculate per-compound coefficient of
    variation (CV) to assess technical reproducibility across QCpool replicates. Compute
    signal-trend metrics (drift, stability index, or slope) to detect instrumental
    performance changes across the injection sequence. Aggregate CV and trend results
    by compound into a summary table with quality classification (e.g., acceptable
    vs. poor). Visualization: generate table or figure presenting per-compound CV,
    trend metrics, and overall quality assessment for rapid interpretation. Validation:
    output includes per-compound CV values and trend indicators with quality thresholds
    suitable for literature reporting or protocol standardization.'
  domain: metabolomics
  techniques:
  - feature-detection
  - metabolite-identification
  - quality-control
