narrative:
  tagline: DEIMoS is a Python API and command-line tool for high-dimensional mass
    spectrometry data analysis that performs feature detection, alignment, CCS calibration,
    isotope detection, and MS/MS deconvolution by simultaneously utilizing all data
    dimensions to improve detection sensitivity and reduce convolution artifacts.
  pseudo_abstract: DEIMoS (Data Extraction for Integrated Multidimensional Spectrometry)
    operates on N-dimensional mass spectrometry data largely agnostic to acquisition
    instrumentation. The tool implements feature detection, feature alignment, collision
    cross section (CCS) calibration, isotope detection, and MS/MS spectral deconvolution,
    producing detected features aligned across study samples and characterized by
    mass, CCS, tandem mass spectra, and isotopic signature. Notably, algorithm implementations
    simultaneously utilize all dimensions of the input data to offer greater separation
    between features (improving detection sensitivity), increase alignment and feature
    matching confidence among datasets, and mitigate convolution artifacts in tandem
    mass spectra. The CCS calibration routine using the tunemix function achieves
    R-squared = 0.9999784552958121 for positive ion mode and R-squared = 0.9999784552958134
    for negative ion mode. Reference-based alignment constructs a per-dimension model
    by putatively matching detected features against an in-study reference sample,
    minimizing residuals, and applying the fit transform. Isotope detection enumerates
    C13 isotopologue offsets by specifying an m/z delta of 1.003355 Da with up to
    5 isotopic substitutions for singly charged species, constrained by m/z, drift
    time, and retention time tolerances, with final downselection using a maximum
    m/z error of 50 ppm.
  research_questions:
  - "Does the DEIMoS tunemix calibration function produce collision cross section\
    \ (CCS) calibration coefficients that achieve R-squared values \u22650.99997 when\
    \ applied to positive and negative ion mode tune mix data?"
  - How does reference-based alignment in DEIMoS adjust feature coordinates across
    samples to account for instrument variation?
  - How does DEIMoS enumerate isotopologue offsets for singly charged species, and
    what parameters define the m/z tolerance, drift time tolerance, retention time
    tolerance, and charge constraints used in this detection?
  - Does the DEIMoS Snakemake workflow successfully execute end-to-end on the publicly
    deposited MassIVE user guide example dataset, completing all workflow rules and
    producing final HDF5 output artifacts?
  methods_summary: "Load tunemix reference data (positive and negative ion modes)\
    \ into DEIMoS using HDF5 file interface with ms1 key. Initialize CCS calibration\
    \ objects specifying known tunemix CCS values and instrumental m/z\u2013drift-time\
    \ coordinates. Fit polynomial regression models to establish m/z\u2013drift-time\u2013\
    CCS mapping for each ion mode independently. Extract R-squared coefficients from\
    \ fitted models and verify they exceed 0.99997 threshold. Validation: Confirm\
    \ that both positive and negative ion mode calibrations achieve R-squared \u2265\
    0.99997 as reported in the user guide. References: MSV000091746 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000091746)\
    \ Load two feature tables in HDF5 format specifying multi-dimensional columns\
    \ (mass, drift time, retention time, intensity). Apply reference-based alignment\
    \ to match features across datasets using simultaneous N-dimensional similarity\
    \ comparison. Export aligned features to HDF5 format with matched feature identities\
    \ preserved. Validation: verify aligned output table contains features matched\
    \ across both input datasets with dimensional consistency and no data loss. References:\
    \ MSV000091746 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000091746)\
    \ Load peak-picked HDF5 feature table with m/z, drift_time, retention_time, and\
    \ intensity columns. Invoke deimos.isotopes module to enumerate C13 isotopologue\
    \ mass offsets for charge +1 species by computing pairwise m/z differences and\
    \ spatial concordance. Filter detected isotopic signatures to retain clusters\
    \ with minimum 3 members. Annotate feature table rows with isotopologue identity\
    \ labels (monoisotopic flag, member index, C13 count) and export to HDF5. Validation:\
    \ Confirm output HDF5 file contains isotope annotation columns; verify all detected\
    \ isotopic signatures satisfy \u22653-member threshold and mass offset consistency\
    \ with theoretical C13 shift (1.003355 Da per substitution). References: MSV000091746\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000091746) Clone\
    \ DEIMoS repository and create conda virtual environment with required dependencies.\
    \ Download MassIVE user-guide dataset (MSV000091746) and place mzML.gz files in\
    \ input/ directory. Prepare or modify YAML configuration file with workflow-specific\
    \ parameters (default_config.yaml provided). Invoke DEIMoS CLI with config.yaml\
    \ to execute Snakemake workflow, specifying core count and execution mode. Snakemake\
    \ automatically orchestrates peak detection, feature alignment, CCS calibration,\
    \ isotope detection, and MS/MS deconvolution, populating output/ with HDF5 files.\
    \ Validation: confirm all output HDF5 files are present, contain expected datasets\
    \ (ms1, ms2, features, isotopes), and have non-zero row counts indicating successful\
    \ rule execution. References: MSV000091746 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000091746)"
