narrative:
  tagline: spectrum_utils is a Python package for efficient mass spectrometry data
    processing and visualization, providing optimized spectrum processing operations,
    fragment annotation using the ProForma 2.0 specification, and publication-quality
    spectrum plotting.
  pseudo_abstract: spectrum_utils provides common spectrum processing operations including
    precursor and noise peak removal, intensity filtering, and intensity scaling optimized
    for computational efficiency. The package enables annotation of observed spectrum
    fragments using the ProForma 2.0 specification for modified peptidoforms, supporting
    multiple ion types and optional neutral loss annotation. spectrum_utils includes
    functionality for loading spectra from online proteomics and metabolomics data
    resources via the Universal Spectrum Identifier (USI) mechanism, as well as publication-quality
    and interactive spectrum visualization capabilities including standard plots,
    mirror plots for comparing spectra, and mass error plots.
  research_questions:
  - What is the sequence and behavior of spectrum preprocessing operations in spectrum_utils
    when applied to an MsmsSpectrum object?
  - Does spectrum_utils.fragment_annotation correctly annotate b and y ions for a
    given ProForma 2.0 peptidoform string when applied to a publicly deposited spectrum?
  - Does spectrum_utils achieve higher throughput (spectra per second) compared to
    pymzML and pyOpenMS when processing the same benchmark dataset?
  - How does enabling neutral loss annotation in spectrum_utils.fragment_annotation
    affect the fraction of observed peaks that receive an interpretation?
  - Can spectrum_utils load a publicly deposited mass spectrometry spectrum via Universal
    Spectrum Identifier (USI) and annotate it with fragment ion types for visualization?
  methods_summary: "Load an MsmsSpectrum object from a public USI using spectrum_utils.MsmsSpectrum.from_usi().\
    \ Restrict m/z range to 100\u20131400 using set_mz_range() to remove out-of-range\
    \ peaks. Remove precursor (parent) ion peaks using remove_precursor_peak() with\
    \ specified mass tolerance. Filter low-intensity noise peaks using filter_intensity()\
    \ with min_intensity=0.05 (5% base peak) and cap peak count at max_num_peaks=50.\
    \ Scale peak intensities by square root using scale_intensity('root') to normalize\
    \ intensity distribution. Validation: verify resulting spectrum m/z array is within\
    \ [100, 1400], peak count is \u226450, precursor peak is absent, and intensity\
    \ values reflect square-root transformation. References: source article (DOI:\
    \ 10.1021/acs.analchem.9b04884); MSV000082283 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000082283);\
    \ MSV000079960 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000079960);\
    \ MSV000080679 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080679);\
    \ PXD000561 (https://www.ebi.ac.uk/pride/archive/projects/PXD000561); PXD014834\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD014834); PXD022531 (https://www.ebi.ac.uk/pride/archive/projects/PXD022531);\
    \ PXD004732 (https://www.ebi.ac.uk/pride/archive/projects/PXD004732) Load the\
    \ target spectrum from a public USI-indexed repository using MsmsSpectrum.from_usi().\
    \ Parse the ProForma 2.0 string to extract sequence, modification sites, and modification\
    \ types using the internal formal grammar and abstract syntax tree. Compute theoretical\
    \ m/z values for all b and y ions from the annotated peptide. Match observed spectrum\
    \ peaks to theoretical fragments within the specified mass tolerance (default:\
    \ 10 ppm or 0.5 Da). Assign ion type ('b' or 'y'), charge state, and mass error\
    \ to each matched peak. Validation: confirm that all returned annotations have\
    \ m/z values within the input tolerance and ion types are correctly labeled as\
    \ 'b' or 'y'. References: source article (DOI: 10.1021/acs.analchem.9b04884);\
    \ MSV000082283 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000082283);\
    \ MSV000079960 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000079960);\
    \ MSV000080679 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080679);\
    \ PXD000561 (https://www.ebi.ac.uk/pride/archive/projects/PXD000561); PXD014834\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD014834); PXD022531 (https://www.ebi.ac.uk/pride/archive/projects/PXD022531);\
    \ PXD004732 (https://www.ebi.ac.uk/pride/archive/projects/PXD004732) Load iPRG2012.mgf\
    \ and iterate over spectra, filtering to valid entries (\u226510 peaks, charge\
    \ present). Apply identical five-step processing pipeline to each spectrum: m/z\
    \ range (100\u20131400), precursor removal, intensity filtering (\u22655% base\
    \ peak, max 150 peaks), square-root scaling, and measure elapsed time. Repeat\
    \ for spectrum_utils, pymzML, and pyOpenMS independently; collect per-spectrum\
    \ runtimes. Compute summary statistics: median, percentiles, and spectra-per-second\
    \ throughput (1/median_time). Validation: spectrum_utils median processing time\
    \ must be strictly lower than both pymzML and pyOpenMS medians, and reported throughput\
    \ (spectra/second) must reflect the inverse relationship shown in the paper's\
    \ box plot. References: source article (DOI: 10.1021/acs.analchem.9b04884); MSV000082283\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000082283); MSV000079960\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000079960); MSV000080679\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080679); PXD000561\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD000561); PXD014834 (https://www.ebi.ac.uk/pride/archive/projects/PXD014834);\
    \ PXD022531 (https://www.ebi.ac.uk/pride/archive/projects/PXD022531); PXD004732\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD004732) Retrieve public MS/MS\
    \ spectrum via USI and load into spectrum_utils MsmsSpectrum object. Apply standard\
    \ spectrum preprocessing: m/z range filtering (100\u20131400), precursor peak\
    \ removal (10 ppm tolerance), noise filtering (0.05 min intensity, max 50 peaks),\
    \ and square-root intensity scaling. Annotate fragment ions using ProForma peptide\
    \ string with default ion types (a, b, y) and neutral losses disabled; count peaks\
    \ receiving interpretation. Re-annotate the same spectrum with common neutral\
    \ losses (NH\u2083, H\u2082O) enabled; count peaks receiving interpretation. Calculate\
    \ peak annotation fractions for both conditions and compute the relative increase.\
    \ Validation: verify that peak interpretation fraction increase when neutral losses\
    \ are enabled matches the order-of-magnitude improvement shown in the reported\
    \ neutral loss example spectra. References: source article (DOI: 10.1021/acs.analchem.9b04884);\
    \ MSV000082283 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000082283);\
    \ MSV000079960 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000079960);\
    \ MSV000080679 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080679);\
    \ PXD000561 (https://www.ebi.ac.uk/pride/archive/projects/PXD000561); PXD014834\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD014834); PXD022531 (https://www.ebi.ac.uk/pride/archive/projects/PXD022531);\
    \ PXD004732 (https://www.ebi.ac.uk/pride/archive/projects/PXD004732) Retrieve\
    \ the spectrum from a public proteomics data repository using the USI accession.\
    \ Parse the ProForma peptide string and match fragment ion masses against observed\
    \ m/z peaks within the specified tolerance. Generate and label annotated peaks\
    \ for b and y ion types. Render a publication-quality spectrum plot with annotated\
    \ fragments, appropriate axis labels, and styling (grid, spines). Validation:\
    \ Output PNG file exists, contains rendered spectrum with visible annotated peaks,\
    \ and pixel dimensions are consistent with specified figure size. References:\
    \ source article (DOI: 10.1021/acs.analchem.9b04884); MSV000082283 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000082283);\
    \ MSV000079960 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000079960);\
    \ MSV000080679 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080679);\
    \ PXD000561 (https://www.ebi.ac.uk/pride/archive/projects/PXD000561); PXD014834\
    \ (https://www.ebi.ac.uk/pride/archive/projects/PXD014834); PXD022531 (https://www.ebi.ac.uk/pride/archive/projects/PXD022531);\
    \ PXD004732 (https://www.ebi.ac.uk/pride/archive/projects/PXD004732)"
