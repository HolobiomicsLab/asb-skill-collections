narrative:
  tagline: BAM is a biotransformation-based annotation method for molecular structure
    discovery from untargeted metabolomics data. This repository provides the implementation
    code and validation dataset to reproduce reported results.
  pseudo_abstract: This repository contains the implementation of BAM (biotransformation-based
    annotation method), a computational approach for molecular structure discovery
    from untargeted metabolomics data that integrates biotransformation rules and
    global molecular networking. The repository includes both the BAM codebase and
    the validation dataset used to assess the method's performance, enabling reproduction
    of the reported validation results.
  research_questions:
  - Does the BAM pipeline, when executed end-to-end on the deposited validation dataset,
    reproduce the reported validation metrics for molecular structure discovery from
    untargeted metabolomics data?
  - How does the BAM method apply biotransformation rules to generate candidate molecular
    structures from input molecules?
  - How does the global molecular networking component of BAM operate on candidate
    transformed structures to generate a molecular network file and annotation table?
  methods_summary: "Obtain the HassounLab/BAM repository and validation dataset (metabolomics\
    \ data + reference annotations). Configure and initialize the BAM pipeline with\
    \ biotransformation rules and molecular networking parameters. Execute the BAM\
    \ pipeline end-to-end to generate structure annotations for validation data. Compute\
    \ annotation accuracy (percentage of correct predictions) and coverage (percentage\
    \ of features with assignments) against reference. Validation: Reported validation\
    \ metrics (annotation accuracy and coverage) must match or closely approximate\
    \ the paper's published benchmarks for the validation dataset. Load and validate\
    \ input SMILES using RDKit chemistry library. Access and parse biotransformation\
    \ rules from the BAM codebase. Apply each rule to every input structure, generating\
    \ candidate products. Deduplicate and track parent\u2013product relationships\
    \ with rule metadata. Serialize results as structured JSON/CSV output file. Validation:\
    \ Verify that all input structures have been processed, no invalid SMILES are\
    \ output, and parent\u2013product links are traceable. Load candidate structures\
    \ from biotransformation rules and MS/MS spectral features. Compute pairwise spectral\
    \ similarity scores across all features using cosine similarity or analogous metric.\
    \ Apply spectral similarity threshold to filter network edges and retain high-confidence\
    \ spectral matches. Detect molecular families via graph clustering or community\
    \ detection on the filtered network. Integrate candidate structures with network\
    \ nodes and assign feature-to-structure annotations based on mass and spectral\
    \ consistency. Validation: Confirm molecular network file is properly formatted\
    \ and parseable; verify annotation table contains all MS features with at least\
    \ one candidate structure assignment and cluster membership; assess annotation\
    \ coverage (% of features with predicted structures) and network statistics (number\
    \ of nodes, edges, clusters) match expected scale."
  domain: metabolomics
