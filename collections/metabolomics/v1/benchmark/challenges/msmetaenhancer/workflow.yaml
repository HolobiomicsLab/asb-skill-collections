narrative:
  tagline: MSMetaEnhancer is a Python tool that enriches mass spectrometry metadata
    files (.msp) by asynchronously fetching chemical identifiers (SMILES, InChI, CAS
    numbers) from multiple external services.
  pseudo_abstract: 'MSMetaEnhancer adds metadata including SMILES, InChI, and CAS
    number to .msp files through asynchronous annotation processing, retrieving data
    from five external services: CIR, CTS, PubChem, IDSM, and BridgeDb. The tool implements
    a modular architecture comprising web-based converters that make HTTP requests
    to external APIs and compute-based converters for local chemical structure transformations.
    The system uses a ConverterBuilder mechanism to automatically discover and instantiate
    available converters into Job objects that define conversion tasks, and employs
    Monitor-based service status tracking during the annotation process. RDKit serves
    as a reference implementation for ComputeConverter subclasses that perform local
    chemical property computations.'
  research_questions:
  - What metadata fields can MSMetaEnhancer add to mass spectra records by querying
    external web services?
  - How does the ConverterBuilder component automatically discover and instantiate
    all available converter classes to create a complete set of source-to-target conversion
    Job objects?
  - How does MSMetaEnhancer track the availability and error state of external web
    services during annotation runs?
  - How does a ComputeConverter subclass using RDKit perform local chemical structure
    conversions (e.g., SMILES to InChI) without relying on web services?
  - What are the per-attribute fill-rate statistics and annotation coverage metrics
    produced by MSMetaEnhancer's Logger component when running the full annotation
    pipeline on a test .msp file?
  methods_summary: "Instantiate MSMetaEnhancer Application and load sample .msp spectra\
    \ file. Define conversion jobs specifying source compound attributes, target metadata\
    \ fields (SMILES, InChI, CAS), and web converter services (CIR, CTS, PubChem,\
    \ IDSM, BridgeDb). Invoke asynchronous `annotate_spectra` method to dispatch enrichment\
    \ requests to each service via WebConverter HTTP queries. Aggregate parsed API\
    \ responses into enriched spectra records. Validation: verify all target metadata\
    \ fields are populated in output .msp file and conform to expected chemical identifier\
    \ formats (SMILES syntax, InChI structure, CAS registry numbering). Dynamically\
    \ discover all converter class definitions in the web and compute converter packages\
    \ using Python module introspection. Instantiate each discovered converter class\
    \ with appropriate initialization parameters (session for web, no args for compute).\
    \ Extract the conversions tuple list from each converter's __init__ method via\
    \ attribute inspection. Transform each conversion tuple into a Job object and\
    \ aggregate into a master enumeration. Validate that all declared conversion methods\
    \ are callable and match their specifications. Validation: Run pytest on ConverterBuilder\
    \ tests to confirm that the enumerated job list matches the expected set of conversions\
    \ for all registered services. Instantiate Monitor class with registry of active\
    \ web service converters (CIR, CTS, PubChem, IDSM, BridgeDb) and initialize per-service\
    \ state dictionaries for uptime, error counts, latency, and last-check timestamp.\
    \ Integrate Monitor with asynchronous annotation event loop to capture request-start,\
    \ response-received, and error-occurred events from WebConverter base class. Compute\
    \ per-service metrics: uptime percentage (successful requests / total requests),\
    \ cumulative error count, mean response latency, and wall-clock timestamp of last\
    \ status check. Serialize aggregated status as JSON with per-service summaries\
    \ (availability %, error count, mean latency ms, last check) and overall health\
    \ indicator. Validation: verify JSON output contains all five registered services,\
    \ all uptime and error counts are non-negative integers, latency values are positive\
    \ floats, and timestamps are ISO 8601 format. Create a new ComputeConverter subclass\
    \ file in the compute converters directory. Define conversions list (source \u2192\
    \ target mappings) and invoke create_top_level_conversion_methods with asynch=False.\
    \ Implement RDKit-based conversion methods (e.g., SMILES to InChI via Chem.MolFromSmiles\
    \ and Chem.inchi.MolToInchi). Return results as dictionaries mapping target attribute\
    \ names to converted values. Register the converter in __init__.py for auto-discovery.\
    \ Write pytest tests validating converter instantiation and conversion accuracy\
    \ on reference SMILES inputs. Validation: all pytest tests pass, including new\
    \ converter tests and existing test suite, confirming correct implementation of\
    \ ComputeConverter interface and accurate molecular structure conversions. Load\
    \ the example .msp file and initialize the MSMetaEnhancer Application with all\
    \ available converters (CIR, CTS, PubChem, IDSM, BridgeDb, RDKit) via ConverterBuilder.\
    \ Run the asynchronous annotate_spectra() method with all supported conversion\
    \ jobs to enrich spectra metadata in parallel. Capture structured Logger output\
    \ events recording per-attribute conversion success, failure, and enrichment outcome\
    \ for each spectrum. Parse Logger records to compute initial and final fill rates\
    \ (non-null counts) for each metadata field across the spectra dataset. Construct\
    \ a summary table with metadata fields as rows and fill-rate before/after annotation,\
    \ absolute and relative gain as columns. Validation: verify that summary table\
    \ row count matches the number of metadata fields present in the annotated .msp\
    \ file, and that all fill-rate values are in [0, 1]."
