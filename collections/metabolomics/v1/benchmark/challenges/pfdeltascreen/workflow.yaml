narrative:
  tagline: "PF\u0394Screen is an open-source Python tool that automates prioritization\
    \ of potential PFAS features in LC- or GC-HRMS data through feature detection\
    \ and multiple filtering techniques including MD/C-m/C analysis, Kendrick mass\
    \ defect analysis, and MS2 fragment screening."
  pseudo_abstract: "PF\u0394Screen provides a graphical user interface for non-target\
    \ screening of PFAS candidates in high-resolution mass spectrometry data. The\
    \ software uses pyOpenMS for feature detection in vendor-independent centroided\
    \ mzML format files and implements several complementary prioritization techniques:\
    \ the MD/C-m/C approach, Kendrick mass defect (KMD) analysis, and diagnostic fragment\
    \ mass differences and fragments detected in MS2 data. The tool optionally accepts\
    \ custom feature lists as input and applies these prioritization filters to identified\
    \ features regardless of their source, enabling rapid automated candidate identification\
    \ from LC- or GC-HRMS measurements acquired with ionization methods such as ESI\
    \ or APCI."
  research_questions:
  - How does pyOpenMS ingest centroided mzML files and produce a feature list with
    m/z, retention time, and intensity values?
  - How does the MD/C-m/C approach filter and prioritize potential PFAS features from
    a mass spectrometry feature list?
  - "How does the Kendrick mass defect (KMD) analysis module calculate and flag homologous\
    \ PFAS series from a feature list in PF\u0394Screen?"
  - "How does PF\u0394Screen detect and flag potential PFAS features by identifying\
    \ diagnostic fragments and characteristic mass differences in MS2 spectral data?"
  - "Can PF\u0394Screen's prioritization filters (MD/C-m/C, KMD analysis, and MS2\
    \ fragment diagnostics) correctly process and filter PFAS features supplied via\
    \ an optional custom feature list, rather than relying solely on pyOpenMS-detected\
    \ features?"
  methods_summary: "Load centroided mzML file into pyOpenMS MSExperiment object. Run\
    \ pyOpenMS FeatureFinderCentroided algorithm to detect 2D features across m/z\
    \ and retention time dimensions. Extract feature attributes (m/z, retention time,\
    \ intensity) from the detected feature container. Serialize detected features\
    \ to mzTab format. Validation: Verify that output file contains at least one feature\
    \ row with non-null m/z, retention time, and intensity fields; confirm file format\
    \ conforms to mzTab specification. References: source article (DOI: 10.1007/s00216-023-05070-2)\
    \ Load feature list containing m/z values and corresponding molecular formula\
    \ assignments. Calculate exact mass for each molecular formula using standard\
    \ atomic mass constants. Compute mass defect as the difference between observed\
    \ m/z and calculated exact mass. Normalize mass defect by dividing by the number\
    \ of carbon atoms (MD/C metric). Apply MD/C threshold criterion to classify features\
    \ as potential PFAS or non-PFAS. Validation: Output feature list includes MD/C\
    \ scores for all input features and binary PFAS flag; correctness verified by\
    \ checking that MD/C values fall within expected ranges for known PFAS and non-PFAS\
    \ compounds. References: source article (DOI: 10.1007/s00216-023-05070-2) Parse\
    \ feature list and extract m/z values Apply Kendrick mass formula to convert each\
    \ m/z to Kendrick scale Calculate Kendrick mass defect as the difference between\
    \ nominal and exact Kendrick mass Group features by KMD value within tolerance\
    \ threshold to identify homologous series Validation: Verify that features within\
    \ a single assigned group share KMD values within the specified tolerance and\
    \ that output table contains all input features with non-null KMD and group assignments\
    \ References: source article (DOI: 10.1007/s00216-023-05070-2) Load centroided\
    \ MS2 spectra from mzML using pyOpenMS. Define or retrieve known PFAS diagnostic\
    \ fragment masses and mass difference thresholds. For each spectrum, match precursor\u2013\
    product mass pairs against diagnostic fragment database within mass tolerance.\
    \ Flag features with one or more diagnostic fragment matches. Validation: Output\
    \ feature flagged with diagnostic match identity and mass error within specified\
    \ tolerance (typically <10 ppm). References: source article (DOI: 10.1007/s00216-023-05070-2)\
    \ Parse and validate custom feature list CSV/TSV, confirming presence of required\
    \ columns (m/z, retention time, intensity) and numeric data types. Convert custom\
    \ feature objects into PF\u0394Screen's internal feature representation to ensure\
    \ compatibility with downstream filter modules. Calculate mass defect and mass\
    \ defect / nominal mass ratio (MD/C) for each custom feature; flag features exceeding\
    \ PFAS-typical MD/C thresholds. Perform Kendrick mass defect clustering to identify\
    \ homologous series within the custom feature set. Match each custom feature m/z\
    \ against MS2 fragmentation patterns to detect diagnostic PFAS fragments and confirm\
    \ structural hypotheses. Validation: Verify that at least 90% of custom features\
    \ receive a prioritization score and that filter pass/fail status can be independently\
    \ audited against reference PFAS standards or known-mass spike compounds. References:\
    \ source article (DOI: 10.1007/s00216-023-05070-2)"
