narrative:
  tagline: ENPKG is a computational workflow for processing and integrating data into
    knowledge graphs through installation, setup, and execution stages. The workflow
    transforms raw input into annotated outputs ready for knowledge-graph integration.
  pseudo_abstract: 'The ENPKG full workflow describes a structured process comprising
    three primary operational stages: installation, setup, and execution. The workflow
    guide covers installation and environment setup procedures as foundational steps,
    followed by end-to-end pipeline execution that processes sample datasets and produces
    annotated outputs suitable for knowledge-graph integration.'
  research_questions:
  - What are the conda and pip dependencies and installation procedures required to
    establish a functional ENPKG environment?
  - What is the complete computational workflow executed by ENPKG from raw input data
    to final knowledge-graph-ready annotated outputs?
  methods_summary: 'Clone the enpkg/enpkg_full repository to a local working directory.
    Extract the conda environment specification (environment.yml or equivalent) from
    the repository. Create and activate a new conda environment using the declared
    dependency manifest. Install all pinned Python packages and external dependencies
    via conda and pip. Validation: Verify all declared packages are present at the
    correct pinned versions and that core ENPKG modules can be imported without error.
    References: source article (DOI: 10.1021/acscentsci.3c00800) Install ENPKG full
    workflow from repository and configure the computational environment with all
    required dependencies. Prepare and validate input dataset (spectral data and sample
    metadata) in the workflow''s expected directory structure. Execute the ENPKG orchestrator,
    which automatically chains feature detection, spectral matching, molecular networking,
    and knowledge-graph annotation. Monitor execution logs and verify successful completion
    of all pipeline stages. Validation: Confirm that all expected output files (annotated
    features, knowledge-graph triples, spectral matches) exist, are non-empty, conform
    to output schema, and contain molecular annotations with confidence scores for
    test dataset samples. References: source article (DOI: 10.1021/acscentsci.3c00800)'
  domain: cheminformatics
