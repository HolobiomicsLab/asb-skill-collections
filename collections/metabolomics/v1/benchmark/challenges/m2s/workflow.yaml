narrative:
  tagline: M2S is a Matlab package designed to match untargeted metabolomic features
    across two LC-MS datasets.
  pseudo_abstract: M2S implements a feature matching pipeline for untargeted metabolomics
    that takes two LC-MS feature datasets as input and produces matched features as
    output. The package provides a mechanism for aligning metabolomic features between
    LC-MS analyses to facilitate comparative metabolomic studies.
  research_questions:
  - How does the M2S Matlab package match untargeted metabolomic features across two
    LC-MS datasets?
  methods_summary: Load two LC-MS untargeted metabolomic feature tables into Matlab
    environment Parse feature identifiers (m/z, retention time) from both datasets
    Apply M2S matching algorithm to identify corresponding features across datasets
    using m/z and RT similarity criteria Compute matching scores reflecting confidence
    in feature correspondence Export matched feature table with linked feature pairs
    and scores
