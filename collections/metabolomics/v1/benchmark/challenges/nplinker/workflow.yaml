narrative:
  tagline: "NPLinker is a software framework that links microbial metabolomic and\
    \ genomic data by combining complementary scoring functions\u2014a standardised\
    \ strain correlation score and an Input-Output Kernel Regression (IOKR) score\u2014\
    to prioritize true biosynthetic gene cluster\u2013metabolite associations."
  pseudo_abstract: "Establishing links between Biosynthetic Gene Clusters (BGCs) and\
    \ specialized metabolites is crucial for discovering novel natural products, but\
    \ current automated approaches are ineffective and manual verification remains\
    \ a bottleneck. This work demonstrates that multiple scoring functions are complementary\
    \ when used together to rank candidate links. The authors standardize a widely\
    \ used strain correlation score, introduce a novel IOKR-based scoring approach,\
    \ and present NPLinker, a software framework for linking genomic and metabolomic\
    \ data. Validation on publicly available paired datasets shows that the standardised\
    \ correlation score achieves means of \u22120.0060 for all links and 3.6717 for\
    \ validated links (p=6.8302 \xD7 10\u221264), while IOKR achieves means of 0.0105\
    \ and 0.0364 respectively (p=1.7968 \xD7 10\u22129) with top-1 accuracy of 0.1208\
    \ and AUC of 0.6534. Links scoring above the 90th percentile for both scores show\
    \ significantly higher enrichment for validated links (p=2.633 \xD7 10\u22124\
    \ and p=0.0208) compared to either individual score alone, demonstrating their\
    \ utility when combined for prioritizing metabolite\u2013BGC associations."
  research_questions:
  - Does standardising the raw strain correlation score by its hypergeometric expectation
    and variance improve comparability of scores across GCF-MF links of different
    sizes?
  - What is the distribution of IOKR scores across all 2966 MIBiG-GNPS BGC-spectrum
    pairs, and how do validated links rank within this distribution?
  - When combining standardised strain correlation and IOKR scores, does the joint
    top percentile enrichment of validated links exceed that of either individual
    scoring function alone?
  - How does NPLinker orchestrate the integration of antiSMASH/BiG-SCAPE genomic outputs
    and GNPS metabolomic outputs to create and rank hypothetical BGC-metabolite links?
  - "How does the choice of exponent p in the \u2113p-norm combination function affect\
    \ the enrichment of validated links in the top-ranking BGC-metabolite predictions?"
  methods_summary: "Load GCF-MF pairs for each dataset (Cr\xFCsemann, Gross, Le\xE3\
    o) and extract GCF size, MF size, overlap size, and population size parameters.\
    \ Compute hypergeometric expected value E[\u03C3_corr] and variance Var[\u03C3\
    _corr] for each pair by summing over all possible overlap sizes weighted by hypergeometric\
    \ probabilities. Calculate standardised score s*_corr = (raw_score \u2212 E[\u03C3\
    _corr]) / \u221AVar[\u03C3_corr] for all GCF-MF pairs. Generate distribution histograms\
    \ and summary statistics (mean, p-value) for validated versus all links under\
    \ both raw and standardised scoring. Determine enrichment of validated links at\
    \ 90th percentile for each dataset and pool across datasets to compute significance.\
    \ Validation: standardised score demonstrates significantly higher p-value for\
    \ separation of validated from non-validated links (p < 2.5 \xD7 10\u207B\xB9\xB9\
    ) and higher proportion of validated links in top 90th percentile, consistent\
    \ with reported Table 1 and Table 2 values. References: source article (DOI: 10.1371/journal.pcbi.1008920);\
    \ MSV000078836 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000078836);\
    \ MSV000085038 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000085038)\
    \ Extract molecular fingerprints (CDK Substructure, PubChem Substructure, Klekota-Roth)\
    \ from SMILES strings for all 4138 GNPS training spectra and their paired metabolite\
    \ structures. Train IOKR by learning a kernel-based mapping from the input MS2\
    \ spectrum kernel space to the output molecular fingerprint space using the paired\
    \ spectrum-fingerprint training set. Filter evaluation MS2 spectra (6246 total)\
    \ to retain only peaks present in the GNPS training data using the Probability\
    \ Product Kernel (PPK) as a denoising step. For each of 6246 evaluation spectra,\
    \ apply the trained IOKR model to predict a fingerprint and rank candidate BGCs\
    \ (2242 with MIBiG structure assignments) by computing \u27E8\u0125(spectrum),\
    \ \u03C6(BGC)\u27E9 in fingerprint space. Evaluate top-n accuracy (n \u2208 {1,5,10,20,200})\
    \ and AUC by determining the rank of the correct BGC in each ranked list; compare\
    \ against randomized baseline. Calculate and report mean IOKR scores for all 2966\
    \ BGC-spectrum pairs and for validated pairs, compute p-values, and generate distribution\
    \ histograms with validated-link overlay. Validation: reproduce top-n accuracy\
    \ values (top-1=0.1208, top-5=0.1708, top-200=0.2946, AUC=0.6534) from Table 3\
    \ and visual alignment with S2 Fig distribution, confirming mean validated-link\
    \ score (0.0364) significantly exceeds mean all-links score (0.0105, p=1.8\xD7\
    10\u207B\u2079). References: source article (DOI: 10.1371/journal.pcbi.1008920);\
    \ MSV000078836 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000078836);\
    \ MSV000085038 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000085038)\
    \ Load GCF-MF link data with strain membership and validated annotations from\
    \ three curated microbial datasets. Compute standardised strain correlation score\
    \ for each GCF-MF pair by calculating raw correlation score and adjusting for\
    \ expected value and variance under hypergeometric null hypothesis. Compute IOKR\
    \ scores for BGC-spectrum links via molecular fingerprint space projection, then\
    \ propagate maximum IOKR score to GCF-MF level. Standardise IOKR scores using\
    \ expected value and variance computed over all potential links in the dataset.\
    \ Identify the 90th percentile threshold independently for standardised correlation\
    \ and IOKR scores, then categorise links as: above neither, above only standardised\
    \ correlation, above only IOKR, or above both (joint). Calculate the proportion\
    \ of validated links within each category (total, top raw correlation, top standardised\
    \ correlation, top IOKR, top combined) for each of the three datasets. Pool validated\
    \ and unvalidated link counts across the three datasets and apply Fisher exact\
    \ test to compare enrichment of the joint top-percentile group versus individual\
    \ top-percentile groups. Validation: Demonstrate that the p-value for enrichment\
    \ of validated links in the joint top percentile (both scores \u226590th percentile)\
    \ is significantly lower than the p-values for either score alone (p < 0.05 after\
    \ Bonferroni correction if multiple tests), confirming complementarity of the\
    \ two scoring functions. References: source article (DOI: 10.1371/journal.pcbi.1008920);\
    \ MSV000078836 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000078836);\
    \ MSV000085038 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000085038)\
    \ Cluster detected BGCs into Gene Cluster Families (GCFs) using BiG-SCAPE, grouping\
    \ by product class and similarity distance. Generate the complete set of hypothetical\
    \ GCF\u2013Molecular Family (MF) link combinations from input genomic and metabolomic\
    \ data. Compute standardised strain correlation score for each link by calculating\
    \ hypergeometric expected value and variance and z-normalising. Score BGC\u2013\
    spectrum links using Input-Output Kernel Regression (IOKR) on molecular fingerprints\
    \ for BGCs with MIBiG structural homology; aggregate to GCF\u2013MF level. Standardise\
    \ IOKR scores and combine both standardised scores using \u2113\u2081/\u2082-norm\
    \ with sign adjustment to produce a single ranking. Rank all hypothetical links\
    \ and export table with filtering and sorting options; calculate enrichment statistics\
    \ for validated links at 90th percentile. Validation: confirm that joint 90th-percentile\
    \ links show significantly higher proportion of validated links (p < 0.05) than\
    \ either score alone. References: source article (DOI: 10.1371/journal.pcbi.1008920);\
    \ MSV000078836 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000078836);\
    \ MSV000085038 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000085038)\
    \ Load pre-computed standardised strain correlation and IOKR scores for all links\
    \ across the three microbial datasets (Cr\xFCsemann, Gross, Le\xE3o) and their\
    \ validated-link annotations. Compute combined scores using the \u2113_p-norm\
    \ with sign adjustment across a systematic range of p values (0.5 to 3.0 in 0.1\
    \ increments, plus fractional values 0 < p < 1) and alternative function forms\
    \ (weighted linear, Chebyshev, harmonic mean, geometric mean). For each combination\
    \ function and parameter set, rank all GCF-MF links and calculate validated-link\
    \ enrichment ratios at the 90th and 95th percentile thresholds. Pool results across\
    \ the three datasets and perform chi-square contingency tests to determine statistical\
    \ significance (p < 0.05) of enrichment for each function relative to baseline\
    \ (individual scores alone) and to the reported \u2113\u2081/\u2082 function.\
    \ Visualise enrichment and rank metrics as heatmaps and line plots indexed by\
    \ function type and exponent p. Validation: verify that \u2113\u2081/\u2082 enrichment\
    \ ratios match Table 4 and Table D of supplementary text; confirm that the best-performing\
    \ alternative function achieves equal or superior enrichment compared to the three\
    \ originally reported functions. References: source article (DOI: 10.1371/journal.pcbi.1008920);\
    \ MSV000078836 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000078836);\
    \ MSV000085038 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000085038)"
