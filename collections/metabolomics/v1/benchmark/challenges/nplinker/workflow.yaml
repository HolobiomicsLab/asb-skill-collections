  task_openness: mixed
  method_alternatives:
  - BiG-SLICE could be used instead of BiG-SCAPE for BGC clustering, though BiG-SCAPE
    offers higher precision
  - "Instead of \u21132 (Euclidean norm), can use \u2113p-norm with varying p values\
    \ to combine scores"
  - Can use IOKR score or standardised strain correlation score individually, or vice
    versa, to order links
  - Vector embeddings as alternative to Multiple Kernel Learning for kernel optimization
  - Predicting molecular fingerprints directly from BGCs instead of relying on MIBiG
    homology
  - Alternative fingerprints targeting specific molecular substructures
  substitution_constraints:
  - IOKR can only rank links involving BGCs that have predicted molecular structures
    with significant homology to known BGCs
  - Strain correlation score requires strain information while IOKR requires structural
    predictions
instructions: Reproduce the 5-step workflow below. Honor each step's IO contract;
  produce the files listed under 'Final expected outputs'.
expected_final_outputs:
- path: "Ranked hypothetical link table (CSV or TSV) with GCF ID, MF ID, standardised\
    \ strain correlation score, IOKR score, combined \u2113\u2081/\u2082 score, and\
    \ metadata (strain count, BGC size, product type) sorted by combined score"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "NPLinker link objects and metadata structure (JSON or Python pickle) persisting\
    \ GCF\u2013MF and BGC\u2013spectrum relationships with associated scores"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Filtering and ranking statistics: count of links scoring above 90th percentile
    for each scoring function and their intersections'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Table of validated-link enrichment ratios (proportion of validated links /
    proportion of all links) indexed by combination function type and exponent p,
    for 90th and 95th percentiles across all three datasets
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Heatmap visualisation of validated-link enrichment as a function of exponent\
    \ p (0.5\u20133.0) and combination function type, with colour intensity proportional\
    \ to enrichment ratio"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Statistical significance test results (chi-square or Fisher exact p-values)\
    \ comparing validated-link enrichment for each combination function against the\
    \ baseline (either score alone) and against the reported \u2113\u2081/\u2082 function"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Line plot showing rank improvement (median percentile rank of validated links)\
    \ as a function of p for the \u2113_p family of norms"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
