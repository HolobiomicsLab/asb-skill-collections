narrative:
  tagline: Matchms is an open-source Python package for importing, processing, cleaning,
    and comparing mass spectrometry data. The package supports multiple spectral data
    formats and provides tools for metadata cleaning, peak filtering, and pairwise
    spectral similarity comparisons.
  pseudo_abstract: Matchms facilitates reproducible workflows for mass spectrometry
    (MS/MS) data analysis, supporting popular spectral data formats including mzML,
    mzXML, msp, metabolomics-USI, MGF, and JSON. The package implements metadata cleaning
    and validation tools alongside basic peak filtering mechanisms to ensure data
    accuracy and integrity. For spectral comparison, matchms applies various pairwise
    similarity measures, encompassing Cosine-related scores, molecular fingerprint-based
    comparisons, and metadata-related assessments. The software is distributed through
    multiple channels including PyPI and Bioconda, with release management procedures
    documented in the contributing guidelines.
  research_questions:
  - What metadata cleaning and validation tools does matchms provide, and how do they
    operate on mass spectrometry spectral data?
  - What are the input requirements and operational mechanics of matchms' peak filtering
    capability when applied to spectral data files?
  - How does matchms compute pairwise cosine similarity scores across a set of preprocessed
    mass spectra?
  - What is the operational mechanism by which matchms applies molecular fingerprint-based
    similarity measures to compare pairs of mass spectra?
  - Are the documented distribution channels (PyPI and Bioconda) for matchms functional
    and does the package import successfully after installation from these channels?
  methods_summary: "Import spectral data from a public MGF or MSP file repository\
    \ using matchms I/O functions. Apply matchms metadata cleaning filters to standardize\
    \ spectrum annotations (precursor m/z, retention time, compound identifiers, instrument\
    \ metadata). Apply matchms validation filters to remove spectra with missing or\
    \ malformed critical metadata fields. Export cleaned spectrum collection to output\
    \ file in MGF or JSON format. Validation: Run pytest on the cleaning module to\
    \ confirm filter logic executes without error and output spectrum count and metadata\
    \ completeness match expected thresholds. Load spectral data from a file in a\
    \ supported format using matchms import functionality. Apply matchms peak-filtering\
    \ functions to remove low-intensity and irrelevant peaks for data accuracy and\
    \ integrity. Export the filtered spectrum collection to an output file in the\
    \ original or compatible spectral format. Validation: filtered spectrum collection\
    \ is produced in valid spectral format (MGF, MSP, mzML, or JSON) with all peaks\
    \ from the original input preserved or removed according to the specified filtering\
    \ criteria. Load preprocessed spectra from input file using matchms spectrum importers.\
    \ Initialize cosine similarity scorer within matchms. Compute pairwise cosine\
    \ similarity scores across all spectrum pairs. Construct scores matrix with spectrum\
    \ identifiers as row and column labels. Validation: Verify output scores matrix\
    \ has dimensions N\xD7N where N equals the number of input spectra, and all values\
    \ are in the range [0, 1]. Load preprocessed mass spectra from a matchms-compatible\
    \ file format (mzML, mzXML, msp, MGF, or JSON) into memory. Apply the molecular\
    \ fingerprint-based similarity measure available in matchms to compute pairwise\
    \ similarity scores for all spectra. Export the pairwise similarity matrix to\
    \ a named output file in tabular format. Validation: Output matrix is symmetric,\
    \ contains similarity scores for all spectrum pairs, and matches expected dimensions\
    \ (N\xD7N where N is number of spectra). Create isolated Python environment (virtual\
    \ environment or fresh conda env) to ensure clean installation baseline. Download\
    \ and install matchms from PyPI using pip, capturing installation logs and any\
    \ error messages. Execute Python import statement 'import matchms' and verify\
    \ no ImportError or ModuleNotFoundError exceptions occur; record success status.\
    \ Create second isolated conda environment and install matchms from Bioconda channel,\
    \ capturing installation logs. Execute Python import statement 'import matchms'\
    \ in the Bioconda environment and verify no ImportError or ModuleNotFoundError\
    \ exceptions occur; record success status. Validation: Both PyPI and Bioconda\
    \ installations complete without error, and matchms module imports successfully\
    \ in both environments, confirming both distribution channels are functional."
