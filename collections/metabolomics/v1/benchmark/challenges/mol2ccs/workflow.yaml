narrative:
  tagline: This work reproduces the evaluation of graph neural networks for predicting
    collision cross section and analyzes feature importance to identify key structural
    drivers of GNN predictions.
  pseudo_abstract: 'Reproduces 1 reported result: The paper evaluates the generalizability
    of graph neural networks for predicting collision cross section, as described
    in Engler et al. 2024. Analyses 1 derived result: The repository contains code
    and data for evaluating graph neural networks trained to predict collision cross
    section, enabling post-hoc attribution analysis to identify key structural drivers.
    Reconstructs 1 described mechanism (described in the paper but not separately
    evaluated there): The repository contains code for preprocessing raw SMILES strings
    from the CCS dataset into atom and bond feature tensors (graph objects) that serve
    as input to the graph neural network. Extends the paper in 1 task beyond its reported
    scope: The paper evaluates graph neural networks for predicting collision cross
    section, establishing a baseline for GNN-based approaches that can be extended
    with alternative architectures.'
  research_questions:
  - Can graph neural network models trained for collision cross section prediction
    generalize effectively to held-out test data?
  - Which molecular structural features are most important for driving graph neural
    network predictions of collision cross section?
  - How are SMILES strings from the CCS dataset preprocessed and converted into graph
    tensor representations suitable for GNN input?
  - How do alternative graph neural network architectures (e.g., GAT, MPNN) compare
    to the original GNN architecture in predicting collision cross section on the
    same dataset split?
  methods_summary: "Load pre-trained GNN model checkpoint from enveda/ccs-prediction\
    \ repository. Load and preprocess CCS dataset; partition into train/validation/test\
    \ splits or load held-out test set. Execute GNN inference on test set to generate\
    \ CCS predictions. Compute regression metrics (RMSE, MAE, R\xB2) on predictions\
    \ versus ground truth. Validation: reported metric values match paper-cited generalizability\
    \ benchmarks within numerical precision tolerance. Load trained GNN model and\
    \ test molecular graphs from repository Perform node and edge feature ablation\
    \ by iterative masking and prediction delta measurement Compute gradient-based\
    \ saliency via backpropagation through model Aggregate ablation and saliency scores\
    \ across test set; normalize by feature frequency or molecular properties Rank\
    \ features by total importance and produce ranked table and bar/heatmap visualization\
    \ Validation: output table contains \u226510 ranked features with non-zero importance\
    \ scores; visualization clearly labels top features and shows relative magnitudes\
    \ Load raw SMILES strings from the CCS dataset repository. Canonicalize each SMILES\
    \ string using RDKit to ensure structural uniqueness. Convert each canonical SMILES\
    \ to a molecular graph representation. Extract atom-level features (atomic number,\
    \ charge, hybridization, aromaticity) and bond-level features (type, aromaticity,\
    \ stereochemistry). Construct node and edge feature tensors encoding molecular\
    \ structure. Serialize all graph objects and associated metadata to a standard\
    \ PyTorch or pickle format. Validation: confirm output file exists and contains\
    \ graph tensors with shapes consistent with expected atom/bond dimensions. Clone\
    \ enveda/ccs-prediction repository and load preprocessed CCS dataset with train/val/test\
    \ splits. Implement alternative message-passing GNN (GAT or MPNN) with matching\
    \ input/output dimensions. Train alternative architecture on training set using\
    \ original hyperparameters and loss function. Evaluate both original and alternative\
    \ models on test set, computing RMSE, MAE, accuracy, training time, and inference\
    \ speed. Generate comparative performance table documenting results side-by-side.\
    \ Validation: Ensure test-set RMSE and MAE values are computed consistently for\
    \ both architectures and table is reproducible from stored model weights."
  domain: cheminformatics
