narrative:
  tagline: MobiLipid is a tool that streamlines lipidomics workflows by automating
    collision cross section (CCS) bias assessment and correction in ion mobility-mass
    spectrometry analyses through internal standardization using a newly established
    DTCCSN2 library for U13C labeled lipids.
  pseudo_abstract: MobiLipid provides a newly established DTCCSN2 library for U13C
    labeled lipids distributed with the code and implements CCS bias assessment and
    correction mechanisms within an R Markdown workflow that integrates into IM-MS
    lipidomics analyses. The tool employs internal standardization with U13C labeled
    lipids to enable CCS bias calculation and correction without requiring additional
    external calibration beyond vendor-specific requirements. Analysis of the tool
    demonstrates that effective CCS bias calculation and correction can be achieved
    while requiring only a low number of lipids detected per lipid class.
  research_questions:
  - What is the structure, lipid class coverage, and range of CCS values contained
    in the DTCCSN2 library for U13C labeled lipids that is distributed with MobiLipid?
  - How does MobiLipid calculate CCS bias in IM-MS lipidomics data using internal
    standardization with U13C labeled lipids?
  - How does MobiLipid apply CCS bias correction using the automated R Markdown workflow
    to transform assessed bias measurements into corrected CCS values?
  - What is the minimum number of lipids per lipid class required to achieve effective
    CCS bias estimation and correction using the MobiLipid workflow?
  methods_summary: "Clone or download the MobiLipid repository from GitHub. Locate\
    \ and open the DTCCSN2 library file and inspect its file format (e.g., CSV, TSV,\
    \ or R data object). Parse and extract all records, verifying presence of required\
    \ fields (lipid identifier, class, CCS value, measurement conditions). Enumerate\
    \ and count lipid classes and verify CCS value distributions are consistent with\
    \ expected ranges for ion mobility data. Compare observed library composition\
    \ against specifications stated in project documentation and paper abstract. Validation:\
    \ confirm file loads without error, all required fields are populated, CCS values\
    \ are numeric and physically plausible, and lipid class coverage matches documented\
    \ scope. Load IM-MS experimental data and DTCCSN2 reference library into R environment.\
    \ Match experimental lipid features to reference library entries by m/z, retention\
    \ time, and lipid class annotation. Calculate per-lipid CCS bias as measured CCS\
    \ minus theoretical CCS value from library. Aggregate bias metrics by lipid class\
    \ and compute summary statistics (mean, SD, range, quartiles). Validation: Report\
    \ generated with per-class bias means and confidence intervals; bias values within\
    \ expected instrument calibration tolerance (typically \xB12\u20133%) indicate\
    \ acceptable CCS quality. Load bias assessment output containing calculated bias\
    \ factors and correction statistics stratified by lipid class. Apply class-specific\
    \ CCS bias correction factors to measured CCS values using the MobiLipid correction\
    \ algorithm. Generate output table with original CCS, corrected CCS, applied bias\
    \ factor, and lipid identifiers. Validation: corrected CCS values are produced\
    \ for all lipids with assigned bias factors; output matches expected tabular structure\
    \ and contains no missing values in corrected CCS column. Load the DTCCSN2 reference\
    \ library and experimental IM-MS lipidomics data into R. Systematically subsample\
    \ detected lipids per class across a range of counts (e.g., 1\u201310 lipids per\
    \ class). Apply MobiLipid internal standardization with U13C labeled lipids to\
    \ calculate CCS bias at each subsampling level without external calibration. Compute\
    \ bias estimation quality metrics (residual error, accuracy, or deviation) for\
    \ each lipid class and count level. Generate a summary table and visualization\
    \ showing how CCS bias estimation quality stabilizes with increasing lipid counts\
    \ per class. Validation: confirm that effective CCS bias correction is achieved\
    \ with a low number of lipids per class, as indicated by convergence of bias metrics\
    \ and acceptable residual error (acceptance criterion to be determined by reported\
    \ thresholds in the paper)."
