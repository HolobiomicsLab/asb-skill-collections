narrative:
  tagline: mzmine is an open-source mass spectrometry data processing software designed
    with comprehensive workflow modules supporting multiple chromatography and imaging
    techniques. A development build release workflow is operationalized and accessible
    via GitHub Actions.
  pseudo_abstract: mzmine provides a user-friendly and extensible platform for mass
    spectrometry data analysis, architected with a complete set of modules spanning
    the entire MS data analysis workflow. The software is designed to support liquid
    chromatography (LC), gas chromatography (GC), ion mobility spectrometry (IMS),
    MS imaging (such as MALDI), and most MS instruments. Development builds are configured
    and accessible through the mzmine/mzmine repository's GitHub Actions, with the
    dev_build_release.yml workflow operational and linked via status badge.
  research_questions:
  - What is the complete set of processing modules provided by mzmine, and does each
    supported separation/ionisation technique (LC, GC, IMS, MS imaging) have at least
    one corresponding module in the software architecture?
  - Does the dev_build_release.yml GitHub Actions workflow for the mzmine/mzmine repository
    complete successfully and produce build artifacts?
  methods_summary: 'Clone or access the mzmine GitHub repository to retrieve the complete
    source code and documentation structure. Identify and enumerate all processing
    modules within the codebase by scanning the module directory structure and build
    configuration. Extract module metadata (name, purpose, supported data types) from
    source code documentation and README files. Map each module to one or more of
    the four supported separation/ionisation types: LC, GC, IMS, MS Imaging. Construct
    a coverage matrix showing which modules support each type. Validation: confirm
    that each of the four separation/ionisation types (LC, GC, IMS, MS Imaging) is
    assigned to at least one module, as stated in the article''s core finding that
    mzmine provides ''a complete set of modules covering the entire MS data analysis
    workflow'' with support for all four modalities. Access the GitHub Actions workflow
    endpoint for dev_build_release.yml in the mzmine/mzmine repository. Retrieve the
    most recent workflow run record, including status (success/failure), execution
    timestamp, and job logs. Extract and document build artifacts generated by the
    workflow (compiled binaries, installers, or packages). Record any error messages,
    warnings, or dependency issues from the build and test phases. Validation: confirm
    that workflow status (pass/fail) is unambiguously recorded and all listed artifacts
    are retrievable or their URLs are documented.'
