narrative:
  tagline: "ViMMS is a flexible simulation framework for prototyping and comparing\
    \ fragmentation strategies in liquid chromatography\u2013tandem mass spectrometry-based\
    \ metabolomics without requiring real instrument time."
  pseudo_abstract: "ViMMS (Virtual Metabolomics Mass Spectrometer) is a modular framework\
    \ designed to simulate fragmentation strategies in LC-MS/MS metabolomics. The\
    \ framework enables researchers to generate virtual chemicals through various\
    \ sampling methods (e.g., from HMDB databases or uniform m/z distributions), configure\
    \ virtual mass spectrometers with customizable noise models, and execute fragmentation\
    \ strategies via controller implementations such as Top-N data-dependent acquisition\
    \ (DDA) and data-independent acquisition (DIA) methods including SWATH and all-ion\
    \ fragmentation. An Environment class orchestrates the interaction between chemicals,\
    \ mass spectrometer, and controller, executing the acquisition simulation and\
    \ exporting results to mzML format for downstream analysis. The framework supports\
    \ evaluation of simulation outputs through coverage and intensity metrics, and\
    \ can interface with real instruments via the vimms_fusion extension. Demonstrated\
    \ applications include generating full-scan MS1 data from simulated chemicals,\
    \ reproducing Top-N fragmentation on real beer metabolomics data for validation,\
    \ and sampling 73,822 filtered HMDB formulae in the m/z range 100\u20131000 for\
    \ chemical generation."
  research_questions:
  - Can ViMMS simulate a full-scan MS1 acquisition on a set of known chemical compounds
    sampled from the HMDB database and produce a valid mzML output file?
  - Can ViMMS simulate Top-N MS/MS acquisition on real beer samples and reproduce
    the fragmentation coverage observed in the original experimental data?
  - How are the three core components (Chemicals, IndependentMassSpectrometer, and
    Controller) orchestrated by the Environment class to execute a complete simulation
    control loop?
  - "Can the reported count of 73,822 unique formulas in the HMDB database (filtered\
    \ for m/z 100\u20131000) be reproduced by running DatabaseFormulaSampler on the\
    \ downloaded raw HMDB data?"
  - How do evaluation metrics from WeightedDEWController differ from the baseline
    TopNController when both are run through the ViMMS simulation framework?
  methods_summary: "Load or initialize HMDB compound database and sample 100 chemical\
    \ formulas within m/z 100\u20131000 range. Generate KnownChemical objects with\
    \ simulated retention times, intensities, and MS1 chromatograms. Instantiate virtual\
    \ mass spectrometer and configure FullScanController for MS1-only (no MS2) acquisition.\
    \ Execute Environment simulation loop to record scans at 1\u20135 second intervals\
    \ across 0\u20131200 second run time. Export simulated scans to mzML format and\
    \ optionally pickle EvaluationData for ground-truth reference. Validation: Verify\
    \ mzML file is valid and contains MS1 scans only with correct polarity, retention\
    \ time range, and m/z values matching sampled chemicals. References: source article\
    \ (DOI: 10.1021/acs.analchem.0c03895) Download and load the Beer1pos real mzML\
    \ file from the vimms-data repository. Extract unknown chemical objects (m/z,\
    \ retention time, intensity profiles) from the real mzML using ChemicalMixtureFromMZML.\
    \ Instantiate an IndependentMassSpectrometer with the extracted chemicals and\
    \ positive polarity mode. Configure a TopNController with N=5, isolation_width=1,\
    \ and match the real acquisition intensity thresholds. Run the simulation via\
    \ Environment.run() and export the simulated mzML. Apply consistent peak detection\
    \ (OpenMS parameters) to both real and simulated mzML files. Compute fragmentation\
    \ coverage and intensity metrics and compare across datasets. Validation: reproduce\
    \ the reported Top-N fragmentation coverage and intensity comparison for Beer1pos\
    \ from the demo notebook, confirming consistency of simulated versus real acquisition\
    \ metrics. References: source article (DOI: 10.1021/acs.analchem.0c03895) Instantiate\
    \ a formula sampler (UniformMZFormulaSampler) with m/z bounds 100\u2013500 Da.\
    \ Create a chemical mixture from the sampler using ChemicalMixtureCreator, sampling\
    \ 100 chemicals with MS1 and MS2 levels. Construct an IndependentMassSpectrometer\
    \ in positive polarity mode with the chemical list. Configure a TopNController\
    \ with fixed parameters: N=3, isolation_width=1, mz_tol=10, rt_tol=15, min_ms1_intensity=1.75E5.\
    \ Build an Environment object spanning 0\u20131440 s, register the mass spectrometer\
    \ and controller, and invoke run(). Validation: confirm that env.scans is a non-empty\
    \ list containing both MS1 and MS2 Scan objects with valid m/z, intensity, and\
    \ retention-time fields. References: source article (DOI: 10.1021/acs.analchem.0c03895)\
    \ Download the HMDB database file from the vimms-data public repository. Load\
    \ HMDB data into memory using ViMMS's built-in HMDB loading functions. Instantiate\
    \ DatabaseFormulaSampler with the loaded HMDB data and configure m/z range constraints\
    \ (or other filter criteria as present in the benchmark). Execute the sampler's\
    \ filtering pipeline to extract and deduplicate molecular formulas. Count unique\
    \ formulas in the filtered output and record the result. Validation: verify that\
    \ the output formula count equals 73,822 as reported in the benchmark. References:\
    \ source article (DOI: 10.1021/acs.analchem.0c03895) Sample 100 virtual metabolites\
    \ across m/z 100\u2013500 with two MS levels using UniformMZFormulaSampler. Instantiate\
    \ IndependentMassSpectrometer with POSITIVE polarity and the generated chemicals.\
    \ Configure WeightedDEWController with use_weighteddew_exclusion=True, N=3, isolation_width=1\
    \ m/z, mz_tol=10 ppm, rt_tol=15 s, and min_ms1_intensity=1.75E5. Run the Environment\
    \ simulation loop from t=0 to 1440 s with save_eval=True to capture fragmentation\
    \ events and scan traces. Serialize the mzML output and pickled EvaluationData\
    \ object to disk. Compute evaluation metrics (times_fragmented_summary, cumulative\
    \ intensity) from the pickle and compare against baseline TopNController result\
    \ to verify performance differentiation. Validation: Confirm that the WeightedDEW\
    \ run produces a non-zero times_fragmented_summary metric with at least one chemical\
    \ fragmented at least twice, and that cumulative intensity and fragmentation breadth\
    \ metrics differ measurably from the baseline TopN run. References: source article\
    \ (DOI: 10.1021/acs.analchem.0c03895)"
  domain: metabolomics
  techniques:
  - data-independent-acquisition
  - feature-detection
  - machine-learning
  - metabolite-identification
