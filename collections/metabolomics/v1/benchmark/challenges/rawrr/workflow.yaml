  task_openness: closed
  method_alternatives:
  - MaxQuant or Skyline outputs can be processed by MSstats for statistical analysis
  - ProteoWizard or ThermoRawFileParser can convert raw data to mzML format for use
    with R libraries
  - Mono (instead of .NET 8.0)
  - Base peak chromatogram (BPC) instead of total ion chromatogram (TIC)
  - Deriving retention time from maximum intensity as alternative to peak fitting
  substitution_constraints:
  - rawrr requires Thermo Fisher Scientific Orbitrap instrument data in proprietary
    raw file format
  - ThermoFisher.CommonCore dlls must be obtained through RawFileReader repository
    or by contacting Jim Shofstahl
  - rawrrSpectrum content partially depends on the instrument model and installed
    instrument control software version
  - Windows systems require decimal symbol configured as '.' for mZ and intensity
    vector extraction
