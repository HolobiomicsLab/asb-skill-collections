narrative:
  tagline: rawrr is an R package providing direct access to proprietary Thermo Fisher
    Scientific Orbitrap mass spectrometry data via vendor APIs, enabling modular end-to-end
    proteomics analysis pipelines in R without format conversion. The package wraps
    RawFileReader .NET assemblies through a two-layer architecture and demonstrates
    bottom-up proteomics applications including spectrum analysis and retention time
    calibration.
  pseudo_abstract: "This work presents rawrr, an R package that provides direct access\
    \ to binary Thermo Fisher Scientific Orbitrap raw data files by wrapping the vendor-supplied\
    \ RawFileReader API through compiled C# wrapper methods. The package implements\
    \ S3 objects (rawrrSpectrum, rawrrChromatogram) and reader functions (readFileHeader,\
    \ readSpectrum, readChromatogram, readIndex, readTrailer) that extract spectral\
    \ and chromatographic data without requiring conversion to exchange formats. Two\
    \ use cases demonstrate practical application: (1) direct spectrum analysis of\
    \ a 40.5-minute parallel reaction monitoring (PRM) run on a Q Exactive HF yielded\
    \ scan 9594 with resolving power of 30,000 at 200 m/z and AGC injection time of\
    \ 2.8 ms; y-ion signals for the doubly-charged LGGNEQVTR peptide were tens to\
    \ hundreds of times above noise. (2) iRT regression using 11 reference peptides\
    \ extracted via readChromatogram showed highly linear retention time behavior\
    \ (high R\xB2) across a 20-minute C18 gradient, with consecutive PRM scans consistently\
    \ spaced 22 scans apart. Benchmark testing of readSpectrum throughput across multiple\
    \ runs with random scan IDs demonstrated spectra-per-second performance with total\
    \ runtime of approximately 0.5 seconds. The package architecture comprises an\
    \ R layer invoking compiled C# wrapper methods via system calls, with data written\
    \ to temporary storage and parsed back into R objects."
  research_questions:
  - Does the linear regression model fitted to iRT peptide retention times (rtFittedAPEX
    ~ iRTscore) demonstrate highly linear RT behavior as indicated by R-squared value?
  - What is the measured throughput of rawrr::readSpectrum in spectra per second when
    benchmarked on the sample raw file provided with the package?
  - Does rawrr::readSpectrum successfully extract scan 9594 from the raw file with
    reported Orbitrap parameters (resolving power of 30,000 at 200 m/z and AGC injection
    time of 2.8 ms) and signal-to-noise characteristics consistent with high-quality
    peptide fragmentation?
  - Does the parallel reaction monitoring (PRM) acquisition in the example raw file
    maintain consistent scan spacing across all cycles targeting the LGGNEQVTR++ precursor
    ion?
  - Can the rawrr package's internal assembly dispatch functions (rawrr:::.rawrrAssembly()
    and rawrr:::.getRawrrAssemblyVersion()) successfully retrieve the assembly path
    and version string without requiring a raw data file as input?
  methods_summary: "Retrieve the public raw LC-MS file 20181113_010_autoQC01.raw from\
    \ MassIVE (MSV000086542) and verify file integrity. Read file header metadata\
    \ using rawrr::readFileHeader() to confirm instrument configuration and run time\
    \ range. Extract precursor m/z chromatograms for known iRT peptides using rawrr::readChromatogram()\
    \ with type='xic', mass tolerance 10 ppm, and MS-level filter. Fit intensity traces\
    \ within each rawrrChromatogram object to identify retention time at peak maximum\
    \ (rtFittedAPEX) for each iRT standard. Construct and fit linear regression model\
    \ lm(rtFittedAPEX ~ iRTscore) using extracted retention times and reference iRT\
    \ scores. Validation: Report R-squared value; confirm R\xB2 \u2265 0.99 to establish\
    \ highly linear retention-time behavior as reported in the paper. References:\
    \ source article (DOI: 10.1021/acs.jproteome.0c00866); MSV000086542 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000086542)\
    \ Install rawrr package and verify .NET 8.0 runtime availability. Load example\
    \ Orbitrap raw file (20181113_010_autoQC01.raw) containing centroided FTMS and\
    \ HCD MS2 spectra. Execute rawrr:::.benchmark using rawrr::readSpectrum, which\
    \ triggers C# wrapper method invocation via system call to RawFileReader assembly.\
    \ Capture measured spectra-per-second throughput from benchmark execution output.\
    \ Validation: Confirm reported throughput metric is present and numerically reasonable\
    \ (consistent with paper's reported performance under identical experimental conditions).\
    \ References: source article (DOI: 10.1021/acs.jproteome.0c00866); MSV000086542\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000086542) Load\
    \ raw file 20181113_010_autoQC01.raw (Thermo Fisher Q Exactive HF, Orbitrap FTMS)\
    \ from MassIVE MSV000086542. Call rawrr::readSpectrum(scan=9594) to invoke C#\
    \ wrapper and RawFileReader API, returning centroided spectrum object with 119\
    \ metadata items. Extract instrumental parameters (resolving power at 200 m/z,\
    \ AGC target, injection time) from spectrum metadata and verify against reported\
    \ hardware specifications. Parse m/z and intensity arrays; identify y-ion fragments\
    \ by theoretical m/z matching for peptide LGGNEQVTR. Compute signal-to-noise ratio\
    \ for each y-ion relative to local baseline and confirm all exceed tens-to-hundreds\
    \ counts above noise. Validation: Confirm resolving power = 30,000, injection\
    \ time = 2.8 ms, and all y-ion SNR \u2265 10:1 (tens of counts above baseline\
    \ for high-quality MS/MS data). References: source article (DOI: 10.1021/acs.jproteome.0c00866);\
    \ MSV000086542 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000086542)\
    \ Install and initialize the rawrr package with compiled C# wrapper methods bound\
    \ to the RawFileReader .NET assembly. Invoke rawrr::readIndex() to extract the\
    \ complete scan metadata index from the binary .raw file via system call to the\
    \ managed C# layer. Parse the scanType field to identify and filter rows matching\
    \ the PRM acquisition pattern (fixed precursor m/z and HCD collision energy).\
    \ Compute inter-scan deltas as the difference between consecutive scan numbers\
    \ in the filtered PRM subset. Validate that all deltas equal 22 scans, confirming\
    \ single-cycle consistency across the acquisition run. Validation: Pass criterion\
    \ is 100% of observed inter-scan deltas equal 22 scans; any deviation flags acquisition\
    \ irregularity. References: source article (DOI: 10.1021/acs.jproteome.0c00866);\
    \ MSV000086542 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000086542)\
    \ Load the rawrr R package into the R environment Call the internal function rawrr:::.rawrrAssembly()\
    \ to retrieve the file system path to the bundled .NET 8.0 assembly executable\
    \ Validate that the returned path exists and points to rawrr.exe Call the internal\
    \ function rawrr:::.getRawrrAssemblyVersion() to retrieve the version metadata\
    \ of the managed assembly Verify that a non-empty version string is returned Validation:\
    \ Both accessor functions execute without error and return expected output types\
    \ (path string and version string) without requiring a raw data file input, confirming\
    \ the internal dispatch mechanism is operational References: source article (DOI:\
    \ 10.1021/acs.jproteome.0c00866); MSV000086542 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000086542)"
