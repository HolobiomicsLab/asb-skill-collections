narrative:
  tagline: SIRIUS is a Java-based software framework for LC-MS/MS metabolite analysis
    that integrates multiple web service components including CSI:FingerID, CANOPUS,
    and MSNovelist. The paper documents the framework architecture and confirms that
    the Build and Publish CI workflow for the SIRIUS release branch executes successfully.
  pseudo_abstract: 'Reproduces 1 reported result: The Build and Publish workflow for
    sirius-ms/sirius is configured to run on the release branch and is accessible
    via a status badge in the README. Reconstructs 4 described mechanisms (described
    in the paper but not separately evaluated there): SIRIUS is implemented as a Java-based
    software framework designed to accept LC-MS/MS data as input for downstream analysis.
    CSI:FingerID is a SIRIUS web service component that processes spectrum queries
    as part of the integrated LC-MS/MS analysis framework. CANOPUS is offered as a
    web service component within the SIRIUS framework for academic research and education
    use, enabling remote submission of queries for compound-class annotation. MSNovelist
    is offered as a web service component within the SIRIUS framework alongside CSI:FingerID
    and CANOPUS for scientific analysis.'
  research_questions:
  - How does SIRIUS ingest and parse LC-MS/MS data into a structured representation
    within its Java framework?
  - How does the CSI:FingerID web service accept a parsed mass spectrum query and
    return a molecular fingerprint prediction?
  - What is the mechanism by which CANOPUS accepts a fingerprint or spectrum query
    and returns a structured compound-class annotation result?
  - How does the MSNovelist web service endpoint accept a query input and return de-novo
    generated candidate structures?
  - Does the GitHub Actions 'Build and Publish' workflow on the release branch of
    the sirius-ms/sirius repository execute successfully and produce a passing build
    status?
  methods_summary: 'Load raw LC-MS/MS data files into SIRIUS Java framework Parse
    and extract spectral metadata (precursor m/z, retention time, collision energy,
    fragment assignments) Construct hierarchical spectrum objects with indexed MS1
    and MS/MS data Validate spectral quality (non-zero ion counts, valid mass ranges,
    metadata completeness) Validation: All input spectra successfully parsed with
    no missing mandatory metadata fields and ion counts verified as non-zero Prepare
    MS/MS spectrum metadata and fragment peak list Format spectrum query according
    to CSI:FingerID API specification Submit HTTP POST request to CSI:FingerID web
    service endpoint Parse JSON response to extract fingerprint prediction and confidence
    metrics Validation: Verify response JSON contains fingerprint prediction data
    with non-empty bit vector or scored features Prepare fingerprint or spectrum input
    in CANOPUS-compatible format Submit query to CANOPUS web service endpoint Retrieve
    structured compound-class annotation response Parse and validate annotation fields
    (class, confidence) Validation: Response contains predicted compound class and
    confidence score fields Format query with molecular m/z and optional MS/MS spectrum
    data Submit query to MSNovelist web service REST endpoint Retrieve and parse JSON
    response containing ranked candidate structures Serialize candidates with scores
    and metadata to output file Validation: Verify that output file contains at least
    one ranked candidate structure with valid SMILES notation and associated score
    Access the sirius-ms/sirius repository via GitHub and locate the release branch.
    Review the distribute.yaml workflow configuration to identify build triggers and
    pipeline stages. Trigger the workflow by creating a release tag or pushing to
    the release branch according to distribute.yaml trigger conditions. Monitor the
    GitHub Actions interface until the workflow run completes. Validation: Confirm
    the workflow run status displays ''passed'' and the README build badge shows a
    passing status indicator (green badge with ''passing'' or ''success'' label).'
  domain: cheminformatics
