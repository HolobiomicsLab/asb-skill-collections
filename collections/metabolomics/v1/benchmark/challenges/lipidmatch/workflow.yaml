narrative:
  tagline: LipidMatch is a comprehensive open-source lipid identification software
    that matches experimental fragment m/z values against in-silico fragmentation
    libraries containing over 500,000 lipid species across 60+ lipid types. The tool
    has been validated across multiple instrument platforms and acquisition modes,
    including Q-Exactive orbitrap, Agilent, Bruker, and SCIEX Q-TOF systems.
  pseudo_abstract: LipidMatch performs lipid identification by matching experimental
    fragment m/z values against simulated m/z values from in-silico fragmentation
    libraries containing over 500,000 lipid species across over 60 lipid types. The
    software has been validated using Q-Exactive orbitrap UHRLC-HRMS/MS data with
    targeted, data-dependent top-N (ddMS2-topN), and all-ion fragmentation (AIF) acquisition
    approaches, as well as Agilent, Bruker, and SCIEX Q-TOF UHRLC-HRMS/MS instruments
    in both direct infusion and imaging experiments; Waters instruments are explicitly
    unsupported. LipidMatch is modular and accepts input from external peak-picking
    tools including MZmine, XCMS, MS-DIAL, and Compound Discoverer. The software provides
    functionality to integrate user-generated lipid libraries in .csv format, enabling
    custom lipid entries to be incorporated into the matching workflow for specialized
    applications.
  research_questions:
  - Do the LipidMatch library files deposited in the GitHub repository contain at
    least 500,000 distinct lipid species across 60 or more lipid-type categories?
  - How does LipidMatch match experimental fragment m/z values to in-silico library
    m/z values to identify lipids?
  - What is the complete matrix of instrument/vendor and acquisition mode combinations
    for which LipidMatch has been validated, and what instrument platforms are explicitly
    unsupported?
  - Does LipidMatch successfully load and integrate user-authored .csv lipid libraries
    such that custom lipid entries become available as matching candidates in subsequent
    analyses?
  - How does LipidMatch convert and ingest peak-picking output from MZmine into its
    analysis pipeline?
  methods_summary: "Obtain the LipidMatch library files from the official GitHub repository.\
    \ Parse all .csv library files and extract lipid species identifiers and category\
    \ assignments. Deduplicate lipid species identifiers across all files to obtain\
    \ a count of distinct species. Enumerate all unique lipid-type categories present\
    \ in the aggregated data. Compare aggregated counts against reported thresholds\
    \ (\u2265500,000 species, \u226560 types). Validation: Confirm that distinct species\
    \ count \u2265500,000 AND distinct category count \u226560; output counts and\
    \ pass/fail status. Load experimental fragment m/z peaklist from Q-Exactive or\
    \ Q-TOF instrument output Load LipidMatch pre-computed in-silico fragmentation\
    \ library (500,000+ species, 60+ lipid classes) Apply m/z matching algorithm with\
    \ mass tolerance threshold to compare experimental fragments against library entries\
    \ Score and rank candidate lipid matches by similarity and confidence metrics\
    \ Validation: output table contains matched lipid identifications with m/z error\
    \ within instrument tolerance specification and match scores above confidence\
    \ threshold Access the LipidMatch GitHub repository and official documentation\
    \ Identify and list all instrument vendors and models explicitly named as supported\
    \ (Q-Exactive orbitrap, Agilent Q-TOF, Bruker Q-TOF, SCIEX Q-TOF) Extract all\
    \ acquisition modes documented as validated (targeted, ddMS2-topN, AIF, direct\
    \ infusion, imaging) Map each vendor\u2013mode combination found in the documentation\
    \ Record the single documented unsupported platform (Waters) with status annotation\
    \ Validation: Completeness verified by confirmation that all four supported vendors\
    \ and all five acquisition modes from the EnrichedIndex findings are represented\
    \ in the table, and Waters is marked as unsupported Retrieve LipidMatch software\
    \ from GitHub repository and install according to documentation. Author a test\
    \ lipid library in .csv format with custom entries including lipid identifiers,\
    \ m/z values, and fragmentation patterns. Load the custom library into LipidMatch\
    \ by placing the .csv file in the library directory and executing the library\
    \ integration step. Run a test matching workflow on sample MS/MS data (or synthetic\
    \ fragment list) with the integrated library active. Validate: inspect the output\
    \ candidate list to confirm custom library entries appear ranked among the matching\
    \ results (at least one custom entry must be present and retrievable). Load peak\
    \ table output from the peak-picking tool in its native format. Apply the LipidMatch\
    \ batch file or conversion script to standardize column structure and data types.\
    \ Map peak-picker columns (m/z, retention time, intensity) to LipidMatch input\
    \ schema. Validation: confirm output file structure matches LipidMatch input schema\
    \ (required columns present, correct data types, non-zero row count)."
