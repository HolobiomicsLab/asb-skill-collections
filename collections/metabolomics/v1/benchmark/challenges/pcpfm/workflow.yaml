narrative:
  tagline: The Python-Centric Pipeline for Metabolomics (PCPFM) is an end-to-end preprocessing
    framework that converts raw LC-MS data through feature extraction, quality control,
    normalization, and annotation to produce analysis-ready metabolomic feature tables
    and empirical compound annotations.
  pseudo_abstract: 'PCPFM orchestrates a fixed sequence of metabolomics data processing
    steps: raw file conversion to mzML format, Asari-based feature extraction yielding
    full and preferred feature tables, blank masking by intensity ratio comparison,
    sample filtering by metadata or quality control results, TIC normalization using
    common features above a percentile threshold, missing value imputation as multiples
    of minimum per-feature values, optional pycombat-based batch correction for multi-batch
    experiments, and empirical compound construction via khipu with configurable mz/rt
    tolerances and adduct/isotope definitions. The pipeline outputs standardized feature
    tables and JSON-formatted empirical compounds ready for downstream statistical
    analysis, with intermediate results and quality control visualizations stored
    in a structured experiment directory.'
  research_questions:
  - What are the sequential data processing steps that the PCPFM pipeline executes
    to transform raw LC-MS metabolomics data into normalized feature tables ready
    for statistical analysis?
  - How does the blank_masking command filter features from a metabolomics feature
    table based on the intensity ratio between unknown samples and blank samples?
  - How does the impute command replace zero and missing values in a metabolomics
    feature table using a minimum-value-based interpolation strategy?
  - How does the build_empCpds command construct empirical compound groups from a
    feature table using khipu with configurable mz and retention time tolerances?
  - Does batch correction via pycombat preserve the structural integrity (sample and
    feature count) of multi-batch metabolomics feature tables while reducing inter-batch
    variance?
  methods_summary: "Parse and validate CSV metadata; create experiment directory structure\
    \ and initialize experiment.json state object with sample metadata, file paths,\
    \ and sample-type annotations. Convert Thermo .raw files to centroid mzML using\
    \ ThermoRawFileParser; store converted files in experiment/converted_acquisitions\
    \ subdirectory. Run Asari feature extraction on mzML files with inferred ionization\
    \ mode, m/z tolerance (5 ppm), and retention-time tolerance (2 sec); generate\
    \ 'full' and 'preferred' feature table monikers. Apply blank masking by comparing\
    \ feature intensity ratios (study samples vs. blanks, default 3\xD7) to remove\
    \ likely contaminants and background ions; retain filtered feature table moniker.\
    \ Drop unwanted samples (blanks, QC, outliers) via metadata field or QAQC filter\
    \ criteria; generate trimmed feature table moniker. Normalize feature intensities\
    \ using TIC of common features (default 90th percentile) with within-batch and\
    \ between-batch correction if multiple batches present; apply normalization factors\
    \ to all samples. Impute missing values using multiplicative floor (default 0.5\xD7\
    \ per-feature minimum) to handle zero or missing entries while respecting multiplicative\
    \ error structure. Remove infrequent features below retention percentile (default\
    \ 50%) to discard rare and potentially spurious features; generate filtered feature\
    \ table moniker. Build empirical compounds from final feature table using khipu\
    \ with adducts (z \u2264 3), isotope patterns (13C3), m/z tolerance (5 ppm), and\
    \ retention-time tolerance (2 sec); assign pre-annotations (adduct class, isotope\
    \ status) and generate empCpd.json. Validation: Verify feature table row count\
    \ > 0, empCpd.json contains \u22651 compound objects with required keys (adducts,\
    \ rt, mz, features), and experiment.json tracks all moniker transformations with\
    \ no gaps in processing history. References: source article (DOI: 10.1371/journal.pcbi.1011912)\
    \ Load feature table and metadata; parse sample types from the specified query\
    \ field. Partition samples into blank and unknown groups based on the provided\
    \ blank_value and sample_value. Calculate per-feature median/mean intensity within\
    \ each group, excluding zeros. Compute intensity ratio (unknown/blank) for each\
    \ feature. Apply threshold filter: retain features where ratio \u2265 blank_intensity_ratio\
    \ (default 3). Validation: Verify that dropped features are those with ratio <\
    \ threshold and no data loss occurs for passing features. References: source article\
    \ (DOI: 10.1371/journal.pcbi.1011912) Load the input feature table from disk using\
    \ the provided table_moniker identifier. Compute the minimum non-zero intensity\
    \ value for each feature across all samples, handling missing/zero values as absent.\
    \ Apply the interpolation formula: imputation_value = interpolation_ratio \xD7\
    \ feature_minimum for each feature. Replace all zero and missing (NaN) values\
    \ in the feature table with the calculated feature-specific imputation values.\
    \ Save the imputed feature table to the experiment feature_tables directory under\
    \ the new_moniker name. Validation: verify that all zero and missing values are\
    \ replaced, all imputed values equal interpolation_ratio \xD7 feature_minimum,\
    \ and the output table has identical dimensions to the input. References: source\
    \ article (DOI: 10.1371/journal.pcbi.1011912) Load the preferred feature table\
    \ with m/z, retention time, and intensity columns. Apply pairwise feature distance\
    \ calculations (m/z in ppm, rt in seconds) to identify candidates for grouping\
    \ within user-specified tolerances. Assign isotopologue and adduct labels based\
    \ on theoretical mass differences and charge patterns, constrained by ionization\
    \ mode and adduct list. Cluster features into empirical compound groups, recording\
    \ the list of constituent feature IDs and median m/z and rt per group. Serialize\
    \ groups to JSON with all required fields (list_of_features, mz, rt, adduct, isotope\
    \ annotations) and validate structure. Validation: verify empCpd.json is well-formed\
    \ JSON, contains \u22651 empirical compound group, and each group has non-empty\
    \ list_of_features, numeric mz, and numeric rt fields. References: source article\
    \ (DOI: 10.1371/journal.pcbi.1011912) Load interpolated feature table and metadata\
    \ containing batch labels for each sample. Invoke pycombat-based batch correction\
    \ via pcpfm batch_correct with --by_batch parameter set to the batch metadata\
    \ field. Confirm output table preserves input sample and feature dimensions. Calculate\
    \ median inter-batch variance for representative high-intensity features before\
    \ and after correction, grouped by batch field. Validation: confirm corrected-table\
    \ inter-batch variance is lower than uncorrected baseline, indicating successful\
    \ batch effect attenuation without dimension loss. References: source article\
    \ (DOI: 10.1371/journal.pcbi.1011912)"
  domain: metabolomics
  techniques:
  - lc-ms
  - tandem-ms
  - feature-detection
  - database-annotation
  - spectral-library-matching
  - metabolite-identification
  claims:
  - claim_text: The Python-Centric Pipeline for Metabolomics is designed to take raw
      LC-MS metabolomics data and ready them for downstream statistical analysis.
    claim_type: finding
    speculative: false
  - claim_text: The pipeline can convert Thermo .raw files to mzML format using ThermoRawFileParser.
    claim_type: finding
    speculative: false
    entity_id: COMP-THERMORAWFILEPARSER
  - claim_text: The pipeline can process mzML data to feature tables using Asari.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: The pipeline performs pre-annotation to group features to empirical
      compounds using khipu.
    claim_type: finding
    speculative: false
    entity_id: COMP-KHIPU
  - claim_text: The pipeline can perform MS2 annotation using matchms with a custom
      database defaulting to MoNA.
    claim_type: finding
    speculative: false
    entity_id: COMP-MATCHMS
  - claim_text: Asari supports a visual dashboard to explore and inspect individual
      features.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: The pipeline developers are working to add support for GC and other
      data types.
    claim_type: finding
    speculative: false
  - claim_text: To replicate the presented results, users need to run the download
      extras command.
    claim_type: finding
    speculative: false
  - claim_text: Mitchell et al. 2024 published a paper on common data models to streamline
      metabolomics processing and annotation in a Python pipeline.
    claim_type: finding
    speculative: false
  - claim_text: Li et al. 2023 published a paper on trackable and scalable LC-MS metabolomics
      data processing using asari in Nature Communications.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: There was an issue regarding sample names that do not match their
      mzML file names, which was fixed as of 2/28/24.
    claim_type: finding
    speculative: false
  - claim_text: The pipeline inputs should include raw files in .raw or .mzML format
      and a CSV file for metadata.
    claim_type: finding
    speculative: false
  - claim_text: The pipeline outputs are intended to be immediately usable for downstream
      analysis tools like MetaboAnalyst or common tools in R and Python.
    claim_type: finding
    speculative: false
    entity_id: TOOL-METABOANALYST
  - claim_text: The preferred installation mechanism for PCPFM is pip.
    claim_type: finding
    speculative: false
    entity_id: SYS-PCPFM
  - claim_text: The HMDB is not to be used for commercial purposes.
    claim_type: finding
    speculative: false
    entity_id: DATASET-HMDB
  - claim_text: Annotation sources including the HMDB are free for public non-commercial
      use.
    claim_type: finding
    speculative: false
    entity_id: DATASET-HMDB
  - claim_text: The download extras command can download LC-MS/MS databases from MoNA,
      a JMS-compliant version of the HMDB, and LMSD.
    claim_type: finding
    speculative: false
    entity_id: DATASET-HMDB
  - claim_text: The preprocessing command can create a new CSV file using rules specified
      in a JSON preprocessing configuration file.
    claim_type: finding
    speculative: false
  - claim_text: The preprocessing configuration supports searching for substrings
      in specified fields to populate metadata values.
    claim_type: finding
    speculative: false
  - claim_text: If multiple preprocessing rules match, the specified values are concatenated
      using an underscore.
    claim_type: finding
    speculative: false
  - claim_text: The assemble command creates an experiment directory to store the
      project.
    claim_type: finding
    speculative: false
    entity_id: COMP-EXPERIMENT
  - claim_text: The experiment object is used throughout processing and stores intermediates.
    claim_type: finding
    speculative: false
    entity_id: COMP-EXPERIMENT
  - claim_text: Filters can be applied to include or exclude acquisitions based on
      metadata field values.
    claim_type: finding
    speculative: false
  - claim_text: The convert command converts .raw files to centroid .mzML files.
    claim_type: finding
    speculative: false
  - claim_text: The ThermoRawFileParser can be used on Mac with mono installed.
    claim_type: finding
    speculative: false
    entity_id: COMP-THERMORAWFILEPARSER
  - claim_text: The asari command processes .mzML files into metabolomic feature tables.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: The asari command automatically infers the correct ionization mode
      for the experiment.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: 'After asari is run, two feature table monikers are generated: ''full''
      and ''preferred'' for the full and preferred feature tables respectively.'
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  - claim_text: The QAQC command can generate PCA plots limited to two components.
    claim_type: finding
    speculative: false
  - claim_text: The QAQC command can generate t-SNE plots limited to two components.
    claim_type: finding
    speculative: false
  - claim_text: Blank masking removes features that are likely due to background ions
      and contaminants.
    claim_type: finding
    speculative: false
  - claim_text: Blank masking is achieved by comparing the intensity of a feature
      in study samples to those in blanks.
    claim_type: finding
    speculative: false
  - claim_text: The default blank_intensity_ratio is 3.
    claim_type: finding
    speculative: false
  - claim_text: Metadata values for drop sample commands are case sensitive.
    claim_type: finding
    speculative: false
  - claim_text: The default TIC normalization percentile is 0.90 (90%).
    claim_type: finding
    speculative: false
  - claim_text: The default feature retention percentile is 50% (0.50).
    claim_type: finding
    speculative: false
  - claim_text: The default imputation ratio is 0.5.
    claim_type: finding
    speculative: false
  - claim_text: Batch correction is performed using pycombat.
    claim_type: finding
    speculative: false
    entity_id: COMP-PYCOMBAT
  - claim_text: Log transformation is performed using log2 by default.
    claim_type: finding
    speculative: false
  - claim_text: EmpCpds are groups of associated features, typically isotopes and
      adducts, that belong to the same tentative compound.
    claim_type: finding
    speculative: false
  - claim_text: By default, charges up to z=3 are used for EmpCpd construction.
    claim_type: finding
    speculative: false
    entity_id: COMP-EMPCPD
  - claim_text: By default, m+13C3 isotopologues are considered for EmpCpd construction.
    claim_type: finding
    speculative: false
    entity_id: COMP-EMPCPD
  - claim_text: For orbitrap LC data, a default 5 ppm tolerance and 2 second retention
      time tolerance is sufficient for EmpCpd construction.
    claim_type: finding
    speculative: false
    entity_id: COMP-EMPCPD
  - claim_text: Level 4 annotations are not currently generated for singletons because
      their adducts cannot be inferred.
    claim_type: finding
    speculative: false
  - claim_text: MS1 Level 1b annotation compares feature retention time and m/z values
      to those of authentic standards libraries.
    claim_type: finding
    speculative: false
  - claim_text: MS2 mapping is performed by comparing precursor retention time and
      m/z to retention times and m/z values of features.
    claim_type: finding
    speculative: false
  - claim_text: The default m/z tolerance for MS2 to feature mapping is 5 ppm.
    claim_type: finding
    speculative: false
  - claim_text: The default retention time tolerance for MS2 mapping is 30 seconds.
    claim_type: finding
    speculative: false
  - claim_text: The MoNA database is used as the default for MS2 annotation if no
      custom database is provided.
    claim_type: finding
    speculative: false
    entity_id: DATASET-MONA
  - claim_text: The generate_output command creates three output tables in the results
      subdirectory.
    claim_type: finding
    speculative: false
  - claim_text: The report command generates a PDF report in the output directory.
    claim_type: finding
    speculative: false
    entity_id: COMP-REPORT
  - claim_text: The reset command destroys all user generated tables and EmpCpds but
      keeps the outputs from Asari intact.
    claim_type: finding
    speculative: false
    entity_id: COMP-ASARI
  speculative: false
  task_openness: closed
  method_alternatives: []
  substitution_constraints: []
instructions: Reproduce the 5-step workflow below. Honor each step's IO contract;
  produce the files listed under 'Final expected outputs'.
