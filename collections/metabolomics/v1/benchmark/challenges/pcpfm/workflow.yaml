- path: Imputed feature table saved with new_moniker in experiment feature_tables
    directory
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'empCpd.json file containing empirical compound groups with fields: list_of_features,
    mz, rt, adduct annotations, and isotopologue assignments'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: experiment.json updated with empCpd moniker and metadata
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Batch-corrected feature table (.tsv) with identical dimensions to input, feature
    intensities adjusted to remove systematic batch biases
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Quantitative validation report containing: sample count, feature count, pre-\
    \ and post-correction inter-batch variance estimates for \u22655 representative\
    \ features"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
