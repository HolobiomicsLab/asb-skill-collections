narrative:
  tagline: Six domain-specific MASST web applications (microbeMASST, plantMASST, tissueMASST,
    microbiomeMASST, foodMASST, and metadataMASST) are available with documented live
    URLs and associated peer-reviewed or preprint publications. The repository contains
    code and data for these applications, which operate as standalone spectrum-search
    tools with underlying routing logic in the GNPS_MASST codebase and aggregation
    capabilities in metadataMASST.
  pseudo_abstract: "This repository provides code and data for six domain-specific\
    \ MASST web applications developed in the Dorrestein Lab. The applications\u2014\
    microbeMASST, plantMASST, tissueMASST, microbiomeMASST, foodMASST, and metadataMASST\u2014\
    each have documented live URLs and associated publications in peer-reviewed or\
    \ preprint venues. The standalone web applications allow users to search one spectrum\
    \ at a time; the underlying routing code is available in the GNPS_MASST codebase.\
    \ metadataMASST functions as an aggregation layer that accepts search outputs\
    \ from one or more domain-specific MASST runs and produces visualizable summary\
    \ artifacts."
  research_questions:
  - What are the complete set of domain-specific MASST standalone web applications,
    their live URLs, and their associated publications as documented in the domainMASSTs
    repository?
  - How does the routing mechanism direct a user-submitted spectrum to the appropriate
    domain-specific MASST application based on the user-selected domain context?
  - How does metadataMASST ingest and combine search output files from multiple domain-specific
    MASST tools into a unified, visualizable summary?
  methods_summary: "Retrieve the domainMASSTs repository from Zenodo or GitHub source\
    \ Parse the README file to locate documented standalone web applications Extract\
    \ application names, live URLs, and publication metadata Validate URL accessibility\
    \ for each application Compile structured inventory with verification status Validation:\
    \ Confirm all six applications (microbeMASST, plantMASST, tissueMASST, microbiomeMASST,\
    \ foodMASST, metadataMASST) are present in the inventory with accessible URLs\
    \ and documented publication links where available Define domain-to-application\
    \ mapping: microbial \u2192 microbeMASST, plant \u2192 plantMASST, tissue \u2192\
    \ tissueMASST, microbiome \u2192 microbiomeMASST, food \u2192 foodMASST, metadata\
    \ aggregation \u2192 metadataMASST. Implement conditional routing logic that parses\
    \ user-submitted domain context metadata and selects the target application endpoint.\
    \ Integrate routing module with GNPS_MASST codebase architecture and validate\
    \ compatibility with existing spectrum submission workflows. Test routing module\
    \ with representative spectrum submissions across all six domain categories to\
    \ confirm correct application dispatch. Validation: all test spectra are routed\
    \ to their designated domain-specific application with 100% accuracy; routing\
    \ module executes without errors on the GNPS_MASST codebase. Load search output\
    \ files from one or more domain-specific MASST tools Parse and normalize metadata\
    \ and match results across domain-specific formats Merge records from multiple\
    \ MASST outputs into a unified structure Generate combined visualizable summary\
    \ artifact for metadataMASST interface Validation: verify aggregated output contains\
    \ all input records and is compatible with metadataMASST web interface rendering"
