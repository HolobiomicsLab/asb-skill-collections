narrative:
  tagline: q2-qemistree is a QIIME 2 plugin that builds trees of mass-spectrometry
    (LC-MS/MS) features to enable chemically-informed comparison of untargeted metabolomic
    profiles.
  pseudo_abstract: q2-qemistree implements a pipeline for constructing a tree of mass-spectrometry
    features from LC-MS/MS data, enabling chemically-informed comparison of untargeted
    metabolomic profiles. The tool produces a Chemical Feature Tree artifact that
    represents the hierarchical organization of detected features, facilitating metabolomic
    profile analysis through chemical similarity relationships.
  research_questions:
  - What is the process by which q2-qemistree constructs a tree of mass-spectrometry
    features for chemically-informed metabolomic comparison?
  - What are the format, node count, and structural properties of the Chemical Feature
    Tree artifact produced by the q2-qemistree pipeline?
  methods_summary: 'Load LC-MS/MS feature table and spectral metadata into QIIME 2
    artifact format Invoke q2-qemistree to construct a phylogenetic-style tree integrating
    spectral similarity and molecular mass relationships Export the Chemical Feature
    Tree as a Newick-format phylogeny for downstream metabolomic comparison Validation:
    verify tree artifact contains all input features with correct hierarchical relationships
    and is compatible with QIIME 2 downstream analyses Load Chemical Feature Tree
    artifact using QIIME 2 inspection API or format conversion utilities. Detect and
    validate file format (Newick vs. QIIME 2 serialized object). Parse tree structure
    and enumerate all nodes (leaf and internal). Compute tree metrics: depth, branching
    factor, node label coverage. Validate tree connectivity and verify absence of
    structural defects (cycles, disconnected components, malformed syntax). Validation:
    tree passes format validation, node count is non-zero and matches expected feature
    count, and tree is fully connected with valid Newick or QIIME 2 syntax.'
  domain: metabolomics
  techniques:
  - molecular-networking
  - network-annotation-propagation
  - clustering
