narrative:
  tagline: MS2Query is a tool for reliable and fast MS/MS spectral-based analogue
    search. This repository documents the software's installation, usage, and contribution
    guidelines.
  pseudo_abstract: MS2Query provides functionality for MS/MS spectral-based analogue
    search and library matching. The repository contains installation instructions,
    command-line usage documentation, and guidelines for integrating MS2Query into
    other tools, creating custom spectral libraries, and training new models. The
    project uses a GitHub Actions continuous integration workflow that triggers on
    pull requests and integrates with Sonarcloud for quality assurance.
  research_questions:
  - How is the MS2Query search workflow architecturally split into separate processing
    branches for true library matches versus analogue search?
  - How does the refactored Library Matching Module read spectral library data from
    a SQLite database and return candidate matches for query spectra?
  - How does the scoring module compute average InChIKey score and neighbourhood score
    for candidate matches in MS2Query?
  - What spectrum pre-processing functions are defined and applied to raw query spectra
    before library matching in MS2Query?
  - How does the MS2Query GitHub Actions continuous-integration workflow integrate
    build/test execution with Sonarcloud static analysis to produce automated quality
    reports and passing CI status badges?
  methods_summary: "Access the MS2Query repository and retrieve PR #72 metadata, commit\
    \ history, and code diffs. Identify the top-level orchestrator or workflow entry\
    \ point and trace the control flow that decides between library-match and analogue-search\
    \ branches. Document decision criteria, parameter dependencies, and data routing\
    \ for each branch. Map intermediate scoring, filtering, and result-merging logic\
    \ that connect the two branches. Validation: cross-verify the documented architecture\
    \ against the actual codebase implementation to confirm all routing logic and\
    \ decision nodes are accurately represented. Load spectral library from SQLite\
    \ database and index by precursor m/z for fast range queries. Parse input query\
    \ spectra and extract precursor mass and fragment peaks. Filter library entries\
    \ by precursor mass tolerance window around each query precursor. Compute spectral\
    \ similarity scores (e.g., cosine similarity, dot product) for filtered candidates.\
    \ Rank candidates by similarity score and return structured output with library\
    \ identifiers and scores. Validation: candidate matches are returned with correct\
    \ library entry identifiers and ranked in descending order of match score; database\
    \ query executes without errors and matches expected test cases in PR #65 test\
    \ suite. Load candidate match records from upstream library-matching module, retaining\
    \ match IDs and InChIKey annotations. Compute average InChIKey score per candidate\
    \ by aggregating structural similarity across InChIKey layers. Compute neighbourhood\
    \ score per candidate by evaluating spectral feature-space density and proximity\
    \ of similar matches. Merge both scores into a single standardized candidate record\
    \ structure with ID, InChIKey score, and neighbourhood score fields. Validate:\
    \ Unit tests confirm score ranges are within expected bounds (e.g. 0\u20131 or\
    \ 0\u2013100), record structure matches specification, and output file is machine-readable\
    \ CSV or JSON. Define spectral normalisation algorithm signature accepting raw\
    \ m/z-intensity pairs and output parameters (e.g., TIC normalisation, L2 normalisation)\
    \ Define spectral filtering algorithm signature accepting intensity threshold\
    \ and minimum peak count parameters Implement normalisation function to rescale\
    \ intensities while preserving relative abundance ratios Implement filtering function\
    \ to remove peaks below noise threshold and handle edge cases Chain normalisation\
    \ and filtering functions into a single pre-processing pipeline function Write\
    \ unit tests validating normalisation output sums to expected value and filtering\
    \ removes correct peaks Validation: cleaned spectra pass format validation (numeric\
    \ m/z and intensity fields present), test suite passes with 100% coverage of pre-processing\
    \ functions, and intensity distributions reflect expected normalisation Create\
    \ a GitHub Actions workflow YAML file that specifies trigger events (push and\
    \ pull requests) and job configuration for the ms2query repository. Define a Python\
    \ test job matrix that executes `python setup.py test` to validate the existing\
    \ test suite passes on each workflow trigger. Integrate Sonarcloud analysis action\
    \ into the workflow to perform static code scanning and generate code quality\
    \ metrics. Commit and push the workflow file to a feature branch in the ms2query\
    \ repository to activate CI/CD automation. Execute the workflow via a test commit\
    \ or pull request to validate job execution, generate the CI status badge, and\
    \ retrieve the Sonarcloud quality report. Validation: Confirm CI status badge\
    \ displays in repository README, workflow YAML file is valid and registered in\
    \ GitHub Actions, and Sonarcloud report contains code coverage and quality gate\
    \ metrics."
