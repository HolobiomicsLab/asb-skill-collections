narrative:
  tagline: SIRIUS is a Java-based software framework offering freely available methods
    to the scientific community for the analysis of LC-MS/MS data of metabolites and
    other small molecules, intended for research and education use.
  pseudo_abstract: "SIRIUS provides a suite of computational tools and web services\
    \ (including CSI:FingerID, CANOPUS, and MSNovelist) designed for metabolomics\
    \ analysis. The methods are distributed as free resources for academic research\
    \ and educational purposes, with commercial redistribution prohibited. The framework\
    \ is maintained by the B\xF6cker group and made available through both academic\
    \ web services and commercial licensing via Bright Giant GmbH for non-academic\
    \ users."
  research_questions:
  - '[![License: AGPL v3](https://img.shields.io/badge/License-AGPL%20v3-blueviolet.svg)](https://www.gnu.org/licenses/agpl-3.0)
