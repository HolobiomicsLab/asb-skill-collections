narrative:
  tagline: AirdPro is a containerized mass spectrometry data conversion tool that
    converts vendor files to Aird format using Docker and Wine to enable cross-platform
    deployment on macOS, Linux, and Windows. The system architecture employs multi-stage
    Docker builds with .NET Framework 4.8 and ProteoWizard integration, supporting
    both GUI and CLI modes.
  pseudo_abstract: 'This documentation describes AirdPro, a GUI and command-line application
    for converting vendor mass spectrometry files to Aird format, implemented in C#
    on .NET Framework 4.8 using pwiz_bindings_cli.dll from ProteoWizard. The deployment
    approach uses Docker containers with Wine to enable execution on non-Windows platforms
    (macOS and Linux). The system supports multiple image variants: a Windows native
    version, Linux/macOS Wine-based versions, a lightweight CLI variant, and a development
    variant. First-run initialization requires Wine to download and configure .NET
    Framework components, a process documented to require more than 30 minutes. The
    architecture includes multi-stage Dockerfile builds, systemd service integration
    for Linux, X11 display forwarding for GUI support on non-Windows systems, and
    configurable resource allocation (8GB+ RAM recommended). Data persistence is managed
    through volume mounting of local directories to container paths (/data for input/output,
    /logs for application logs). The documentation provides platform-specific setup
    instructions for Ubuntu/Debian, CentOS/RHEL/Fedora, and macOS systems, configuration
    guidance for X11 and Docker networking, and troubleshooting procedures for common
    deployment issues including permission errors, display problems, memory constraints,
    and Wine initialization failures.'
  research_questions:
  - What is the multi-stage Docker build process that produces the airdpro:cli image
    from a Ubuntu 22.04 base with Wine environment?
  - Does execution of AirdPro CLI against a vendor mass spectrometry raw file via
    the airdpro:cli Docker image complete Wine initialization and produce a converted
    Aird output file?
  - What are the documented compressed size ranges for each of the four AirdPro Docker
    image variants (cli, dev, linux, windows)?
  methods_summary: "Invoke the build-docker.sh script to trigger Docker's multi-stage\
    \ build pipeline targeting the runtime-cli stage. Download and configure the Ubuntu\
    \ 22.04 base image, then install Wine and all required Linux dependencies for\
    \ Windows application support. Initialize the Wine environment and install .NET\
    \ Framework 4.8 within the Wine prefix so that compiled C# binaries can execute.\
    \ Compile the AirdPro application using the .NET SDK during the build stage, then\
    \ copy the CLI executable into the runtime-cli final image. Verification: Query\
    \ docker images to confirm airdpro:cli exists and report its size; confirm the\
    \ reported size falls within 6\u20137 GB range. Prepare Docker container with\
    \ airdpro:cli image and mount vendor raw file input directory and Aird output\
    \ directory as volumes. Execute run-cli.sh script with input vendor raw file path,\
    \ capturing container stderr/stdout to log Wine initialization and framework download\
    \ activity. Record elapsed time from container start to first Wine prompt or .NET\
    \ Framework component completion message. Allow CLI conversion process to complete;\
    \ monitor for successful Aird file generation in output directory. Validation:\
    \ confirm Aird output file exists with non-zero size, Wine startup time is \u2265\
    30 min on first run, and container exit code is 0 with no error messages in execution\
    \ log. Build all four Docker image variants (cli, dev, linux, windows) using multi-stage\
    \ Dockerfile with --target flags. Query uncompressed and compressed image sizes\
    \ using Docker API (`docker inspect`, `docker system df`). Convert byte measurements\
    \ to gigabytes and benchmark against documented ranges from methods section. Generate\
    \ structured verification report with image name, measured size, documented range,\
    \ and pass/fail status. Validation: each image's compressed size must fall within\
    \ its documented range (\xB110% tolerance for minor variations in dependencies\
    \ and build artifacts)."
  domain: bioinformatics
