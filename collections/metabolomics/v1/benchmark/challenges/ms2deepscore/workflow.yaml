narrative:
  tagline: MS2DeepScore is a Siamese neural network trained to predict structural
    similarity scores between chemical compounds directly from their MS/MS fragmentation
    spectra. The model achieves root mean squared error of approximately 0.15 on held-out
    test spectra and outperforms classical spectral similarity measures in identifying
    chemically related compound pairs.
  pseudo_abstract: 'MS2DeepScore addresses a key challenge in metabolomics: predicting
    structural similarity between chemical compounds from mass spectrometry data alone,
    without requiring known chemical structures. The authors trained a Siamese neural
    network on 109,734 MS/MS spectra from 15,062 unique compounds to predict Tanimoto
    scores based on molecular fingerprints. On a held-out test set of 3,601 spectra
    from 500 unseen compounds, MS2DeepScore achieved root mean squared error of approximately
    0.15 without uncertainty filtering and 0.1 when applying interquartile range thresholds
    (IQR < 0.025) to remove high-uncertainty predictions. The model demonstrates superior
    precision and recall compared to modified Cosine and Spec2Vec when identifying
    structurally related compounds (Tanimoto > 0.6) across the full range of similarity
    thresholds. Monte-Carlo Dropout ensemble learning further improves predictions
    and provides uncertainty estimates, reducing average RMSE from 0.17 to 0.11 with
    most significant improvements in extreme Tanimoto score ranges. The spectral embeddings
    generated by the network encode chemically meaningful features, as demonstrated
    by consistent clustering of molecules from the same chemical superclass in t-SNE
    visualizations. MS2DeepScore operates on peak m/z positions and intensities alone
    without requiring spectral metadata, making it applicable to diverse MS/MS datasets.'
  research_questions:
  - Does the MS2DeepScore model trained on RDKit Daylight fingerprints achieve the
    reported prediction accuracy (RMSE ~0.15 without uncertainty filtering, ~0.10
    with IQR < 0.025 filtering) when run on the held-out test set of 3,601 spectra
    from 500 unique compounds?
  - Does MS2DeepScore outperform classical spectral similarity measures (modified
    Cosine) and the unsupervised Spec2Vec method in retrieving chemically related
    compound pairs from mass spectral datasets?
  - Does applying Monte-Carlo Dropout ensemble filtering (IQR < 0.025) to MS2DeepScore
    predictions significantly reduce root mean squared error across different Tanimoto
    score ranges, particularly in low (< 0.4) and high (> 0.8) bins?
  - How does the Siamese neural network base network convert a binned MS/MS spectrum
    into a 200-dimensional spectral embedding?
  - Do the 200-dimensional spectral embeddings learned by MS2DeepScore encode chemically
    meaningful information that enables molecules of the same chemical class to cluster
    together in low-dimensional space?
  methods_summary: "Load pre-trained Siamese network model with 200-dimensional embedding\
    \ layer and cosine similarity head from Zenodo deposit. Preprocess test spectra:\
    \ filter peaks (<0.1% intensity, limit to 1,000 peaks), apply square-root transformation,\
    \ bin into 10,000 equally-sized bins (10\u20131000 m/z). Run Siamese network inference\
    \ on all 6,485,401 unique test spectrum pairs; each pair yields a predicted structural\
    \ similarity score (cosine of embedding pair). Quantify uncertainty via Monte-Carlo\
    \ Dropout: execute N=10 forward passes with dropout enabled; compute median and\
    \ interquartile range (IQR) of 10 predictions per pair. Compute RMSE between predicted\
    \ and ground-truth Tanimoto scores for full test set (no filter) and for filtered\
    \ subset (IQR < 0.025). Validation: verify RMSE without filter \u2248 0.15 and\
    \ RMSE with IQR < 0.025 filter \u2248 0.10, matching reported performance in methods\
    \ and results sections. References: source article (DOI: 10.1186/s13321-021-00558-4)\
    \ Load pretrained MS2DeepScore base network and test set spectra (3,601 spectra,\
    \ 500 unique InChIKeys). Compute 200-dimensional spectral embeddings for all test\
    \ spectra via forward pass through the base network. Generate all 6,485,401 unique\
    \ spectrum pair combinations and compute pairwise cosine similarity scores (MS2DeepScore\
    \ predictions). Retrieve ground-truth Tanimoto scores from RDKit Daylight fingerprints\
    \ (2048 bits) for the same pairs. For each method (MS2DeepScore, Spec2Vec, classical\
    \ similarity), vary Tanimoto threshold from 0 to ~1 and compute precision and\
    \ recall at each threshold. Plot precision versus recall for all three methods\
    \ on a single curve and save as PNG. Validation: Confirm that MS2DeepScore curve\
    \ dominates (higher precision at matched recall) compared to Spec2Vec and classical\
    \ methods across the threshold range, matching the reported result in Figure 4.\
    \ References: source article (DOI: 10.1186/s13321-021-00558-4) Load trained MS2DeepScore\
    \ model (base network + Siamese head) and test-set spectrum pairs with reference\
    \ Tanimoto labels. Run Monte-Carlo Dropout inference with N=10 forward passes\
    \ per spectrum pair, generating 10 predictions and computing median and IQR. Stratify\
    \ predictions into 10 equally-sized Tanimoto bins (0.0\u20130.1, 0.1\u20130.2,\
    \ \u2026, 0.9\u20131.0) by reference Tanimoto score. Compute per-bin RMSE for\
    \ unfiltered predictions and separately for IQR-filtered predictions (retain IQR\
    \ < 0.025 only). Calculate RMSE reduction (improvement) by bin, with focus on\
    \ low (< 0.4) and high (> 0.7) Tanimoto regions. Validation: verify that reported\
    \ RMSE drop from ~0.15 (unfiltered) to ~0.1 (IQR < 0.025 filtered) is reproduced\
    \ in published figures. References: source article (DOI: 10.1186/s13321-021-00558-4)\
    \ Load a binned MS/MS spectrum as a 9948-dimensional vector with square-root-transformed\
    \ peak intensities. Pass the input through a dense layer with 500 nodes, applying\
    \ L1 (10\u207B\u2076) and L2 (10\u207B\u2076) regularization to the weights. Apply\
    \ batch normalization and dropout (rate 0.2) after the first dense layer. Pass\
    \ through a second dense layer with 500 nodes, again followed by batch normalization\
    \ and dropout (0.2). Pass through a final dense layer with 200 nodes (no regularization)\
    \ to generate the spectral embedding. Validation: verify that the output embedding\
    \ has shape (1, 200) and that the model correctly propagates gradients during\
    \ training on paired spectra with Tanimoto-score labels. References: source article\
    \ (DOI: 10.1186/s13321-021-00558-4) Load pre-trained MS2DeepScore Siamese network\
    \ base network from zenodo deposit. Forward-pass test-set binned spectrum vectors\
    \ through base network to extract 200-dimensional embeddings. Apply t-SNE dimensionality\
    \ reduction (cosine metric, perplexity 100, 1000 iterations) to map embeddings\
    \ to 2D. Annotate 2D points with ClassyFire chemical superclass labels derived\
    \ from InChIKey metadata. Visualization: Plot t-SNE coordinates as scatter with\
    \ colour-coding by chemical superclass and verify that same-class molecules cluster\
    \ together. Validation: Confirm visual clustering consistency with reported Figure\
    \ 8; verify that distinct chemical superclasses occupy separable regions of t-SNE\
    \ space. References: source article (DOI: 10.1186/s13321-021-00558-4)"
