  task_openness: closed
  method_alternatives:
  - DataGeneratorAllInchikeys for data generation
  - Classical spectral similarity measures (unnamed alternatives to MS2DeepScore)
  - Support vector machines in combination with fragmentation trees can infer molecular
    fingerprints from mass spectra
  - Deep neural networks can directly predict molecular fingerprints from mass spectra
  - DeepMass is an approach similar to MS2DeepScore but requires mass and chemical
    formula as input
  - Modified Cosine scoring for comparing MS/MS mass spectra
  - Spec2Vec unsupervised machine learning approach for computing spectrum similarities
  - 'Using different molecular fingerprints: Morgan-2, Morgan-3, or Daylight fingerprints'
  - 'Using different similarity measures: Tanimoto or Dice scores'
  - Using mean score instead of median score for ensemble predictions
  - Fragmentation trees combined with machine learning for exact compound matching
  - MS2DeepScore can complement or replace common currently used spectral similarity
    measures
  substitution_constraints:
  - MS2DeepScore relies only on peak m/z positions and intensities without requiring
    further spectrum information, unlike DeepMass
  - MS2DeepScore models are not deterministic and may change when new model is trained
    with different parameters or training data
  - Neural networks lack intuitive explanation of why a certain score is given (explainability
    problem)
