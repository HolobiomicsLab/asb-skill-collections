narrative:
  tagline: MetaMiner is a metabologenomic pipeline that integrates tandem mass spectrometry
    and genomic data to identify ribosmally synthesized and post-translationally modified
    peptides (RiPPs) and their biosynthetic gene clusters. The pipeline demonstrates
    input format-dependent detection performance, successfully identifying lantibiotics
    from raw nucleotide sequences but failing with antiSMASH-processed genome annotations.
  pseudo_abstract: MetaMiner, distributed as part of NPDtools version 2.5.0, operates
    through a multi-stage workflow that identifies putative biosynthetic gene clusters
    and corresponding precursor peptides from genome assemblies, constructs putative
    RiPP structure databases, and matches tandem mass spectra against the constructed
    post-translationally modified RiPP database using Dereplicator before enlarging
    the set of identified RiPPs via spectral networking. The paper documents successful
    detection of the lantibiotic AmfS when MetaMiner is run on raw nucleotide sequence
    files (contigs.fasta format), but reports that detection fails when antiSMASH-annotated
    genome output (.final.gbk) is used as input, indicating that input format choice
    affects detection performance. NPDtools 2.5.0 integrates multiple database search
    pipelines (Dereplicator, VarQuest, and Dereplicator+) for natural product mass
    spectrometry analysis and provides mechanisms to visualize spectral network results
    and propagation graphs after RiPP identification.
  research_questions:
  - Does MetaMiner successfully identify the AmfS lantibiotic (core peptide TGSQVSLLVCEYSSLSVVLCTP)
    when run on S. griseus genomic data with MSV000080102 spectral data in lantibiotic
    class search mode?
  - Does MetaMiner fail to detect the AmfS RiPP when using antiSMASH .gbk output instead
    of FASTA sequences for the S. griseus dataset?
  - How does MetaMiner's BGC Identifier scan a genome FASTA file to identify putative
    biosynthetic gene clusters and their corresponding precursor peptides?
  - What output files does the Spectral Networking stage of the MetaMiner pipeline
    produce when run on test mass spectrometry data?
  - Which of the three NPDtools database search pipelines (Dereplicator, VarQuest,
    Dereplicator+) successfully identify matches in MSV000080102-derived test spectra,
    and how do their hit patterns differ across search modes?
  methods_summary: "Load centroided LC-MS/MS spectral data (MSV000080102) from open\
    \ formats and convert to MGF via ProteoWizard if needed. Scan S.griseus_fragment.fasta\
    \ genome to identify putative biosynthetic gene clusters and extract ribosomal\
    \ precursor peptide sequences. Construct in silico RiPP structure database by\
    \ enumerating post-translationally modified variants (dehydroalanine, dehydrobutyrine,\
    \ lanthipeptide cross-links) from precursor peptides. Match all tandem mass spectra\
    \ against the RiPP database using Dereplicator, computing similarity scores and\
    \ P-values for each compound\u2013spectrum pair under lantibiotic class constraints.\
    \ Filter matches by FDR threshold and output identified RiPPs with original and\
    \ modified sequences, retention time, charge, and genomic source in significant_matches.tsv.\
    \ Validation: verify that AmfS is present in significant_matches.tsv with FragmentSeq\
    \ exactly matching 'TGSQVSLLVCEYSSLSVVLCTP' and ModifiedSeq containing dehydration\
    \ modifications (T-18 and S-18 mass shifts), confirming detection sensitivity\
    \ at default parameters. References: MSV000080102 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080102);\
    \ SRR3309439 (https://www.ncbi.nlm.nih.gov/sra/?term=SRR3309439) Download or locate\
    \ S. griseus test data: LC-MS/MS spectra (AmfS.mgf) and antiSMASH-generated .final.gbk\
    \ annotation. Execute MetaMiner with antiSMASH input: invoke metaminer.py pointing\
    \ to spectra directory and antiSMASH .gbk sequence file using default lantibiotic\
    \ search class. Harvest and inspect significant_matches.tsv output for presence\
    \ or absence of AmfS peptide in FragmentSeq and ModifiedSeq columns. Validation:\
    \ Confirm that AmfS peptide (raw sequence TGSQVSLLVCEYSSLSVVLCTP or modified TGSQVSLLVCEYSSLSVVLCTP-with-dehydration\
    \ marks) does NOT appear in significant_matches.tsv, reproducing the documented\
    \ antiSMASH input failure mode. References: MSV000080102 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080102);\
    \ SRR3309439 (https://www.ncbi.nlm.nih.gov/sra/?term=SRR3309439) Load assembled\
    \ genome in FASTA format and initialize MetaMiner BGC scanner for the specified\
    \ RiPP class. Scan genome sequences to detect putative biosynthetic gene clusters\
    \ via signature gene detection and extract corresponding precursor peptide sequences.\
    \ Apply class-specific post-translational modification rules (e.g., dehydration,\
    \ cyclization, oxidation) to enumerate plausible candidate structures for each\
    \ precursor. Aggregate all generated candidate structures with original and modified\
    \ sequences, masses, and metadata into a structured per-class RiPP database. Validation:\
    \ confirm that the output database file exists, contains the expected RiPP class\
    \ identifier in the header, lists all identified precursor peptides with their\
    \ enumerated modified forms, and includes required fields (original sequence,\
    \ modified sequence, mass) for each candidate ready for spectral matching. References:\
    \ MSV000080102 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080102);\
    \ SRR3309439 (https://www.ncbi.nlm.nih.gov/sra/?term=SRR3309439) Load and prepare\
    \ spectral data: obtain or download the three mzML spectra files from MSV000080102\
    \ and the precomputed GNPS spectral network output (or compute spectral networks\
    \ de novo via GNPS). Configure spectral networking input: unpack the GNPS ProteoSAFe\
    \ output archive and prepare the example RiPP FASTA file containing the target\
    \ sequence DATITTVTVTSTSIWASTVSNHC. Execute MetaMiner with spectral networking:\
    \ run the pipeline with the --spec-network flag pointing to the network directory,\
    \ enabling blind mode for demonstration of novel PTM detection. Generate propagation\
    \ reports: MetaMiner identifies connected components in the spectral network related\
    \ to significant RiPP identifications and generates graphical (PDF) and text (detailed\
    \ and condensed) outputs. Validation: verify that all three required output files\
    \ (propagations.pdf, propagations_detailed.txt, propagations_short.txt) are present\
    \ in metaminer_outdir/spec_nets/ directory and contain non-empty content. References:\
    \ MSV000080102 (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080102);\
    \ SRR3309439 (https://www.ncbi.nlm.nih.gov/sra/?term=SRR3309439) Convert MSV000080102\
    \ spectra from mzML to MGF format using ProteoWizard msconvert to ensure compatibility\
    \ across all three pipelines. Index and validate the RiPP sequence database (example_RiPP.fasta)\
    \ for consistency before parallel pipeline execution. Execute MetaMiner in standard\
    \ mode (default lantibiotic class) on test spectra and sequences, capturing all\
    \ significant_matches.tsv records with scan IDs, scores, p-values, and FDRs. Re-execute\
    \ MetaMiner with --blind flag to enable arbitrary post-translational modification\
    \ detection and compare output cardinality and score distributions to standard\
    \ mode. Run Dereplicator and VarQuest pipelines independently on the same spectral\
    \ and sequence inputs, standardizing output to TSV format with equivalent columns.\
    \ Merge and deduplicate match records across all three tools by scan identifier,\
    \ score rank, and peptide sequence identity. Validation: Cross-tool comparison\
    \ table correctly enumerates per-tool hit counts, identifies scans with tool-specific\
    \ vs. shared identifications, and confirms that blind-mode MetaMiner results are\
    \ a superset or equal-cardinality to standard-mode results. References: MSV000080102\
    \ (https://massive.ucsd.edu/ProteoSAFe/dataset.jsp?accession=MSV000080102); SRR3309439\
    \ (https://www.ncbi.nlm.nih.gov/sra/?term=SRR3309439)"
