narrative:
  tagline: "LOTUS is a comprehensive collection of 484,174 (2D) and 588,694 (3D) unique\
    \ referenced structure\u2013organism pairs curated from 31 open databases, designed\
    \ to enable computational understanding of organisms and their chemistry."
  pseudo_abstract: "LOTUS integrates structure\u2013organism pairs from 31 initial\
    \ open databases through a multi-stage curation pipeline. The dataset comprises\
    \ 153,956 (2D) and 231,330 (3D) unique curated structures linked to 42,166 unique\
    \ organisms. The curation workflow standardizes chemical structures through successive\
    \ transformations including SMILES normalization and sanitization, translates\
    \ and validates organism names across multiple taxonomic systems, and integrates\
    \ reference metadata from multiple literature sources. The final curated dataset\
    \ contains 484,174 (2D) and 588,694 (3D) unique referenced structure\u2013organism\
    \ pairs, with documented distributions showing that 89,903 2D structures are present\
    \ in only one organism, 45,640 appear in between 1\u201310 organisms, 3,990 in\
    \ 10\u2013100 organisms, and 403 in more than 100 organisms."
  research_questions:
  - What are the documented headline counts of unique structure-organism pairs, curated
    structures, organisms, and source databases in the LOTUS dataset?
  - "What are the distribution counts of unique 2D structures in LOTUS when binned\
    \ by organism prevalence (appearing in 1, 1\u201310, 10\u2013100, or >100 distinct\
    \ organisms)?"
  - "What are the counts of unique organisms binned by the number of distinct 2D structures\
    \ they contain in the categories: 1 structure, 1\u201310 structures, 10\u2013\
    100 structures, and >100 structures?"
  - How do the smiles.py and sanitizing.py scripts transform raw SMILES strings from
    the gathering layer into standardized, deduplicated structural identifiers?
  - How does the 5_addingOTL.R script enrich cleaned organism names with Open Tree
    of Life identifiers?
  methods_summary: "Download and extract LOTUS dataset deposit from Zenodo record\
    \ 3778405. Load 3D and 2D structure-organism pair tables into memory. Deduplicate\
    \ and count unique referenced structure-organism pairs per dimension. Count unique\
    \ curated structure identifiers and unique organism identifiers across all records.\
    \ Enumerate source database origins from metadata and verify count against 31\
    \ reported databases. Validation: All reported counts (588,694 3D pairs, 484,174\
    \ 2D pairs, 231,330 3D structures, 153,956 2D structures, 42,166 organisms, 31\
    \ databases) must match actual file-derived counts with zero absolute difference.\
    \ References: source article (DOI: 10.1007/s00044-016-1764-y) Load LOTUS flat\
    \ file containing all unique 2D structure-organism associations. For each unique\
    \ 2D structure, count the number of distinct organisms in which it appears. Assign\
    \ each structure to one of four bins based on organism-occurrence count: 1 (singleton),\
    \ 2\u201310 (low), 11\u2013100 (medium), >100 (high). Tabulate the number of structures\
    \ in each bin. Validation: Verify that bin counts match the reported gold standard\
    \ (89,903 / 45,640 / 3,990 / 403) and that the four bin totals sum to 153,956\
    \ unique 2D structures. References: source article (DOI: 10.1007/s00044-016-1764-y)\
    \ Load the LOTUS flat file as a data frame with structure ID and organism ID columns.\
    \ For each unique organism, count the number of distinct 2D structures associated\
    \ with it. Assign each organism to one of four bins: 1 structure, 2\u201310 structures,\
    \ 11\u2013100 structures, >100 structures. Tally the organism count within each\
    \ bin. Validation: compare observed bin counts against reported values (7,354,\
    \ 21,490, 10,683, 374); confirm all four match or report any deviation. References:\
    \ source article (DOI: 10.1007/s00044-016-1764-y) Load raw SMILES table from the\
    \ gathering layer output. Translate and standardise SMILES strings using smiles.py\
    \ to enforce canonical representation. Validate and sanitise chemical structures\
    \ using sanitizing.py, removing invalid or malformed entries. Deduplicate the\
    \ sanitised structure table to generate the final unique SMILES identifier set.\
    \ Validation: output file exists, contains deduplicated SMILES entries, and maintains\
    \ row integrity across structure-organism mapping. References: source article\
    \ (DOI: 10.1007/s00044-016-1764-y) Load the cleaned and taxonomy-verified organism\
    \ table from interim/tables/2_cleaned/organism/cleaned.tsv.gz. Apply OTL name-to-identifier\
    \ mapping using fuzzy matching and validation heuristics to assign stable taxonomic\
    \ identifiers to each organism record. Enrich organism records with OTL metadata\
    \ (identifiers, taxonomic ranks, synonyms, hierarchy). Write the enriched dictionary\
    \ to interim/dictionaries/organism/otl.sqlite for indexed lookup and validation.\
    \ Validation: Verify that all records in the cleaned organism table receive OTL\
    \ identifiers and that the SQLite file is syntactically correct and queryable.\
    \ References: source article (DOI: 10.1007/s00044-016-1764-y)"
