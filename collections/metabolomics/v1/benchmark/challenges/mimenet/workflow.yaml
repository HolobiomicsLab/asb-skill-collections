narrative:
  tagline: MiMeNet is a multi-layer perceptron neural network framework that predicts
    metabolite abundances from microbiome features and identifies biologically meaningful
    microbe-metabolite interaction modules through feature attribution scoring and
    biclustering.
  pseudo_abstract: "This paper presents MiMeNet, a neural network approach for modeling\
    \ microbiome-metabolome relationships on three paired datasets (IBD, cystic fibrosis,\
    \ and soil). Using 10 iterations of 10-fold cross-validation, MiMeNet achieves\
    \ mean Spearman correlation coefficients of 0.309 for IBD (PRISM), 0.457 for cystic\
    \ fibrosis, and 0.264 for soil datasets, and identifies 366, 143, and 29 well-predicted\
    \ metabolites respectively, compared to 198, 104, and 4 for the linear regression\
    \ model MelonnPan. On external validation using the entire IBD (PRISM) dataset\
    \ to predict the IBD (External) test set, MiMeNet identifies 308 well-predicted\
    \ metabolites with mean correlation of 0.275 for annotated metabolites, compared\
    \ to 186 metabolites and correlation of 0.168 for MelonnPan. The paper demonstrates\
    \ that training on all metabolites simultaneously improves prediction of annotated\
    \ metabolites (mean Spearman correlation from 0.259 to 0.309, P < 10\u221247,\
    \ with well-predicted metabolites increasing from 333 to 366 out of 466). Additionally,\
    \ MiMeNet computes microbe-metabolite feature attribution scores from network\
    \ weights and applies biclustering to organize microbes and metabolites into modules\
    \ with shared interaction patterns, identifying eight microbial and eight metabolic\
    \ modules in the IBD dataset where positive and negative attribution scores indicate\
    \ the direction of microbe contributions to metabolite abundance prediction."
  research_questions:
  - Does MiMeNet achieve higher mean Spearman correlation coefficients and identify
    more well-predicted metabolites compared to MelonnPan, Random Forest, and CCA
    baselines across IBD (PRISM), Cystic Fibrosis, and Soil datasets using ten iterations
    of 10-fold cross-validation?
  - What are the prediction correlation metrics achieved by a MiMeNet model trained
    on the full IBD (PRISM) dataset when evaluated on the held-out IBD (External)
    dataset?
  - How does Olden's method derive microbe-metabolite feature attribution scores from
    MLPNN network weights, and how are these scores subsequently used to construct
    functional modules via biclustering?
  - Does training MiMeNet on all metabolites (annotated + unannotated) improve prediction
    accuracy for annotated metabolites compared to training only on annotated metabolites?
  - Does per-partition hyperparameter tuning improve MiMeNet's metabolite prediction
    performance compared to tuning hyperparameters once on the first partition?
  methods_summary: "Preprocess three paired microbiome-metabolomic datasets by filtering\
    \ features present in <10% of samples and applying centered log-ratio transformation\
    \ with pseudocount addition. Optimize MiMeNet neural network architecture via\
    \ nested 5-fold cross-validation, tuning layer size (32, 128, 512), number of\
    \ layers (1\u20133), L2 penalty (0.0001\u20130.1), and dropout (0.1\u20130.5).\
    \ Train MiMeNet and three linear baselines (Elastic Net, CCA, Random Forest) using\
    \ ten iterations of 10-fold cross-validation with ADAM optimization, ReLU activation,\
    \ and early stopping. Calculate mean Spearman correlation coefficient and identify\
    \ well-predicted metabolites (SCC > 95th percentile of background distribution\
    \ from 100 shuffled models) for each model and dataset. Validation: Reported mean\
    \ SCC and well-predicted metabolite counts must match published abstract values\
    \ (IBD PRISM: 0.108\u21920.309 SCC, 198\u2192366 metabolites; Cystic Fibrosis:\
    \ 0.276\u21920.457, 104\u2192143; Soil: -0.272\u21920.264, 4\u219229) within statistical\
    \ noise (\xB1SD reported in supplementary tables). References: source article\
    \ (DOI: 10.1371/journal.pcbi.1009021) Preprocess IBD (PRISM) and IBD (External)\
    \ microbiome and metabolome data using centered log-ratio transformation, removing\
    \ features in <10% of samples. Train a single MiMeNet MLPNN on the full IBD (PRISM)\
    \ dataset (layer size 512, 1 hidden layer, L2 penalty 0.001, dropout 0.5) using\
    \ ADAM optimizer with early stopping. Apply the trained model to IBD (External)\
    \ test data to generate predicted metabolite abundances. Compute Spearman correlation\
    \ coefficients between predicted and observed metabolite abundances for external\
    \ validation. Identify well-predicted metabolites as those with SCC above the\
    \ 95th percentile threshold derived from shuffled background distribution. Compare\
    \ prediction performance to benchmark models (MelonnPan, Random Forest, Elastic\
    \ Net, WGCNA) using identical evaluation metrics. Validation: External validation\
    \ is successful if the mean SCC and count of well-predicted metabolites on IBD\
    \ (External) are comparable to or exceed reported baseline methods and cross-validation\
    \ results on held-out internal folds. References: source article (DOI: 10.1371/journal.pcbi.1009021)\
    \ Extract trained MLPNN weight matrices across all hidden layers from 100 cross-validated\
    \ models. Compute microbe-metabolite feature attribution scores via Olden's method\
    \ (multiply weight matrices layer-by-layer) for each model. Average attribution\
    \ matrices across all 100 models and apply 97.5 percentile threshold to identify\
    \ significant microbe-metabolite associations. Normalize significant attribution\
    \ scores to [-1, 1] range by dividing by the 97.5 percentile value. Apply hierarchical\
    \ clustering with consensus resampling (k = 2\u201320) to microbes and metabolites\
    \ independently, selecting optimal cluster numbers (k*, k**) where proportional\
    \ change in consensus matrix area exceeds 0.025 threshold. Bicluster normalized\
    \ attribution matrix using selected k* and k** to produce final microbe and metabolite\
    \ functional modules. Compute inter-module interaction scores as average normalized\
    \ attribution between all microbe-metabolite pairs in each module pair, filter\
    \ edges to |score| \u2265 0.25 for network visualization. Validation: Confirm\
    \ module membership is stable across cross-validated models, verify clustering\
    \ dendrogram height consistency, and check that filtered interaction network contains\
    \ \u22651 edges per non-singleton module pair. References: source article (DOI:\
    \ 10.1371/journal.pcbi.1009021) Load and preprocess IBD (PRISM) microbiome and\
    \ metabolomic data: apply centered log-ratio transformation (pseudocount=1), filter\
    \ features <10% prevalence, segregate annotated from unannotated metabolites.\
    \ Partition data into 10 iterations of 10-fold cross-validation; for each fold,\
    \ reserve 10% for testing, allocate 80% to training and 20% to validation. Train\
    \ two parallel MiMeNet MLPNN models per fold using identical architecture (1 hidden\
    \ layer, 512 nodes, ReLU, L2 \u03BB=0.001, dropout=0.5, ADAM optimizer, MSE loss):\
    \ one predicting all metabolites, one predicting annotated metabolites only. Apply\
    \ early stopping on validation loss (patience=40 epochs) to select final model\
    \ weights for each fold; evaluate on held-out test set. Calculate Spearman correlation\
    \ coefficient (SCC) between predicted and observed abundance for each annotated\
    \ metabolite; aggregate across 100 runs (10 iterations \xD7 10 folds) to obtain\
    \ mean SCC per metabolite for each training regime. Generate scatterplot comparing\
    \ mean SCCs and compute per-metabolite delta; calculate overall mean SCC, delta,\
    \ and 95% confidence intervals. Validation: mean SCC on annotated metabolites\
    \ when training on all metabolites must be \u2265 mean SCC when training on annotated-only,\
    \ confirming that unannotated metabolites provide shared signal; per-metabolite\
    \ deltas are visualized to identify metabolites with largest performance gains\
    \ from multi-task learning. References: source article (DOI: 10.1371/journal.pcbi.1009021)\
    \ Load and preprocess paired microbiome-metabolome data: filter features present\
    \ in <10% of samples and apply CLR transformation (with pseudocount 1) to metabolomic\
    \ and applicable microbiome data. Tune hyperparameters once on first CV partition\
    \ (Condition A): use nested 5-fold CV over grid {layer size: 32/128/512, hidden\
    \ layers: 1\u20133, \u03BB: log-uniform 0.0001\u20130.1, dropout: 0.1/0.3/0.5};\
    \ record optimal settings. Execute 10-fold CV twice in parallel: (A) reuse first-partition\
    \ hyperparameters across all 10 folds; (B) retune hyperparameters independently\
    \ for each fold. Train MLPNN models for each fold: use ReLU activation, ADAM optimizer,\
    \ MSE loss, L2 regularization, dropout; apply early stopping when validation loss\
    \ plateaus (no improvement \u226540 iterations). Calculate per-metabolite mean\
    \ SCC and aggregate across all 10 folds for both conditions; count metabolites\
    \ with SCC exceeding 95th percentile of background distribution (100 shuffled\
    \ CV runs). Validation: compare mean SCC and well-predicted metabolite counts\
    \ between Tune Once and Tune Every Partition; statistical significance and relative\
    \ improvement in metabolite prediction sensitivity quantify the ablation effect.\
    \ References: source article (DOI: 10.1371/journal.pcbi.1009021)"
