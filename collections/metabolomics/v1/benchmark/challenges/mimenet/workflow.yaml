  task_openness: mixed
  method_alternatives:
  - State-of-the-art linear models for individual metabolite predictions
  - Predictive Reactive Metabolic Turnover (PRMT) as alternative to machine learning
    for mapping metagenomic features
  - Constraint-based stoichiometric modeling using flux balance analysis as alternative
    to PRMT
  - Neural network encoder-decoder (NED) as alternative machine learning approach
  - Multivariate Elastic Net could be used instead of MLPNN
  - Random Forest, Canonical Correlation Analysis, or Multivariate Elastic Net as
    alternative regression models
  - Random forest as alternative to neural networks, though cannot provide feature
    attribution scores from network weights
  - NED (Neural Encoder Decoder) as alternative predictive model for microbiome-metabolome
    relationships
  - Regularized linear regression as used in MelonnPan for metabolite modeling
  - Multivariate correlation analysis approaches for integrative omics analysis
  - WGCNA for identifying clusters of metabolites
  - MelonnPan for microbiome and metabolome integrative analysis
  - mmvec for microbiome and metabolome relationships
  substitution_constraints:
  - Non-negative weight constraints in NED diminish capability to capture interactions
    where some microbes negatively affect metabolites
