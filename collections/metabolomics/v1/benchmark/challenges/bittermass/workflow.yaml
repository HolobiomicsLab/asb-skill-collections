narrative:
  tagline: BitterPredict is a classifier that predicts whether chemical compounds
    are bitter or not based on their molecular structure descriptors. The paper reports
    reproduction of the classifier's predictions and analysis of its sensitivity to
    individual descriptor subsets.
  pseudo_abstract: BitterPredict.m is a MATLAB classifier that accepts CSV or Excel
    files containing pre-computed chemical structure descriptors as input and produces
    binary bitter/not-bitter predictions for each molecule. The reported results include
    successful reproduction of classifier predictions on molecules with known descriptors,
    and analysis of prediction sensitivity to individual chemical descriptor subsets
    through systematic ablation studies where descriptor subgroups are manipulated
    in the input data. The classifier itself operates on descriptors that must be
    prepared prior to classification, with details on descriptor specification documented
    within the BitterPredict.m file.
  research_questions:
  - What is the input format and data structure required for BitterPredict.m to generate
    bitter/not-bitter predictions for a set of molecules?
  - What descriptor input format and preparation workflow is required to convert raw
    molecular representations into the CSV or Excel files needed for BitterPredict.m
    classification?
  - Which descriptor subgroups have the greatest impact on bitter/not-bitter prediction
    accuracy when systematically removed from the BitterPredict classifier?
  methods_summary: 'Load input CSV or Excel file containing pre-computed molecular
    descriptors. Parse descriptor matrix and validate presence of required features
    for BitterPredict classifier. Execute BitterPredict.m inference on descriptor
    vectors. Map predicted class labels to output identifiers and format as CSV. Validation:
    output CSV contains one prediction per input molecule with binary labels (bitter/not-bitter);
    file format is valid and parseable. Load and parse raw SMILES or SDF input files
    into standardized molecular structures. Validate molecular syntax and apply structure
    standardization (kekulization, aromaticity perception). Calculate all required
    molecular descriptors (physicochemical and topological properties) from standardized
    structures. Assemble descriptor values into a table with molecules as rows and
    descriptors as named columns. Export table to CSV or Excel format matching BitterPredict.m
    input specification. Validation: Verify output file format (CSV or Excel), confirm
    presence and naming of all required descriptor columns, and check that all rows
    contain valid numeric descriptor values with no missing entries. Load descriptor
    CSV and organize descriptors into functionally coherent subgroups. For each subgroup,
    create ablated datasets by zeroing that subgroup''s values. Run BitterPredict
    on each ablated dataset to generate predictions. Compare ablated predictions against
    baseline (full-descriptor) predictions to identify molecules with changed labels.
    Calculate per-subgroup prediction-change rate as the fraction of molecules with
    label flips. Validation: Record per-descriptor-group prediction-change rates in
    a summary table; verify all molecules are accounted for and all descriptor subgroups
    are represented.'
  domain: cheminformatics
