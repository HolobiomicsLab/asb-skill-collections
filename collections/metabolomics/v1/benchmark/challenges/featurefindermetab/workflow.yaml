narrative:
  tagline: OpenMS is an open-source software framework for mass spectrometry data
    analysis. The project welcomes community contributions through issue reporting
    and pull requests, with guidelines for code quality, testing, and documentation.
  pseudo_abstract: OpenMS is a community-driven open-source project for mass spectrometry
    analytics. The documentation describes the contribution process, including procedures
    for reporting bugs and submitting pull requests. Contributors are expected to
    adhere to coding conventions, provide unit and functional tests, include proper
    documentation, and implement Python bindings where applicable. The project emphasizes
    early communication with core developers to ensure alignment on novel tools or
    algorithms.
