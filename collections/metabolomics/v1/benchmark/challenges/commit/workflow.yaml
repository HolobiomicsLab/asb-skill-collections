narrative:
  tagline: COMMIT is a method that generates consensus metabolic reconstructions and
    performs community-dependent gap-filling for microbial communities sampled from
    Arabidopsis thaliana.
  pseudo_abstract: COMMIT implements two interconnected mechanisms for analyzing microbial
    communities associated with Arabidopsis thaliana. First, it generates consensus
    metabolic reconstructions for community members by synthesizing metabolic information
    across the community. Second, it incorporates a community-dependent gap-filling
    module that operates on these consensus reconstructions, leveraging shared metabolic
    context across the community to identify and fill metabolic gaps that individual
    reconstructions might miss.
  research_questions:
  - How does COMMIT generate a single consensus metabolic reconstruction from multiple
    draft reconstructions of organisms in a microbial community?
  - How does COMMIT's community-dependent gap-filling procedure use metabolic context
    from multiple community members to fill gaps in individual consensus reconstructions?
  methods_summary: 'Load draft metabolic reconstructions for all community member
    organisms Apply COMMIT consensus algorithm to identify metabolic reactions and
    metabolites conserved across all input reconstructions per organism Generate consensus
    metabolic reconstruction containing only agreed-upon reactions and metabolites
    for each organism Load consensus metabolic models for all community members from
    prior reconstruction step Initialize COMMIT gap-filling module with community
    context specification and identified metabolic gaps Execute community-dependent
    gap-filling algorithm to propose reactions filling gaps using inter-member metabolic
    dependencies Validate proposed reactions against plant metabolism knowledge and
    community exchange requirements Validation: Gap-filled models are accepted when
    all identified gaps have corresponding proposed reactions ranked by confidence,
    and validation checks confirm consistency with Arabidopsis thaliana metabolism'
  domain: metabolomics
  techniques:
  - flux-analysis
  - pathway-analysis
  - multi-omics-integration
