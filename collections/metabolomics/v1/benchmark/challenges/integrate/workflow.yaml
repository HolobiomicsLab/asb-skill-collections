narrative:
  tagline: INTEGRATE is a computational pipeline that integrates transcriptomics and
    intracellular metabolomics data with constraint-based metabolic modeling to uncover
    whether metabolic flux variations across cell lines are governed by transcriptional
    regulation, substrate availability, or both.
  pseudo_abstract: 'Metabolism is regulated through multiple hierarchical layers:
    gene expression controls enzyme abundance, while metabolite concentrations modulate
    enzymatic activity through substrate availability and allosteric effects. The
    paper presents INTEGRATE, a model-based framework that combines transcriptomics-derived
    Reaction Activity Scores (RAS), intracellular metabolomics-derived Reaction Propensity
    Scores (RPS) computed via mass action kinetics, and constraint-based steady-state
    metabolic modeling to characterize which regulatory layer controls each metabolic
    reaction. Applied to five breast cell lines (one non-tumorigenic and four cancer-derived),
    the authors generated transcriptomics and metabolomics datasets and integrated
    them into a manually curated constraint-based model of human central carbon metabolism
    (ENGRO2). By assessing concordance between RAS and flux variations, and between
    RPS and flux variations using Cohen''s kappa, INTEGRATE classified reactions as
    controlled by transcriptional regulation, metabolic regulation only, or combined
    control. Constraint integration on nutrient availability (Type 1), extracellular
    flux ratios (Type 2), and transcriptomics-derived flux bounds (Type 3) progressively
    improved segregation of cell-line-specific feasible flux distributions and growth
    yield predictions, with Type 3 constraints alone achieving good cell-line discrimination.
    Among 81 reactions with complete substrate abundance data, concordance analysis
    identified distinct regulatory signatures across the five cell lines, providing
    a framework for identifying metabolic intervention points in personalized therapeutic
    strategies for multifactorial diseases.'
  research_questions:
  - Can the INTEGRATE pipeline with all three constraint types (nutrient availability,
    extracellular fluxes, and transcriptomics-derived constraints) successfully segregate
    the feasible flux distributions of five breast cancer cell lines with distinct
    metabolic profiles?
  - What are the Cohen's kappa concordance values between RAS and RPS directional
    changes for metabolic reactions with complete substrate metabolomics coverage
    across the five breast cell lines?
  - Does integration of transcriptomics-derived constraints alone improve the correlation
    between predicted and experimental growth yield compared to constraints on nutrient
    availability alone, and how does adding metabolomics-derived extracellular flux
    constraints further affect this correlation?
  - How does the mass action law formulation translate intracellular metabolomics
    data into Reaction Propensity Scores (RPS) that quantify the expected relative
    metabolic flux changes across cell lines based purely on substrate availability
    differences?
  - How can RAS, RPS, and FFD datasets be intersected to classify each metabolic reaction
    into regulatory categories (transcriptional, metabolic, combined, or unclassified)?
  methods_summary: "Compute normalized Reaction Activity Scores from RNA-seq transcriptomics\
    \ data using GPR logical rules and scale to [0, 1]. Define and apply three nested\
    \ constraint types to the ENGRO2 model: (1) nutrient availability from medium\
    \ composition, (2) extracellular flux ratios from YSI bioanalyzer data, (3) transcriptomics-derived\
    \ internal flux boundaries from RAS and FVA. Uniformly sample 1 million steady-state\
    \ flux vectors from the constrained null space of each of five cell-relative models\
    \ using optGpSampler. Apply t-SNE nonlinear dimensionality reduction to the high-dimensional\
    \ FFD to visualize separation of cell-line clusters in 2D space. Validation: Confirm\
    \ t-SNE clusters show distinct, non-overlapping separation of the five cell lines\
    \ when all three constraint types are applied together, with improved Spearman\
    \ correlation (r \u2265 0.85) between experimental and in silico growth yield\
    \ on glucose relative to constraint-type subsets. References: source article (DOI:\
    \ 10.1371/journal.pcbi.1009337); MTBLS3597 (https://www.ebi.ac.uk/metabolights/MTBLS3597);\
    \ PRJNA767228 (https://www.ncbi.nlm.nih.gov/bioproject/PRJNA767228) Load RAS vectors\
    \ (derived from RNA-seq and GPR rules) and RPS vectors (derived from LC-MS metabolomics\
    \ and stoichiometry) for five cell lines from the Zenodo deposit. For each of\
    \ 10 pairwise cell-line comparisons and each reaction, perform Mann-Whitney U\
    \ test to assign directional change sign (+1 up, \u22121 down, 0 no-change) to\
    \ RAS, RPS, and FFD distributions. Filter to 81 reactions with complete substrate\
    \ metabolomics coverage, excluding reactions missing any substrate quantification.\
    \ Compute Cohen's kappa agreement between RAS and RPS directional signs for each\
    \ reaction, accounting for chance agreement. Compute Cohen's kappa agreement between\
    \ RPS and FFD directional signs (RPSvsFFD) and between RAS and FFD signs (RASvsFFD)\
    \ for each reaction. Assign empirical p-values by permuting RPS variation signs\
    \ 1000 times and comparing the distribution of kappa values to the original; apply\
    \ Benjamini-Hochberg FDR correction (threshold \u03B1 = 0.05). Validation: verify\
    \ that reactions flagged as statistically significant (post-FDR) match the subset\
    \ identified in the published paper (ACONT, ASPTA, RPI, RPE) and that the empirical\
    \ agreement distribution significantly exceeds the Q\u2013Q quantile distribution\
    \ of two independent random datasets. References: source article (DOI: 10.1371/journal.pcbi.1009337);\
    \ MTBLS3597 (https://www.ebi.ac.uk/metabolights/MTBLS3597); PRJNA767228 (https://www.ncbi.nlm.nih.gov/bioproject/PRJNA767228)\
    \ Load ENGRO2 models with Type 1, Type 2, and Type 3 constraints specified separately\
    \ and in combination. Sample 1 million steady-state flux distributions per cell\
    \ line per constraint scenario using optGpSampler with thinning=10, enforcing\
    \ growth yield bounds (Eq. 6: 0.001 \xB7 0.131972 \xB7 v_Biomass \u2264 max \xB7\
    \ v_ExGlc \xB7 mw_Glc \u2264 0.001). Compute in silico growth yield as median(v_Biomass)\
    \ / median(v_ExGlc) \xD7 0.131972 for each scenario. Extract experimental growth\
    \ yield (total protein over 48h / total glucose over 48h) from Bradford and YSI\
    \ measurements. Calculate Spearman \u03C1 and two-tailed p-value for experimental\
    \ vs. in silico growth yield under each constraint scenario. Validation: Confirm\
    \ that Type 3 constraints alone achieve the highest separation of the five cell\
    \ lines in t-SNE space (Fig 3C vs 3D) while Type 1+2+3 combined yields the highest\
    \ Spearman correlation with experimental data. References: source article (DOI:\
    \ 10.1371/journal.pcbi.1009337); MTBLS3597 (https://www.ebi.ac.uk/metabolights/MTBLS3597);\
    \ PRJNA767228 (https://www.ncbi.nlm.nih.gov/bioproject/PRJNA767228) Load intracellular\
    \ metabolomics data and ENGRO2 stoichiometric model with reaction-metabolite associations.\
    \ For each reaction and cell line, retrieve all substrate metabolite concentrations\
    \ from the model stoichiometry. Omit reactions with any missing substrate abundance\
    \ measurements from the metabolomics dataset. Compute Reaction Propensity Score\
    \ for each eligible reaction in each cell line using mass action law: RPS = product\
    \ of [substrate_i]^(stoichiometric_coeff_i). Aggregate RPS across biological replicates\
    \ within each cell line using median or mean. Normalize RPS within each reaction\
    \ across cell lines by dividing by the maximum RPS value for that reaction. Validation:\
    \ verify that RPS dataset contains no reactions with missing substrate abundances,\
    \ that all values are non-negative, and that normalization produces scores in\
    \ the range [0, 1] for each reaction. References: source article (DOI: 10.1371/journal.pcbi.1009337);\
    \ MTBLS3597 (https://www.ebi.ac.uk/metabolights/MTBLS3597); PRJNA767228 (https://www.ncbi.nlm.nih.gov/bioproject/PRJNA767228)\
    \ Load pre-computed RAS, RPS, and FFD datasets from deposited repositories for\
    \ all reactions and pairwise cell-line comparisons. Compute signed fold-change\
    \ directions (up/down/no-change) for each reaction across 10 pairwise cell-line\
    \ comparisons using statistical tests (Mann\u2013Whitney U for FFD, t-test for\
    \ RAS/RPS) with p<0.05 and \u226520% fold-change threshold. Calculate two Cohen's\
    \ kappa coefficients per reaction quantifying concordance between RAS-vs-FFD and\
    \ RPS-vs-RAS fold-change sign patterns. Classify reactions into regulatory categories\
    \ based on quadrant assignment: positive RASvsFFD + positive RPSvsRAS = combined;\
    \ positive RPSvsFFD + negative RPSvsRAS = metabolic-only; negative both + high\
    \ RASvsFFD = transcriptional-only; other = unclassified. Compute empirical p-values\
    \ by repeated random sampling (1000 iterations) of RPS variation distributions\
    \ and derive FDR-adjusted p-values using Benjamini\u2013Hochberg procedure with\
    \ target FDR <5%. Validation: reactions ACONT, ASPTA, RPI, and RPE show statistically\
    \ significant concordance (FDR<5%) in both core and genome-wide models, confirming\
    \ robustness of classification scheme. References: source article (DOI: 10.1371/journal.pcbi.1009337);\
    \ MTBLS3597 (https://www.ebi.ac.uk/metabolights/MTBLS3597); PRJNA767228 (https://www.ncbi.nlm.nih.gov/bioproject/PRJNA767228)"
