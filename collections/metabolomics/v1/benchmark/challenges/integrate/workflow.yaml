  claims:
  - claim_text: Metabolism is directly and indirectly fine-tuned by a complex web
      of interacting regulatory mechanisms that fall into two major classes.
    claim_type: finding
    speculative: false
  - claim_text: The expression level of metabolic enzymes sets the maximal theoretical
      flux level for each enzyme-controlled reaction.
    claim_type: finding
    speculative: false
  - claim_text: Metabolic regulation controls the interactions of metabolites with
      enzymes, including substrates, cofactors, and allosteric modulators.
    claim_type: finding
    speculative: false
  - claim_text: High-throughput omics data analyzed separately do not accurately characterize
      the hierarchical regulation of metabolism.
    claim_type: finding
    speculative: false
  - claim_text: INTEGRATE computes differential reaction expression from transcriptomics
      data using constraint-based modeling to predict if differential enzyme expression
      originates differences in metabolic fluxes.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: INTEGRATE uses metabolomics to predict how differences in substrate
      availability translate into differences in metabolic fluxes.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: INTEGRATE discriminates fluxes regulated at the metabolic and/or gene
      expression level by intersecting output datasets from transcriptomics and metabolomics
      analysis.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: The pipeline was demonstrated on a set of immortalized normal and
      cancer breast cell lines.
    claim_type: finding
    speculative: false
  - claim_text: Knowing the regulatory level at which a given metabolic reaction is
      controlled will be valuable to inform targeted, truly personalized therapies
      in cancer patients.
    claim_type: finding
    speculative: true
  - claim_text: INTEGRATE can be applied to different fields where metabolism plays
      a driving role, including cancer and neurodegeneration.
    claim_type: finding
    speculative: true
    entity_id: INTEGRATE_system
  - claim_text: 'Each metabolic flux depends on at least two intertwined regulatory
      layers: one regulating the flux of each enzyme-catalyzed metabolic reaction,
      and another through auto-regulation via metabolite interactions.'
    claim_type: finding
    speculative: false
  - claim_text: The upper level flux for each enzyme-catalyzed metabolic reaction
      depends on the levels and catalytic activities of metabolic enzymes, which are
      set by complex mechanisms orchestrated by signal transduction pathways.
    claim_type: finding
    speculative: false
  - claim_text: Regulatory mechanisms of metabolic enzyme expression include epigenetic
      control of chromatin, transcription factors, transcription rate, and post-transcriptional/post-translational
      events.
    claim_type: finding
    speculative: false
  - claim_text: Auto-regulation of metabolism occurs through the interactions of metabolites
      (substrates, cofactors, allosteric modulators) with responsible enzymes.
    claim_type: finding
    speculative: false
  - claim_text: The flux of an enzyme-catalyzed reaction depends on the concentration
      of its substrate(s).
    claim_type: finding
    speculative: false
  - claim_text: The Michaelis-Menten law approximates the dependence of reaction rate
      on substrate concentration for non-allosteric enzymes.
    claim_type: finding
    speculative: false
  - claim_text: The Michaelis constant K_m describes the substrate concentration at
      which the reaction rate is equal to V_max/2.
    claim_type: finding
    speculative: false
  - claim_text: At substrate concentrations below K_m, there is a linear increase
      in reaction rate with increasing substrate concentration.
    claim_type: finding
    speculative: false
  - claim_text: Metabolites within the same pathway or belonging to related biochemical
      pathways can fine-tune enzyme-catalyzed reactions through allosteric effects.
    claim_type: finding
    speculative: false
  - claim_text: Differences in metabolic fluxes are only partially determined by variations
      in protein/gene expression.
    claim_type: finding
    speculative: false
  - claim_text: In transcriptional control scenario, variations in flux through a
      metabolic reaction are mainly determined by variations in enzyme abundance when
      substrate is in large excess.
    claim_type: finding
    speculative: false
  - claim_text: In metabolic control scenario, variations in flux are mainly determined
      by variations in substrate abundance when enzyme is in large excess.
    claim_type: finding
    speculative: false
  - claim_text: Combined metabolic and transcriptional control occurs when variations
      in fluxes are determined by concerted variations in both substrate and enzyme
      abundance.
    claim_type: finding
    speculative: false
  - claim_text: Direct determination of metabolic fluxes through labeled substrates
      lags behind other omics technologies, mainly due to technical difficulties at
      the sub-cellular level.
    claim_type: finding
    speculative: false
  - claim_text: Integration of transcriptomics with metabolomics datasets has been
      limited mainly to gene-metabolite correlation analysis or pathway enrichment
      analysis.
    claim_type: finding
    speculative: false
  - claim_text: Constraint-based steady-state models represent a valuable framework
      to predict metabolic fluxes from high-throughput omics data.
    claim_type: finding
    speculative: false
  - claim_text: Methods using cross-sectional metabolomics data to predict fluxes
      require a priori assumptions on the relationship between metabolites and fluxes.
    claim_type: finding
    speculative: false
  - claim_text: INTEGRATE's novel hypothesis is that evidence for a monotonic relationship
      between fluxes and substrate abundances, and for a concurrent non-monotonic
      relationship between flux variation and enzyme abundance, indicates that a reaction
      is controlled metabolically.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: Current model-based approaches to discern transcriptionally from metabolically
      controlled fluxes have limitations in directly using metabolomics data.
    claim_type: finding
    speculative: false
  - claim_text: INTEGRATE takes as input a metabolic network model with Gene-Protein-Reaction
      associations, transcriptomics data, intracellular metabolomics data, and extracellular
      flux data.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: 'INTEGRATE returns two lists of metabolic fluxes: fluxes that vary
      across cells consistently with both metabolic and transcriptional regulation,
      and fluxes that vary consistently with metabolic regulation only.'
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: 'INTEGRATE generates three comparable datasets centered around the
      object reaction: Reaction Activity Scores, Feasible Flux Distributions, and
      Reaction Propensity Scores.'
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: Reaction Activity Score (RAS) is computed for each input model reaction
      based on the expression value and relationship among genes encoding catalyzing
      enzymes.
    claim_type: finding
    speculative: false
    entity_id: RAS_component
  - claim_text: Feasible Flux Distributions (FFD) dataset includes a large number
      of flux distributions obtained by uniformly sampling the feasible flux region
      of the metabolic model.
    claim_type: finding
    speculative: false
    entity_id: FFD_component
  - claim_text: Reaction Propensity Score (RPS) is computed based on the availability
      of reaction substrates, calculated as the product of substrate concentrations
      with each raised to a power equal to its stoichiometric coefficient.
    claim_type: finding
    speculative: false
    entity_id: RPS_component
  - claim_text: 'Five breast cell lines were selected for study: one non-tumorigenic
      and four breast cancer cell lines with different molecular classifications.'
    claim_type: finding
    speculative: false
  - claim_text: Cell lines present significant differences in terms of metabolic profile.
    claim_type: finding
    speculative: false
  - claim_text: The ratio of lactate produced over glucose consumed is quite similar
      across the five cell lines.
    claim_type: finding
    speculative: false
  - claim_text: Lactate and glutamate over glutamine ratios are more heterogeneous
      across the five cell lines compared to lactate/glucose ratio.
    claim_type: finding
    speculative: false
  - claim_text: ENGRO2 core model consists of 494 reactions, 410 metabolites, and
      494 genes.
    claim_type: finding
    speculative: false
    entity_id: ENGRO2_model
  - claim_text: ENGRO1 model consisted of 84 reactions, 67 metabolites, and 216 genes
      in comparison to ENGRO2.
    claim_type: finding
    speculative: false
    entity_id: ENGRO2_model
  - claim_text: Transcriptomics-derived constraints alone well discriminate the five
      cell line models.
    claim_type: finding
    speculative: false
  - claim_text: Combination of transcriptomics-derived and extracellular flux constraints
      improves separation of feasible solutions between cell lines.
    claim_type: finding
    speculative: false
  - claim_text: Growth rate predictions improve when transcriptomics-derived constraints
      are combined with extracellular flux constraints.
    claim_type: finding
    speculative: false
  - claim_text: 44 reactions resulted from consistent transcriptional and metabolic
      regulation.
    claim_type: finding
    speculative: false
  - claim_text: 13 reactions resulted only metabolically regulated because of positive
      RPSvsFFD score above 0.2 and negative RPSvsRAS score below threshold.
    claim_type: finding
    speculative: false
  - claim_text: Cohen's kappa values are considered to indicate fair concordance between
      0.21 and 0.40.
    claim_type: finding
    speculative: false
    entity_id: cohens_kappa_tool
  - claim_text: After FDR correction of p-values, concordance between RPSs and FFDs
      resulted statistically significant for 4 reactions.
    claim_type: finding
    speculative: false
  - claim_text: ACONT reaction catalyzes the production of cytosolic isocitrate from
      citrate and is metabolically controlled.
    claim_type: finding
    speculative: false
  - claim_text: RPI reaction catalyzes the conversion of ribulose 5-phosphate to ribose
      5-phosphate within the non-oxidative phase of the pentose phosphate pathway.
    claim_type: finding
    speculative: false
  - claim_text: Concordance scores are robust to the choice of sample, with standard
      deviation of Cohen's kappa values across batches being negligible for most reactions.
    claim_type: finding
    speculative: false
    entity_id: cohens_kappa_tool
  - claim_text: Some flux variations show concordance between independent datasets
      beyond reasonable doubt according to empirical probability analysis.
    claim_type: finding
    speculative: false
  - claim_text: INTEGRATE integration of transcriptomics and metabolomics data enriches
      their expressive power by providing complementary views of metabolic state.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: Metabolic fluxes predicted by constraint-based modeling complement
      information on differential activity of reactions derived from gene expression
      data.
    claim_type: finding
    speculative: false
  - claim_text: INTEGRATE indicated that aconitase (ACONT) metabolic regulation involves
      the cytosolic reaction while the aconitase flux itself is not regulated at transcriptional
      level.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: INTEGRATE does not have the ambition to predict exact flux values,
      but rather the sign of variation across cell lines.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: The main novelty of INTEGRATE is the direct exploitation of metabolomics
      data to determine whether a flux is regulated at the metabolic level.
    claim_type: finding
    speculative: false
    entity_id: INTEGRATE_system
  - claim_text: The pipeline can be extended to integrate proteomics and phosphoproteomics
      data alongside transcriptomics-derived RAS.
    claim_type: finding
    speculative: true
    entity_id: INTEGRATE_system
  - claim_text: Knowing whether a flux is controlled at the metabolic or enzymatic
      level is mandatory in designing therapeutic strategies and identifying metabolic
      reactions that indirectly affect target reactions.
    claim_type: finding
    speculative: false
  speculative: false
  task_openness: mixed
  method_alternatives:
  - iReMet, Pandey et al., Katzir et al., and Cakir et al. are alternative approaches
    to integrate metabolomics and transcriptomics data
  - Any available method can be used in principle to set flux boundaries as a function
    of gene expression, with eFlux and TRFBA cited as examples
  - Proteomics and phosphoproteomics data can be integrated as alternatives to transcriptomics
    data
  - Genome-wide model Recon3D can be used as alternative to core model ENGRO2
  substitution_constraints:
  - INTEGRATE sets constraints on selected extracellular fluxes according to exo-metabolomics
    data to improve model predictions
  - Transcriptomics-derived RAS must be used for reactions without proteomics coverage
  - SBML format does not embed type 2 constraints on extracellular fluxes, which must
    be specified separately
instructions: Reproduce the 5-step workflow below. Honor each step's IO contract;
  produce the files listed under 'Final expected outputs'.
expected_final_outputs:
- path: Cohen's kappa concordance scores (RPSvsRAS and RPSvsFFD) for all 81 reactions
    with complete substrate coverage, formatted as a two-column numeric table with
    reaction names and kappa values
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Scatter plot (RPSvsFFD kappa vs. RPSvsRAS kappa) with reactions colored by\
    \ RASvsFFD concordance score and labeled for kappa \u2265 0.2"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Heatmap of RPSvsRAS and RPSvsFFD Cohen's kappa values for reactions with RPSvsFFD
    concordance > 0.2, ordered by RPSvsFFD score
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Empirical p-values and Benjamini-Hochberg adjusted p-values (FDR < 5%) for
    each reaction's kappa concordance, assessed against the null distribution from
    random permutation of RPS variations
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Spearman correlation coefficient and p-value between experimental and in silico
    growth yield for Type 1 constraints alone
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Spearman correlation coefficient and p-value between experimental and in silico
    growth yield for Type 1+2 constraints
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Spearman correlation coefficient and p-value between experimental and in silico
    growth yield for Type 1+2+3 constraints
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Spearman correlation coefficient and p-value between experimental and in silico
    growth yield for Type 3 constraints alone
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Correlation plot with four scatter subplots (one per constraint scenario)\
    \ showing experimental vs. in silico growth yield with \u03C1 and p-value annotations"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Reaction Propensity Scores (RPS) dataset: a matrix (or table) with metabolic\
    \ reactions as rows, cell lines as columns, and normalized RPS values (0\u2013\
    1 range) as entries, computed from mass action law applied to substrate concentrations"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Reaction classification table (XLSX or CSV) with columns: reaction identifier,
    Cohen''s kappa RPSvsFFD score, Cohen''s kappa RPSvsRAS score, empirical p-value,
    FDR-adjusted p-value, regulatory class label (transcriptional/metabolic/combined/other),
    and confidence intervals'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: "Q\u2013Q plot comparing empirical probability distribution of Cohen's kappa\
    \ agreement between independent datasets versus INTEGRATE RPS-vs-FFD concordance\
    \ results"
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Heatmap visualization of RPSvsRAS and RPSvsFFD concordance scores for reactions
    with fair concordance (score >0.2), annotated with reaction names and regulatory
    class assignments
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
