  task_openness: open
  method_alternatives:
  - Direct injection mass spectrometry (DI-MS) and FT-ICR MS are alternatives to low-resolution
    mass spectrometers for analyzing NOM components
  - 'Formularity alternative: DataAnalysis, Xcalibur, CoreMS, or combination of MassSpecWavelet
    and MFAssignR for raw spectra processing'
  - 'Alternative normalization methods: Probabilistic Quotient Normalization (PQN),
    Quantile Normalization, and Variance Stabilization'
  - User-specific biochemical transformation list as alternative to predefined biochemical
    transformation key
  - User may test various normalization strategies and choose the best one when SPANS
    may not be appropriate for data sets with systematic differences
  substitution_constraints:
  - No coding experience is required to run MetaboDirect, but some experience in R
    is needed if fully customized plots are desired
  - PQN requires a conscious selection of a reference spectrum, which are not often
    available for complex samples or present in exploratory analysis
  - Chemodiversity analysis depends on the total number of peaks detected and validity
    requires all spectra within a dataset collected using the same instrument parameters
  - SPANS may not be appropriate for data sets with systematic differences in intensity
    distributions among groups
