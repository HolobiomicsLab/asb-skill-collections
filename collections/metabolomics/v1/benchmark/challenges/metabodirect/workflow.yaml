narrative:
  tagline: MetaboDirect is an open-source, command-line pipeline that automates analysis,
    visualization, and statistical interpretation of direct injection FT-ICR MS metabolomic
    data with minimal coding requirements. The tool uniquely generates ab initio biochemical
    transformation networks from mass differences and demonstrated superior computational
    efficiency compared to existing FT-ICR MS software.
  pseudo_abstract: 'MetaboDirect addresses a critical gap in FT-ICR MS data analysis
    by providing a fully automated, single-command-line pipeline for processing high-resolution
    mass spectrometry datasets. The software performs data pre-processing, filtering,
    normalization, chemodiversity analysis, multivariate statistical analysis (PERMANOVA,
    NMDS, PCA), and transformation network construction. MetaboDirect generates standard
    visualizations including Van Krevelen diagrams, molecular composition plots, and
    pairwise comparisons, while requiring minimal programming expertise through a
    command-line interface that also allows customization for advanced users. The
    pipeline was benchmarked on two real FT-ICR MS datasets: a marine phage-bacterial
    infection experiment (36 samples, ~495 assigned molecular formulas per sample)
    completed in <1 min for core analysis steps, and a Sphagnum leachate microbial
    degradation study (4 samples, ~1793 assigned formulas) completed in ~30 s. A unique
    feature is the ab initio generation of mass-difference-based biochemical transformation
    networks that identify putative metabolic connections and hub metabolites without
    requiring compound identification. Comparative evaluation shows MetaboDirect performs
    all analyses available in competing tools (MetaboAnalyst, PyKrev, ftmsRanalysis,
    UltraMassExplorer) except raw spectra processing and molecular formula assignment,
    while standing apart in automated network generation and ease of access for non-programmers.
    Application to the S. fallax leachate study demonstrated that microbial inoculation
    increased metabolite richness but decreased functional diversity, indicating samples
    contained greater overall diversity but reduced diversity in decomposability and
    chemical reactivity.'
  research_questions:
  - Which analytical and visualization features are implemented in MetaboDirect, and
    how do its capabilities compare to other available FT-ICR MS software tools across
    key dimensions such as data filtering, statistical analysis, and transformation
    network generation?
  - Do the wall-clock runtimes of MetaboDirect's main pipeline on real FT-ICR MS datasets
    match the reported performance benchmarks of <1 min for 40 samples and ~2 min
    for 120 samples?
  - Does the phage-type factor (HP1 vs. HS2 vs. control) produce a statistically significant
    difference in metabolite content in the marine bacterium-phage system according
    to PERMANOVA analysis?
  - How does MetaboDirect construct biochemical transformation networks from FT-ICR
    MS peak data, and what are the input requirements and output formats for this
    mass-difference network generation step?
  - Does inoculation of S. fallax leachate with microorganisms increase metabolite
    richness but decrease functional diversity compared to uninoculated control samples?
  methods_summary: "Inspect MetaboDirect codebase (Python/R) and ReadTheDocs documentation\
    \ to enumerate all implemented analytical features across six pipeline steps.\
    \ Systematically extract feature specifications from source code: filtering thresholds\
    \ (m/z, isotopic, formula error \u22640.5 ppm, sample prevalence), normalization\
    \ methods (max, minmax, mean, median, total sum, zscore), molecular indices (NOSC,\
    \ GFE, AImod, DBE), statistical tests (PERMANOVA, NMDS, PCA), chemodiversity metrics\
    \ (Shannon, Gini-Simpson, Chao1, Rao's), and transformation network construction.\
    \ Query published documentation for UltraMassExplorer, FREDA, MetaboAnalyst, DropMS,\
    \ and i-van Krevelen to determine which features each tool supports. Cross-reference\
    \ MetaboDirect dependencies (vegan, SYNCSA, pmartR, KEGGREST, py4cytoscape) to\
    \ confirm implementation of statistical and network visualization features. Construct\
    \ binary comparison table with tools as rows and features as columns, marking\
    \ \u2714 for present and \u2716 for absent. Validation: Comparison table matches\
    \ the binary feature matrix reported in the paper's tool comparison figure/table,\
    \ with all six MetaboDirect pipeline steps and all cited comparison tools represented.\
    \ Install MetaboDirect v0.3.4 with Python (NumPy, pandas, seaborn, matplotlib)\
    \ and R (vegan, SYNCSA) dependencies from GitHub and Zenodo sources. Retrieve\
    \ phage-infected bacterium (36 samples, ~1025 peaks, ~495 assigned formulas) and\
    \ S. fallax leachate (4 samples) peak-abundance CSV files from OSF deposit. Execute\
    \ MetaboDirect main pipeline (data pre-processing, diagnostics, exploration, chemodiversity\
    \ analysis) excluding KEGG mapping and transformation networks via command-line\
    \ interface. Measure and record wall-clock runtime for phage dataset and S. fallax\
    \ dataset using system timing tools; generate all intermediate CSV outputs (filtered\
    \ peaks, thermodynamic indices, normalized intensities, diversity metrics). Validation:\
    \ Compare observed runtimes (phage expected <36 seconds; S. fallax per reported\
    \ value) against benchmarks; verify all expected CSV and visualization output\
    \ files exist and contain non-empty tables with correct column headers matching\
    \ pipeline documentation. Load normalized peak-intensity matrix and sample metadata\
    \ (phage type grouping) from preprocessed MetaboDirect outputs for the 36-sample\
    \ marine phage-host dataset. Calculate pairwise distances (Bray-Curtis, Euclidean,\
    \ or Jaccard) between all samples using the vegdist function from the vegan package\
    \ on normalized peak intensities. Execute PERMANOVA (permutational analysis of\
    \ variance) with phage type as the grouping factor and 999 permutations to test\
    \ the null hypothesis of no difference in metabolite composition between HP1,\
    \ HS2, and control groups. Generate NMDS ordination using the selected distance\
    \ metric, extracting the first two principal components as axes for visualization.\
    \ Export PERMANOVA results (p-value, F-statistic, R\xB2) and NMDS scores to CSV;\
    \ generate NMDS scatterplot with samples colored by phage type. Validation: Confirm\
    \ that the PERMANOVA p-value matches the non-significant result (p > 0.05) reported\
    \ in Supplementary Fig. S7C; verify NMDS plot shows no clear separation of samples\
    \ by phage type. Load filtered peak list and reference biochemical transformation\
    \ key into memory Calculate all pairwise mass differences between detected peaks\
    \ within each sample Match mass differences to reference transformation key, retaining\
    \ matches with \u22641 ppm error tolerance Classify matched transformations as\
    \ biotic or abiotic based on prior biochemical categorization Generate node CSV\
    \ (peaks with m/z, formula, compound class) and edge CSV files (transformations\
    \ with source, target, type, error) formatted for Cytoscape Compute and export\
    \ transformation summary statistics (count per sample, frequency distribution)\
    \ as CSV tables and bar plots Validation: verify edge files contain no transformations\
    \ with mass error >1 ppm, confirm all nodes reference detected peaks in input\
    \ list, and confirm all transformations are classified (biotic or abiotic) Load\
    \ S. fallax leachate peak-abundance matrix (CSV) and sample metadata with inoculation\
    \ status annotations. Apply sum-normalization to raw peak intensities within each\
    \ sample to standardize total abundance across samples. Compute abundance-based\
    \ richness and diversity indices (Shannon, Gini-Simpson, Chao1) from normalized\
    \ peak intensities using vegan package functions. Compute functional-based diversity\
    \ (Rao's quadratic entropy) using SYNCSA package, integrating elemental composition,\
    \ decomposability indices (NOSC, GFE, AImod, DBE), and aromaticity traits. Stratify\
    \ all diversity metrics by inoculation status (inoculated vs. control) and generate\
    \ grouped box plot visualizations. Export diversity metric values and grouped\
    \ summary statistics to CSV and export visualizations as PNG/PDF. Validation:\
    \ Verify that median/mean values of abundance-based richness indices (Chao1, Shannon)\
    \ are higher in inoculated samples and that Rao's quadratic entropy is lower in\
    \ inoculated samples relative to controls, consistent with reported patterns in\
    \ the paper."
