narrative:
  tagline: LipoCLEAN is a command-line tool that filters lipid identifications from
    MS-DIAL through configuration via TOML-formatted options files. The tool supports
    MS-DIAL versions 4 and 5, with version-specific default configuration templates
    that can be generated and customized.
  pseudo_abstract: LipoCLEAN accepts all configuration options, including MS-DIAL
    export file locations, through a TOML-formatted text file. Version-specific default
    configuration files can be generated for MS-DIAL 4 or MS-DIAL 5 using the `--print
    MSD4` or `--print MSD5` command-line arguments, which create an `options.txt`
    file that users can subsequently edit. The tool can be installed and run as an
    executable, a Python package, or a Docker container.
  research_questions:
  - How does the LipoCLEAN command-line tool accept configuration input and what file
    format is required to specify MS-DIAL export locations?
  - How does the LipoCLEAN CLI generate default configuration files for different
    MS-DIAL versions?
  methods_summary: 'Prepare TOML configuration file with LipoCLEAN options, specifying
    MS-DIAL version and input dataset path. Invoke LipoCLEAN command-line interface
    with the TOML configuration as the primary argument. Capture tool output and error
    streams to verify successful execution. Validation: Confirm tool exits with status
    code 0, output file exists and contains quality-scored lipid identifications in
    the expected tabular format. Invoke LipoCLEAN CLI with `--print MSD4` or `--print
    MSD5` flag to retrieve default configuration for the target MS-DIAL version Capture
    or redirect the generated TOML-formatted options output to options.txt file Validation:
    Confirm that options.txt file exists and contains valid TOML syntax with all expected
    configuration keys for the specified MS-DIAL version'
  domain: lipidomics
