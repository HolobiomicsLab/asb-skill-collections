narrative:
  tagline: TARDIS is an R package for targeted peak integration in LC-MS data that
    automatically calculates area under the peak, max intensity, and quality metrics
    for chemical compounds. The workflow demonstrates screening mode to inspect extracted
    ion chromatograms, full peak detection to generate quantitative output tables,
    and integration with MsExperiment objects.
  pseudo_abstract: 'This workflow demonstrates the complete targeted analysis pipeline
    in TARDIS for LC-MS data. Starting with a target compound list created from an
    input file, the workflow first runs tardisPeaks() in screening mode to generate
    diagnostic extracted ion chromatogram (EIC) plots for ten selected compounds across
    quality control (QC) runs, allowing visual inspection of peak detection and integration
    results. After adjusting retention time parameters based on the screening results,
    the workflow then executes tardisPeaks() with full peak detection (screening_mode=FALSE)
    to produce quantitative outputs: a data.frame containing per-target area-under-curve
    (AUC) values across all runs, a QC feature table with average metrics per target,
    and multiple CSV files reporting max intensity, signal-to-noise ratio, peak correlation,
    and points over peak for all targets. The workflow additionally demonstrates that
    when processing data containing multiple overlapping m/z scan windows without
    mass_range separation, peaks display a sawtooth profile due to empty spectrum
    filtering, and shows that tardisPeaks() accepts both file paths and MsExperiment
    objects as input for screening mode operations.'
  research_questions:
  - How does the createTargetList() function filter and restructure input compound
    data based on polarity specification to produce a correctly formatted target data.frame?
  - Does tardisPeaks() in screening mode successfully generate and save extracted
    ion chromatogram (EIC) plots for all 10 target compounds (5 internal standards
    + 5 endogenous metabolites) to the diagnostic QC output folder?
  - What quantitative metrics and output tables does tardisPeaks() generate when run
    in peak detection mode (screening_mode=FALSE) on LC-MS data?
  - Does the sawtooth artefact appear in extracted ion chromatogram (EIC) output when
    tardisPeaks() is run on LC-MS data with multiple overlapping m/z scan windows
    without proper mass_range separation?
  - Do MsExperiment objects with annotated sampleData$type produce identical screening-mode
    EIC diagnostic outputs compared to file-path-based invocation of tardisPeaks()?
  methods_summary: 'Load targets file (xlsx or csv) into R environment Validate required
    columns: compound ID, name, m/z, RT (minutes), polarity Filter rows by polarity
    mode (positive or negative ionization) Select and standardize column order for
    downstream tardisPeaks integration Validation: Output data.frame contains all
    original targets (or filtered subset) with correct column names and data types;
    no missing values in required fields References: source article (DOI: 10.1021/acs.analchem.5c00567)
    Load 14 centroided .mzML LC-MS runs and target compound metadata (m/z, retention
    time, polarity) into TARDIS environment. Execute tardisPeaks() with screening_mode=TRUE
    to screen target visibility within m/z and retention time windows, applying automatic
    polarity filtering. Generate and save 10 extracted ion chromatogram (EIC) PNG
    plots with peak annotations to output/screening/Diagnostic_QCs_Batch_1/ folder.
    Validation: verify that exactly 10 PNG files are generated (one per target), each
    file exists in the specified output directory, and files are readable PNG images
    with visible chromatographic traces and peak annotations. References: source article
    (DOI: 10.1021/acs.analchem.5c00567) Load vignette LC-MS data in centroided .mzML
    format using Spectra package. Apply xcms retention-time correction algorithm to
    align targets 1577 and 1583 across runs. Execute tardisPeaks() with screening_mode=FALSE
    to perform targeted peak detection with automatic polarity filtering. Calculate
    area-under-curve (AUC), max intensity, signal-to-noise ratio (SNR), peak correlation
    (peak_cor), and points-over-peak for each target in each run. Aggregate per-run
    metrics into QC feature table tibble (average metrics per target across QC runs)
    and export individual metric tables (AUC, Max Intensity, SNR, peak_cor, pop) as
    CSV files. Save extracted ion chromatograms (EICs) to output directory for manual
    quality inspection. Validation: Verify that QC feature table tibble and all per-metric
    CSV files (AUC, Max Intensity, SNR, peak_cor, pop) are successfully written to
    the output directory with correct structure and non-empty content matching expected
    metric columns. References: source article (DOI: 10.1021/acs.analchem.5c00567)
    Load centroided mzML vignette files and parse as Spectra objects. Define target
    compound list with m/z, RT, and polarity annotations. Execute tardisPeaks() with
    multi-window mass_range but without scan-window separation to trigger sawtooth
    artefacts. Re-execute tardisPeaks() with correct mass_range argument routing to
    enable scan-window segregation. Generate and compare EIC plots from both runs
    to visualize artefact elimination. Validation: Confirm sawtooth oscillations present
    in first EIC set and absent in second set; verify AUC and peak-shape metrics improve
    with correct routing. References: source article (DOI: 10.1021/acs.analchem.5c00567)
    Load vignette mzML files into a Spectra object via the Spectra package. Prepare
    sample metadata with type labels and combine with Spectra to construct an MsExperiment
    object. Define a target list with compound identifiers, chemical names, m/z values,
    retention times, and ion polarity. Execute tardisPeaks() in screening mode (screening_mode=TRUE)
    using the MsExperiment object as lcmsData to check target visibility within expected
    m/z and RT windows. Extract and compare diagnostic EIC PNG files from MsExperiment-based
    invocation against reference EICs from file-path-based invocation to confirm functional
    equivalence. Validation: EIC PNG files produced by both invocation methods are
    identical in file content and visual representation, confirming correct MsExperiment
    integration. References: source article (DOI: 10.1021/acs.analchem.5c00567)'
  domain: multi-omics
