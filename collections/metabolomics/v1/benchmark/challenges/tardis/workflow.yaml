      other tools of the Rformassspectrometry initiative.
    claim_type: finding
    speculative: false
    entity_id: TARDIS_system
  - claim_text: Input files for TARDIS need to be converted to the .mzML format.
    claim_type: finding
    speculative: false
    entity_id: TARDIS_system
  - claim_text: Input files for TARDIS need to be centroided.
    claim_type: finding
    speculative: false
    entity_id: TARDIS_system
  - claim_text: Polarity filtering is done within TARDIS, so no polarity subsetting
