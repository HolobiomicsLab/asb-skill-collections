narrative:
  tagline: MESSES is a Python package that converts tabular experimental metadata
    into structured JSON formats and supports transformation between JSON representations
    and specialized domain formats. The package demonstrates mechanisms for extracting
    tagged tabular data, validating against schemas, and converting between formats
    using customizable directives.
  pseudo_abstract: 'MESSES (Metadata from Experimental SpreadSheets Extraction System)
    facilitates conversion of tabular data into JSON and other formats through three
    primary commands: extract converts tagged tabular data into intermediate JSON
    form, validate checks JSON data against the experiment description specification
    and optional user-provided schemas, and convert transforms JSON to other formats
    using conversion directives. The convert command employs directive-driven transformations
    that support str directives for building string values through override, code
    evaluation, record selection, or iteration with filtering and sorting; matrix
    directives for generating lists of dictionaries through field mapping, record
    collation, and custom code execution; and generic JSON-to-JSON conversion. The
    system processes directives defined in JSON or tagged tabular form, where table
    columns marked with #<table_name>.id denote record identifiers and columns marked
    with #.<field_name> denote record fields. Conversion results were demonstrated
    on metabolomics datasets: the collate directive grouped measurement records by
    assignment field to consolidate intensity values across samples for each metabolite,
    and the for_each directive with filtering and sorting concatenated multiple sample
    preparation protocol descriptions into a single summary field.'
  research_questions:
  - How does the str directive handler resolve a record from input JSON by reading
    conversion directive specifications that include override, code, record_id, for_each,
    test, sort_by, sort_order, delimiter, and fields parameters?
  - How does the matrix directive handler resolve a matrix-type record from conversion
    directives against input JSON to produce a list of dictionaries, including support
    for headers, collation, field exclusion, sorting, filtering, and custom code?
  - 'How does the parser convert a tagged tabular file (using export tags like #<table_name>.id
    and #.<field_name>) into the nested JSON structure required by the directive resolvers?'
  - When a matrix directive with collate='assignment' is applied to measurement records
    containing multiple samples for the same metabolite assignment, does the directive
    correctly group records by assignment and merge their sample intensity data into
    a single dictionary?
  - When applying a str directive with for_each=True, test filtering, sorting, and
    space delimiter to concatenate multiple protocol records, does the output match
    the expected concatenated summary string?
  methods_summary: 'Parse conversion directives JSON to extract str-type definition
    with all sub-fields. Load input JSON document and locate target records by record_id
    or root scope. Evaluate test condition (if present) to gate directive application.
    Iterate over for_each collection (if specified) or apply once to target record.
    Apply code transformation (if present) and resolve field references. Concatenate
    resolved field values using specified delimiter. Apply sort_by and sort_order
    transformations (if specified). Apply override logic to determine whether to replace
    or preserve existing str values. Validation: Confirm resolved JSON output contains
    str fields populated per directive specification, test sub-directive conditions
    respected, for_each iteration complete, and override behavior matches expected
    state. References: source article (DOI: 10.3390/metabo11030163) Parse matrix-type
    conversion directives to extract configuration parameters (headers, collate, fields_to_headers,
    exclusion_headers, values_to_str, sort_by, sort_order, test, code). Load input
    JSON and apply field-to-header mapping to construct output dictionaries with specified
    key names. Filter records using test condition and exclusion_headers criteria
    to retain qualifying records. Collate grouped records using the collate directive
    to aggregate multiple source records into single outputs. Convert specified fields
    to string representation and sort results by specified fields in configured order.
    Execute custom transformation code to apply user-defined logic to final records.
    Validation: confirm output record count matches expected cardinality, all headers
    are present in each dictionary, data types conform to directives, and no records
    fail test or exclusion criteria. References: source article (DOI: 10.3390/metabo11030163)
    Parse tagged tabular file headers to extract export tag directives Build hierarchical
    JSON object by mapping table names, record identifiers, and field names to nested
    structure Validate tag syntax compliance and uniqueness constraints Output nested
    JSON structure for downstream Conversion Directives Engine consumption Validation:
    parsed JSON structure contains all tagged columns in correct hierarchy with no
    duplicate record identifiers within each table References: source article (DOI:
    10.3390/metabo11030163) Load the IC-FTMS example dataset in JSON format from MESSES
    documentation Parse and configure a matrix conversion directive with collate=''assignment''
    parameter Execute MESSES convert command to apply the directive and generate output
    list of dictionaries Compare output structure and content against documented expected
    output in Collate section Validation: verify that the produced list of dictionaries
    exactly matches the expected JSON structure documented in the Collate section
    reference References: source article (DOI: 10.3390/metabo11030163) Load the documented
    example JSON input containing the protocol table. Apply str directive with for_each=True
    and test=''type=sample_prep'' to filter protocol records. Sort filtered records
    by ''id'' field in ascending order. Concatenate sorted record values using space
    delimiter to generate SAMPLEPREP_SUMMARY. Validation: Compare generated SAMPLEPREP_SUMMARY
    string character-for-character against the expected output documented in the For
    Each section. References: source article (DOI: 10.3390/metabo11030163)'
