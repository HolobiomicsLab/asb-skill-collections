narrative:
  tagline: This repository provides reproducible Python code in a Jupyter notebook
    for simulating and analyzing Over-representation Analysis (ORA) in metabolomics
    pathway analysis, enabling users to examine how metabolite detection coverage
    affects ORA statistical outcomes.
  pseudo_abstract: The study presents a Jupyter notebook-based implementation (src/reproducible_simulations.ipynb)
    containing Python code tested on Python 3.8 with standard hardware that enables
    reproduction of reported ORA simulation results and analysis of how metabolite
    detection coverage impacts ORA p-value distributions. The code implements the
    background-set selection mechanism for ORA pathway analysis in metabolomics and
    allows users to adapt the simulations for application to their own data.
  research_questions:
  - Can the Python simulation code in the reproducible_simulations.ipynb notebook
    be executed to regenerate the results demonstrating pitfalls and best practices
    for Over-representation Analysis in metabolomics?
  - How does the fraction of metabolites detected (coverage) relative to the pathway
    database affect the distribution of ORA p-values and false-positive rates in metabolomics
    pathway analysis?
  - How is the background set of metabolites constructed for Over-representation Analysis
    (ORA) in metabolomics, given an experimental detection list and a metabolomics
    pathway database?
  methods_summary: "Clone the cwieder/metabolomics-ORA repository to obtain the reproducible\
    \ simulation notebook and dependencies. Install Python 3.8 and all required packages\
    \ specified in the repository environment configuration. Execute the Jupyter notebook\
    \ src/reproducible_simulations.ipynb cell-by-cell to run ORA simulations. Collect\
    \ all generated figures and tables demonstrating ORA pitfalls and best-practice\
    \ recommendations. Validation: regenerated outputs match figures and tables published\
    \ in DOI:10.1371/journal.pcbi.1009105. Clone the metabolomics-ORA repository containing\
    \ the simulation framework and pathway database. Execute the Jupyter notebook\
    \ simulation workflow, varying the fraction of detected metabolites across coverage\
    \ levels (e.g., 10\u2013100%). For each coverage level, run ORA on simulated metabolite\
    \ sets and collect p-value distributions and false-positive counts at p < 0.05\
    \ threshold. Aggregate simulation results into a summary statistics table containing\
    \ coverage percentage, ORA p-value summary statistics (mean, median, quartiles),\
    \ and false-positive rate with confidence intervals. Generate line plots of false-positive\
    \ rate versus coverage and distribution plots (boxplots or violin plots) of p-values\
    \ across coverage levels. Validation: confirm that false-positive rate tracks\
    \ expected behavior with coverage (increasing or decreasing according to the pathway\
    \ composition), and verify that p-value distributions show systematic shift with\
    \ coverage level. Load the metabolomics pathway database and map metabolites to\
    \ pathway annotations. Load the experimental detection list of metabolites identified\
    \ in the study. Construct the background set by selecting all metabolites in the\
    \ database that are NOT in the experimental detection list. Apply any study-specific\
    \ filtering rules (e.g., minimum pathway coverage, metabolite measurement feasibility).\
    \ Compute background-set statistics: total size, per-pathway counts, and overlap\
    \ validation. Validation: confirm background set size, pathway coverage distribution,\
    \ and absence of detection-list metabolites; verify no pathway is empty after\
    \ background construction."
