narrative:
  tagline: MS2LDA is an unsupervised machine learning framework that applies Latent
    Dirichlet Allocation to tandem mass spectrometry data to discover recurring fragmentation
    patterns (Mass2Motifs) representing molecular substructures, with integrated preprocessing,
    LDA modeling, automated annotation via MAG and Spec2Vec, MotifDB integration,
    and interactive visualization.
  pseudo_abstract: "MS2LDA implements a complete workflow for unsupervised substructure\
    \ discovery in mass spectrometry data. The tool describes a preprocessing mechanism\
    \ that converts MS/MS spectra into bag-of-fragments format, extracts neutral losses,\
    \ and filters noise to prepare input for LDA modeling. MS2LDA applies Latent Dirichlet\
    \ Allocation to infer Mass2Motifs\u2014recurring patterns of fragment ions and\
    \ neutral losses that describe latent fragmentation behaviors across spectral\
    \ datasets. The framework incorporates automated annotation of discovered Mass2Motifs\
    \ through a mechanism that integrates the MAG annotation system with Spec2Vec\
    \ embeddings, loading pretrained models from a Zenodo repository to generate per-motif\
    \ annotation records. MS2LDA describes integration with a MassQL-searchable MotifDB\
    \ that enables motif-to-database comparison and retrieval of known reference motifs.\
    \ The tool provides a postprocessing pipeline that generates molecular network\
    \ representations (GraphML format) encoding discovered motifs and their relationships.\
    \ Results are accessible through both an interactive web application (MS2LDAViz)\
    \ for real-time exploration and command-line interfaces for scripted analysis\
    \ workflows, with output including Mass2Motif collections, spectra-motif loadings,\
    \ visualizations, and network exports."
  research_questions:
  - How does MS2LDA convert mass spectrometry input files in multiple formats (.mgf,
    .msp, .mzML) into a bag-of-fragments representation suitable for LDA training?
  - How does MS2LDA apply Latent Dirichlet Allocation to a bag-of-fragments corpus
    to infer Mass2Motifs from mass spectrometry fragmentation patterns?
  - How does the Spec2Vec-based annotation lookup process generate per-motif annotation
    records by loading a trained motifset and the Spec2Vec model?
  - How does MS2LDA query a MassQL-searchable MotifDB to retrieve and rank database
    matches for discovered motifs?
  - How does MS2LDA construct a network graph that encodes spectral similarity relationships
    and motif membership annotations for post-processing visualization and export?
  methods_summary: "Load spectral data from input file (mgf, msp, or mzML) using format-specific\
    \ parsers. Extract fragment ion m/z values and peak intensities; calculate neutral\
    \ loss values for all fragment\u2013precursor pairs. Apply noise filtering to\
    \ remove low-intensity fragments and statistically insignificant peaks. Bin fragment\
    \ and neutral loss masses into discrete mass tokens via mass-binning discretization.\
    \ Generate bag-of-fragments corpus, encoding each spectrum as a document with\
    \ token frequencies. Validation: verify corpus dimensionality, token inventory\
    \ completeness, and that all documents are non-empty; check that at least 80%\
    \ of input spectra are retained post-filtering. Load preprocessed corpus containing\
    \ bag-of-fragments representations of preprocessed MS/MS spectra Initialize LDA\
    \ model with specified topic count (n_motifs), hyperparameters (alpha, beta),\
    \ and iteration limit (n_iterations) Train LDA inference on corpus, iteratively\
    \ updating topic-fragment and spectrum-topic distributions Monitor and record\
    \ convergence metrics (log-likelihood or perplexity) across training iterations\
    \ Extract learned Mass2Motif distributions (topic-fragment probability maps) from\
    \ converged model Serialize trained model state to pickle binary (ms2lda.bin)\
    \ and motifset to JSON schema (motifset.json) Validation: convergence curve shows\
    \ stable or decreasing objective; motifset contains all n_motifs with non-zero\
    \ fragment probabilities; model and motifset files are non-empty and deserializable\
    \ Load pre-trained Spec2Vec model and spectral embeddings from Zenodo deposit.\
    \ Parse trained motifset JSON file to extract all Mass2Motif records and their\
    \ fragment/loss compositions. Compute cosine similarity between each motif's embedding\
    \ and reference spectral embeddings using Spec2Vec. Rank candidate annotations\
    \ by similarity score and extract top-N matches with associated structural labels.\
    \ Validation: Output JSON contains all motif identifiers with non-null similarity\
    \ scores and at least one annotation label per motif; similarity scores fall within\
    \ [0, 1] range and are ranked in descending order. Load the inferred motifset\
    \ JSON, extracting Mass2Motif definitions (fragment and neutral-loss compositions).\
    \ For each motif, formulate a MassQL query targeting its characteristic fragment\
    \ and neutral-loss pattern. Execute the MassQL query against the MotifDB library\
    \ using the MassQL4MotifDB integration layer. Rank returned matches by similarity\
    \ or match score (e.g., cosine similarity on fragment-loss overlap). Serialize\
    \ ranked results to JSON with per-motif match records (MotifDB ID, name, composition,\
    \ score). Validation: Confirm JSON output contains a ranked match list for each\
    \ input motif; verify presence of MotifDB identifiers, match scores, and composition\
    \ metadata for each returned entry. Load motifset JSON and extract Mass2Motif\
    \ fragment and neutral-loss probability distributions. Construct pseudo-spectra\
    \ for each motif by converting probabilities to intensity-weighted m/z vectors.\
    \ Compute pairwise cosine similarity between all motif pseudo-spectra. Filter\
    \ edges by similarity threshold and populate graph with motif nodes and weighted\
    \ similarity edges. Annotate nodes with motif metadata (ID, fragment composition,\
    \ spectra count) and edges with similarity scores. Serialize graph to GraphML\
    \ format with proper XML structure and attribute declarations. Validation: verify\
    \ network.graphml is valid XML, contains all motif nodes with unique IDs, edges\
    \ reflect computed similarity, and file is parseable by standard graph tools (e.g.,\
    \ NetworkX, Cytoscape)."
