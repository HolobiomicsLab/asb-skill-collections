narrative:
  tagline: MetaboAnnotatoR performs metabolite annotation of LC-MS All-ion fragmentation
    features using ion fragment databases, with demonstrated results showing three
    lipid annotations from six ESI+ lipidomics features including LPC(14:0) assignment
    for feature 3.
  pseudo_abstract: MetaboAnnotatoR is an R package designed to annotate metabolite
    features from LC-MS All-ion fragmentation (AIF) datasets acquired in centroid
    mode using ion fragment databases. The package operates on processed data consisting
    of XCMS peak-picked data and RAMClustR-derived pseudo-MS/MS spectra. When the
    annotateRC function was applied to six lipidomics features from human serum using
    the default LipidPos library, three features received lipid annotations, with
    LPC(14:0) assigned as the rank 1 annotation for feature 3 (468.3095 m/z, 82.92009
    s), which also showed candidate annotations to fragments of several PCs containing
    the 14:0 fatty acyl chain with lower confidence scores. The package describes
    mechanisms for generating custom library entries through genFragEntry (which identifies
    marker peaks above noise and mpeaksThres thresholds and attributes occurrence
    scores) and importing MS/MS spectra from .msp files via mspToLib (which converts
    spectra records to CSV library entries with ionization mode suffixes). Annotation
    results can be exported using saveAnnotations to store global annotations, ranked
    candidates, spectra visualizations as PDFs, and pseudo-MS/MS spectra as MGF files.
  research_questions:
  - Does the annotateRC function successfully annotate three out of six features from
    the targetTable.csv using xcmsSet and RAMClustR objects with LipidPos libraries?
  - What are the alternative candidate annotations for feature 3 (468.3095 m/z, 82.92009
    s) and how do their scores compare to the rank 1 annotation?
  - How does the genFragEntry function process an experimental MS/MS spectrum to generate
    a metabolite library entry by applying peak-picking thresholds and occurrence
    scoring?
  - Does the mspToLib function correctly convert MS/MS spectra from .msp library files
    into individual CSV library entries with appropriate positive/negative ionisation
    mode suffixes when applied with default peak-picking parameters?
  - Does the saveAnnotations function successfully write all expected output file
    types (global results table, ranked results, ranked spectra PDFs, and pseudo-MS/MS
    MGF file) to the specified directory without errors?
  methods_summary: "Load the targetTable.csv feature list and the pre-computed xcmsSet\
    \ and RAMClustR objects. Specify the LipidPos fragment ion library as the annotation\
    \ database. Execute the annotateRC function to compute fragment-ion matching scores\
    \ and rank candidate lipid identities. Extract ranked annotation results for all\
    \ six features. Validation: Verify that exactly three features receive lipid annotations\
    \ and that feature 3's top-ranked candidate is LPC(14:0). References: source article\
    \ (DOI: 10.1021/acs.analchem.1c03032) Load the annotateRC results object from\
    \ MetaboAnnotatoR containing ranked candidate annotations. Extract the ranked\
    \ candidate list for feature 3 (annotations$rankedResult[[3]]). Inspect annotation\
    \ scores and rank positions, confirming LPC(14:0) as rank 1. Identify and list\
    \ PC species containing the 14:0 fatty-acyl chain and their lower ranking positions.\
    \ Export the ranked candidate table to a CSV file with metabolite name, rank,\
    \ and score columns. Validation: Confirm file exists, contains at least 3 rows\
    \ (LPC(14:0) + at least 2 PC(14:0) variants), LPC(14:0) has rank=1, and all PC(14:0)\
    \ variants have rank > 1. References: source article (DOI: 10.1021/acs.analchem.1c03032)\
    \ Load MS/MS spectrum data from MassBank for D-Pantothenic Acid Apply noise threshold\
    \ filtering at intensity \u22650.005 to remove background signals Apply marker\
    \ peak threshold filtering at intensity \u22650.1 to identify significant fragments\
    \ Execute genFragEntry with mpeaksScore=0.9 and mzTol=0.01 to score and annotate\
    \ fragment matches Validation: Output CSV library entry contains annotated fragment\
    \ ions with mass, intensity, and match scores; structure matches MetaboAnnotatoR\
    \ library entry format References: source article (DOI: 10.1021/acs.analchem.1c03032)\
    \ Load MSP spectral library from MetaboAnnotatoR package bundle. Parse spectral\
    \ records and extract compound metadata (name, m/z, RT) and peak intensity lists.\
    \ Apply noise threshold (0.005) and marker peak threshold (0.1) to filter and\
    \ rank spectral peaks. Append ionization mode suffixes ([M+H]+ or [M-H]\u2212\
    ) to library entry identifiers based on precursor charge annotation. Export filtered\
    \ and annotated spectra as per-spectrum CSV rows with mode-suffixed headers. Validation:\
    \ Verify CSV row count matches input spectrum count, mode suffixes are present\
    \ and consistent, and peak columns are numeric and within 0\u2013100 relative\
    \ intensity range. References: source article (DOI: 10.1021/acs.analchem.1c03032)\
    \ Load MetaboAnnotatoR annotations object containing annotated features and ranked\
    \ candidate matches Execute saveAnnotations function to export results, PDFs,\
    \ and spectral data to a specified directory Enumerate and list all files generated\
    \ in the output directory Verify file presence and non-zero file size for each\
    \ expected output type Validation: Confirm that global results, ranked results,\
    \ ranked spectra PDFs (one per feature), and pseudo-MS/MS MGF file all exist and\
    \ contain data (file size > 0 bytes) References: source article (DOI: 10.1021/acs.analchem.1c03032)"
