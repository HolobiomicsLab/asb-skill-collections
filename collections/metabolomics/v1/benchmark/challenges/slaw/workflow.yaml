narrative:
  tagline: SLAW is a scalable, containerized workflow for untargeted LC-MS processing
    that integrates peak picking, sample alignment, isotopologue and adduct grouping,
    gap-filling by data recursion, and extraction of consolidated MS2 spectra and
    isotopic data.
  pseudo_abstract: SLAW implements a complete untargeted LC-MS processing pipeline
    with multiple integrated components. The workflow incorporates peak picking algorithms
    (Centwave, FeatureFinderMetabo, ADAP), followed by sample alignment and grouping
    of isotopologues and adducts. The pipeline includes gap-filling by data recursion
    as a processing step and extraction of consolidated MS2 spectra and isotopic data.
    SLAW is designed for scalability to efficiently process thousands of samples and
    features automated parameter optimization for peak picking, alignment, and gap-filling
    operations.
  research_questions:
  - How does SLAW implement gap-filling by data recursion to recover missing feature
    intensities across samples in untargeted LC-MS processing?
  - How does SLAW group detected LC-MS features into isotopologue and adduct clusters
    after peak picking?
  - How does SLAW extract and consolidate MS2 spectra and isotopic data from grouped
    feature ions across samples?
  methods_summary: 'Load aligned feature table containing missing (NA or zero) feature
    intensities from the alignment step Identify gaps: enumerate all missing feature
    intensity entries and their sample-feature coordinates Execute data recursion:
    for each missing entry, search across samples using retention time and m/z proximity
    windows to locate the same feature in alternate sample batches Retrieve and populate:
    fill missing intensities with values recovered from recursively matched samples
    Validation: confirm that all recoverable gaps have been filled and feature table
    dimensions match input (same samples and features) References: source article
    (DOI: 10.1021/acs.analchem.1c02687) Load aligned feature table with m/z, retention
    time, and intensity data. Define isotopologue mass differences (C13, N15, O18,
    D) and adduct mass transformations for the ionization mode. Cluster features by
    binning on retention time windows and linking features within mass tolerance of
    theoretical isotopologue/adduct masses. Assign group identifiers to isotopologues
    and adducts sharing the same molecular ion. Validation: grouped feature table
    contains all input features, each assigned a unique or shared group ID; mass differences
    between clustered features match theoretical isotopologue or adduct masses within
    specified ppm tolerance. References: source article (DOI: 10.1021/acs.analchem.1c02687)
    Load feature-grouped data structure and MS2 scan metadata from preceding processing
    steps. Map MS2 spectra to feature groups using retention time, m/z, and scan index
    linkages. Consolidate multiple MS2 scans per feature group by merging peak lists
    and intensities. Annotate isotopic relationships and adduct assignments within
    consolidated spectrum records. Validation: consolidated spectra file contains
    one entry per feature group with non-null MS2 mass list and isotope annotations
    present where applicable. References: source article (DOI: 10.1021/acs.analchem.1c02687)'
  domain: metabolomics
  techniques:
  - lc-ms
  - feature-detection
  - chromatogram-alignment
