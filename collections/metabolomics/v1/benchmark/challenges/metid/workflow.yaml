narrative:
  tagline: Met-ID automates metabolite identification in mass spectrometry imaging
    by handling derivatizing matrices that produce non-standard ions. The software
    is designed with extensibility to support any derivatizing matrix beyond the in-house
    FMP-10 reagent.
  pseudo_abstract: Met-ID addresses the challenge of automating metabolite identification
    in mass spectrometry imaging, a task traditionally performed manually by experts.
    The software is designed to handle derivatizing matrices such as FMP-10 that produce
    ions other than the common [M+H]+ in positive mode and [M-H]- in negative mode.
    A key design feature is the extensibility of Met-ID to support any derivatizing
    matrix, not limited to FMP-10. The repository maintains an automated CI pipeline
    tracked via GitHub Actions, as indicated by the workflow badge linked to main.yml.
  research_questions:
  - How does Met-ID compute expected adduct ions for metabolites when using derivatizing
    matrices like FMP-10, beyond the standard [M+H]+ and [M-H]- ions?
  - Does the Met-ID GitHub repository's CI workflow (main.yml) execute successfully
    and pass all automated checks as indicated by the badge?
  - Is Met-ID extensible to register and apply derivatizing matrices beyond FMP-10
    to produce correct adduct annotations?
  methods_summary: "Load and validate metabolite SMILES string; parse matrix identifier\
    \ to retrieve or initialize adduct ionization ruleset. Construct molecular graph\
    \ using RDKit; calculate exact molecular weight of the unmodified metabolite.\
    \ For each matrix-specific adduct rule, compute the expected m/z by adding matrix\
    \ mass and applying charge state (proton gain/loss). Compile predicted adduct\
    \ table with ion formula, mass shift, m/z, and charge state. Validation: Compare\
    \ predicted adduct m/z values against reference FMP-10 dataset; accept predictions\
    \ with mass error \u22645 ppm (or as specified in Nature Methods reference). Clone\
    \ the Met-ID repository from GitHub to a local or remote environment. Extract\
    \ and parse the main.yml workflow definition to identify test commands, dependencies,\
    \ and environment configuration. Install required dependencies (including RDKit\
    \ and any Python packages listed in requirements files). Execute the test suite\
    \ and CI commands as defined in the workflow, capturing all output and exit codes.\
    \ Compare the observed pass/fail status with the badge-reported status to confirm\
    \ reproducibility. Validation: Workflow execution completes with exit code 0 (success)\
    \ and matches the badge-reported passing state, or documents the specific failure\
    \ point if reproducibility is not achieved. Review Met-ID's extensibility architecture\
    \ and existing derivatizing matrix configuration interface Define and implement\
    \ configuration for a second derivatizing matrix using specifications or documentation\
    \ Register the new matrix in Met-ID's configuration loader or plugin system Execute\
    \ Met-ID on test metabolites using the newly registered matrix Validate predicted\
    \ adducts against expected ground truth or literature values Validation: adduct\
    \ annotations produced by Met-ID with the new matrix match expected ions for \u2265\
    90% of test metabolites"
