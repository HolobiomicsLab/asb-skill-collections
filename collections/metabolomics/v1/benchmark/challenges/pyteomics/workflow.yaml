narrative:
  tagline: Pyteomics is a Python package providing lightweight tools for proteomics
    data analysis, with modules for calculating polypeptide properties and accessing
    common proteomics data formats. The package is installable via pip and conda,
    with optional dependencies for extended functionality.
  pseudo_abstract: 'Pyteomics offers a collection of modules designed to facilitate
    common proteomics data analysis tasks, including calculation of basic physico-chemical
    properties of polypeptides such as mass, isotopic distribution, charge, and pI,
    as well as chromatographic retention time. The package supports access to proteomics
    data formats and provides modular functionality where core features are available
    through standard installation, while extended capabilities rely on optional dependencies:
    the mzMLb module requires h5py and hdf5plugin for accessing mzMLb data formats,
    the mass.unimod module depends on sqlalchemy for Unimod database access, and the
    proforma module uses psims for additional functionality. Pyteomics is distributed
    through multiple package managers including pip and Bioconda, supporting recent
    versions of Python 3.'
  research_questions:
  - Can the core Pyteomics modules (pyteomics.mass, pyteomics.pepxml, pyteomics.mzid,
    pyteomics.tandem, pyteomics.auxiliary) be successfully installed and imported
    after pip installation from PyPI?
  - What conditional dependencies must be installed to enable mzMLb format support
    in pyteomics?
  - Does the pyteomics.mass.unimod module successfully initialize when sqlalchemy
    is installed as a conditional dependency?
  - What is the mechanism by which the pyteomics.proforma module becomes available
    after installing the psims conditional dependency?
  - Can Pyteomics be successfully installed via the Bioconda conda channel and do
    its core modules import without errors?
  methods_summary: 'Execute pip install command for Pyteomics package from PyPI in
    a Python 3 environment Sequentially import each of the five core modules (pyteomics.mass,
    pyteomics.pepxml, pyteomics.mzid, pyteomics.tandem, pyteomics.auxiliary) to verify
    module availability Capture and log import status (success or exception details)
    for each module Validation: confirm installation completes without error and all
    five core modules import successfully without ImportError or missing dependency
    exceptions Install Pyteomics with the mzMLb extra specifier to fetch h5py and
    hdf5plugin dependencies. Execute Python import statement for pyteomics.mzmlb module.
    Validation: confirm that the import completes without ImportError, indicating
    successful dependency resolution and module accessibility. Install the sqlalchemy
    package dependency using pip package manager. Import the pyteomics.mass.unimod
    module in a Python script or interactive session. Instantiate the Unimod database
    accessor object to confirm initialization without errors. Validation: Successful
    module import and object instantiation with no exceptions raised indicates correct
    conditional dependency wiring. Execute pip install command targeting psims package
    from PyPI Import pyteomics.proforma module in interactive Python or test script
    Verify module loads without ImportError or ModuleNotFoundError exceptions Inspect
    module for ProForma-related functions and classes to confirm parsing capability
    is present Validation: Confirm pip installation exits with status 0, import statement
    executes without exception, and ProForma parsing callables are discoverable via
    introspection (dir() or hasattr()) Install Pyteomics using conda from the Bioconda
    channel Launch Python and attempt to import pyteomics.mass Attempt to import pyteomics.pepxml
    and pyteomics.mzid Record version information and import success status Validation:
    All three core module imports execute without errors and version information is
    captured in the verification report'
