narrative:
  tagline: "NeatMS is an open source Python package for automated filtering of false\
    \ positive MS\u2081 peaks in untargeted LCMS data using neural network-based classification.\
    \ The package enables users to label peaks, train or fine-tune neural network\
    \ models, optimize classification thresholds, and export filtered results."
  pseudo_abstract: "NeatMS provides an end-to-end workflow for untargeted LCMS signal\
    \ labeling and false positive peak filtering. The software implements neural network-based\
    \ classification to distinguish true from false positive peaks reported by standard\
    \ LCMS data processing pipelines such as mzMine and XCMS. Key functionalities\
    \ include: (1) a Jupyter-based interactive annotation tool for manual peak labeling\
    \ across three classes (High quality, Low quality, Noise); (2) methods to construct\
    \ training, test, and validation batches with configurable parameters (matrix\
    \ size of 120 points, retention time margin of 1, minimum 5 scans per peak); (3)\
    \ support for full model training from scratch (requiring \u2265500 peaks per\
    \ class) or transfer learning with frozen convolutional layers; (4) hyperparameter\
    \ optimization via threshold selection that computes true and false positive rates\
    \ across probability thresholds to maximize classification accuracy; (5) data\
    \ export functionality with flexible filtering by peak class, sample presence,\
    \ and quality criteria. When trained on representative sample subsets using default\
    \ network architecture, the model achieves AUC scores exceeding 0.95. The software\
    \ is distributed under the MIT License with tutorials, example data, and pre-trained\
    \ models available on GitHub."
  research_questions:
  - Does applying NeatMS default preprocessing to example mzML and feature-table inputs
    produce a peak matrix with the documented result_matrix_shape dimensions?
  - What is the optimal classification threshold value returned by the get_threshold()
    method when applied to a labelled peak dataset using the default NeatMS neural
    network model?
  - What are the True Positive Rate and False Positive Rate values at threshold 0.01
    when applying the default NeatMS model under full training conditions?
  - How does the nn_handler.create_batches() method operate when invoked with normalise_class=True
    versus normalise_class=False, and what are the structural differences in the resulting
    batch artifacts?
  - Does training the NeatMS CNN model from scratch on the provided example dataset
    under full training conditions produce an AUC ROC score exceeding 0.9 without
    evidence of overfitting?
  methods_summary: "Load raw mzML and feature table files into a NeatMS Experiment\
    \ object using the standard import interface. Create a NN_handler with default\
    \ parameters (matrix_size=120, margin=1, min_scan_num=5) to instantiate the peak\
    \ matrix construction pipeline. Generate batch arrays by calling create_batches()\
    \ with default 80:10:10 split ratios and no class normalization. Extract and inspect\
    \ the shape and binary encoding of the peak matrices to confirm (2, 120) dimensionality\
    \ and margin/peak signal partitioning. Validation: Confirm that peak matrices\
    \ have shape (2, 120), binary dimension correctly encodes margin (0) and peak\
    \ (1) regions with first/last 40 points and middle 40 points respectively, and\
    \ batch counts match documented 80:10:10 split. Load trained NeatMS model and\
    \ validation dataset containing labelled peaks across three classes (High_quality,\
    \ Low_quality, Noise). Invoke get_true_vs_false_positive_df(label='High_quality')\
    \ to compute true and false positive rates across a range of probability thresholds\
    \ (0.0\u20131.0). Select the threshold value that maximizes (True positive rate\
    \ \u2212 False positive rate) as the optimal decision boundary. Return the scalar\
    \ threshold and the underlying metrics dataframe for downstream use in peak classification.\
    \ Validation: Verify the returned threshold scalar is within expected range (0.22\
    \ \xB1 tolerance for default model) and that the metrics dataframe contains complete\
    \ probability-threshold rows with valid rate values between 0.0 and 1.0. Load\
    \ the trained NeatMS model and attach it to an NN_handler instance with validation\
    \ dataset. Invoke get_true_vs_false_positive_df(label='High_quality') to compute\
    \ the threshold-dependent recall table across probability thresholds [0.00\u2013\
    0.99]. Extract the row at Probability_threshold=0.01 and read columns True, False,\
    \ False_low, False_noise. Validate that True=1.0, False=0.440, False_low=0.803,\
    \ and False_noise\u22480.206, confirming 100% High_quality retention and 44% false\
    \ positive rate composition. Validation: output metrics must exactly match the\
    \ reference values reported in the methods text (True=1.0, False=0.44, Low_quality\
    \ proportion=80%, Noise proportion\u224820%). Load labeled experiment object containing\
    \ raw LC-MS data (mzML) and feature table (CSV) from 10\u201320 representative\
    \ samples with manual peak annotations across High_quality, Low_quality, and Noise\
    \ classes. Instantiate NN_handler with default parameters (matrice_size=120, margin=1,\
    \ min_scan_num=5) to configure peak matrix extraction and filtering thresholds.\
    \ Invoke create_batches(validation_split=0.1, normalise_class=False) to generate\
    \ training (80%), test (10%), and validation (10%) splits preserving original\
    \ class-frequency distributions. Invoke create_batches(validation_split=0.1, normalise_class=True)\
    \ to regenerate the same splits with class balancing, reducing all classes to\
    \ the minority-class size. Extract and compare per-class peak counts across all\
    \ six batches (three splits \xD7 two normalization modes) to verify that normalized\
    \ batches enforce equal class cardinality and unnormalized batches preserve imbalance.\
    \ Validation: Confirm that for each normalized batch, the count of High_quality\
    \ peaks equals the count of Low_quality peaks equals the count of Noise peaks;\
    \ and that unnormalized batches retain the original imbalanced distribution without\
    \ modification. Load raw mzML files and feature table (mzMine or XCMS CSV) into\
    \ NeatMS Experiment object. Create NN_handler and partition data into training\
    \ (80%), test (10%), and validation (10%) batches using create_batches(validation_split=0.1)\
    \ with default normalization (normalise_class=False). Initialize untrained CNN\
    \ using create_model(lr=0.00001, optimizer='Adam') with default architecture (convolutional\
    \ base + dense classifier + dropout + kernel regularization). Train model via\
    \ iterative train_model(epoch_count) calls, monitoring training and validation\
    \ accuracy logs to detect convergence and absence of overfitting. Compute True\
    \ Positive Rate and False Positive Rate at multiple probability thresholds using\
    \ get_true_vs_false_positive_df(). Calculate AUC ROC using scikit-learn auc()\
    \ function on threshold-swept TPR/FPR curve. Validation: AUC ROC score \u2265\
    \ 0.95; training accuracy and validation accuracy curves remain closely aligned\
    \ (no significant divergence indicating overfitting)."
