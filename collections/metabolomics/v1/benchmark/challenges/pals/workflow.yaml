narrative:
  tagline: PALS is a pathway analysis tool that decomposes activity levels via the
    PLAGE method and demonstrates greater robustness to noise and missing peaks compared
    to ORA and GSEA alternatives in metabolomics data.
  pseudo_abstract: This work introduces PALS (Pathway Activity Level Scoring), a complete
    tool for pathway analysis that performs database queries, decomposes activity
    levels in pathways via the PLAGE method, and presents results through an interactive
    web application. The paper reports that PALS exhibits greater robustness to noise
    and missing peaks compared to ORA and GSEA alternatives, with particular importance
    for metabolomics peak data where such artifacts are prevalent. The authors demonstrate
    that PALS's decomposition approach is amenable to analysis of any group of metabolite
    sets beyond pathways, including Molecular Families from GNPS and Mass2Motifs from
    MS2LDA. Analysis of sensitivity under simulated noise and peak dropout confirms
    that PALS outperforms ORA and GSEA alternatives on these robustness dimensions.
  research_questions:
  - Does PALS demonstrate greater robustness to noise and missing peaks in metabolomics
    peak data compared to ORA and GSEA methods?
  - How does the PLAGE decomposition method in PALS convert a metabolite intensity
    matrix and pathway database into quantitative pathway activity level scores?
  - Does the PLAGE decomposition method in PALS generalise to non-pathway metabolite
    groupings such as Molecular Families from GNPS and Mass2Motifs from MS2LDA?
  - How does the rank-order stability of top-scoring pathways in PALS degrade as Gaussian
    noise and random peak removal increase in severity across a metabolomics dataset?
  - Can the PLAGE decomposition method in PALS be extended to score user-uploaded
    custom metabolite sets beyond the three currently supported set types (pathways,
    Molecular Families, and Mass2Motifs)?
  methods_summary: "Load metabolomics peak intensity matrix and pathway/metabolite\
    \ set annotations. Compute pathway activity scores using PALS (PLAGE decomposition),\
    \ ORA (hypergeometric test), and GSEA (ranked enrichment). Generate in-silico\
    \ noise-perturbed datasets by randomly removing peaks at controlled rates (e.g.,\
    \ 10%, 25%, 50%). Re-run all three methods on each perturbed dataset variant.\
    \ Calculate robustness metrics (e.g., Spearman rank correlation, or fraction of\
    \ pathways with consistent effect-size direction) comparing original vs. perturbed\
    \ results. Validation: PALS exhibits higher rank-correlation stability and effect-size\
    \ preservation across all noise levels compared to ORA and GSEA, reproducing the\
    \ reported robustness advantage. References: source article (DOI: 10.1186/1471-2105-6-225)\
    \ Load metabolite intensity matrix (metabolites \xD7 samples) and pathway definitions\
    \ from database. For each pathway, extract the subset of metabolites belonging\
    \ to that pathway from the intensity matrix. Apply singular value decomposition\
    \ (SVD) to each pathway-specific metabolite intensity submatrix. Extract the first\
    \ left singular vector (first principal component) as the pathway activity score.\
    \ Normalize and scale pathway activity scores across all pathways to enable cross-pathway\
    \ comparison. Rank pathways by absolute activity level magnitude and assemble\
    \ into a ranked results table. Validation: Verify that output table contains one\
    \ row per pathway with activity scores; confirm pathway ranking is monotonic by\
    \ magnitude; assess robustness to simulated noise and missing values as reported\
    \ in paper findings. References: source article (DOI: 10.1186/1471-2105-6-225)\
    \ Load metabolomics data and non-pathway metabolite groupings (Molecular Families\
    \ and Mass2Motifs). Apply PALS decomposition using PLAGE algorithm to calculate\
    \ activity scores for each metabolite set across samples. Assess robustness of\
    \ PLAGE scores by introducing noise or simulating missing peaks and comparing\
    \ stability to pathway-based results. Validation: PLAGE successfully decomposes\
    \ non-pathway metabolite sets with comparable or superior robustness to noise/missing\
    \ peaks as pathway-based analyses, confirming generalisation beyond curated pathway\
    \ annotations. References: source article (DOI: 10.1186/1471-2105-6-225) Load\
    \ reference metabolomics dataset and pathway annotations. Run PALS on clean unperturbed\
    \ data; record and rank pathway activity scores as baseline. Systematically generate\
    \ perturbed datasets by injecting Gaussian noise and removing random peaks across\
    \ multiple intensity levels. Run PALS on each perturbed dataset using identical\
    \ decomposition parameters; record ranked pathway scores. Compute rank-order correlations\
    \ (Spearman \u03C1, Kendall \u03C4) and top-K retention percentages between perturbed\
    \ and baseline rankings. Validation: confirm that pathway rank-order correlation\
    \ remains \u2265 0.80 and top-5 pathway retention \u2265 80% under combined noise\
    \ and peak-removal up to 10% intensity threshold, consistent with reported PALS\
    \ robustness advantage. References: source article (DOI: 10.1186/1471-2105-6-225)\
    \ Parse and validate user-uploaded metabolite set file structure and identifiers\
    \ Integrate validated set into PALS pipeline as a new set type Execute PLAGE decomposition\
    \ to compute activity level scores Compile results into scored output table with\
    \ statistical metrics Validation: Verify output table contains all input metabolite\
    \ sets with non-null activity scores and statistical confidence intervals References:\
    \ source article (DOI: 10.1186/1471-2105-6-225)"
