narrative:
  tagline: Spec2Vec is a novel spectral similarity score inspired by Word2Vec that
    learns fragmental relationships from large MS/MS datasets to better correlate
    with structural similarity than cosine-based scores. The method enables improved
    library matching and molecular networking with greater computational scalability.
  pseudo_abstract: Spectral similarity scoring is fundamental to metabolomics analyses
    such as library matching and molecular networking, yet cosine-based scores, the
    current standard, show only partial correlation with true structural similarity.
    This work introduces Spec2Vec, which adapts Word2Vec algorithms from natural language
    processing to learn abstract spectral embeddings from co-occurrences of peaks
    and neutral losses across large MS/MS datasets. Using GNPS data from approximately
    13,000 unique molecules, Spec2Vec similarity scores demonstrate stronger correlation
    with structural similarity (measured by Tanimoto fingerprint similarity) than
    cosine or modified cosine scores when evaluated across the top 0.1% of scoring
    pairs in the UniqueInchikey dataset. In library matching experiments, Spec2Vec
    achieved notably better true-to-false-positive ratios at all thresholds compared
    to cosine-based methods, reaching up to 88% accuracy with higher retrieval rates.
    A Word2Vec model trained on the AllPositive dataset for 15 iterations achieves
    approximately 97% peak coverage. The method is computationally more scalable than
    cosine-based approaches, enabling rapid screening of unknown compounds against
    large spectral databases and improving clustering performance in molecular network
    analysis.
  research_questions:
  - How do Spec2Vec, cosine, and modified cosine similarity scores compare in their
    correlation with structural similarity when computed across all spectral pairs
    in the UniqueInchikey dataset?
  - How do Spec2Vec similarity scores compare to cosine and modified cosine scores
    in terms of true-to-false-positive rate during library matching on the AllPositive
    dataset?
  - How does the Spec2Vec method convert a pre-processed MS/MS spectrum into a fixed-length
    vector representation suitable for efficient similarity comparisons?
  - How does the fraction of peak coverage achieved by a Spec2Vec Word2Vec model vary
    as a function of training corpus size, and can a 97% coverage threshold be reproduced
    with the AllPositive dataset trained for 15 epochs?
  methods_summary: "Load pre-processed spectral datasets (AllPositive: 95,320 spectra;\
    \ UniqueInchiKeys: 12,797 spectra) from Zenodo. Obtain or train Word2Vec models\
    \ using gensim (CBOW, window 500, 15\u201350 epochs, negative sampling=5). Convert\
    \ all spectra to documents: represent peaks as 'peak@xxx.xx' (2-decimal binning)\
    \ and add neutral losses ('loss@xxx.xx') between 5.0\u2013200.0 Da. Compute all-pairs\
    \ Spec2Vec similarities via weighted spectrum vectors (weight = sqrt-normalized\
    \ intensity) and cosine distance; filter peaks by parent-mass scaling (max_peaks=0.5\xD7\
    parent_mass). Compute all-pairs cosine and modified cosine similarities using\
    \ matchms with intensity threshold <0.01. Compute all-pairs Tanimoto structural\
    \ similarity from RDKit daylight fingerprints (2048 bits) for annotated pairs.\
    \ Rank similarities in descending order, select top 0.1% of pairs, and calculate\
    \ mean Tanimoto for each method. Validation: mean Tanimoto values for Spec2Vec\
    \ must exceed those for cosine and modified cosine at top 0.1% percentile, confirming\
    \ stronger correlation with structural similarity. References: source article\
    \ (DOI: 10.1371/journal.pcbi.1008724) Load and filter AllPositive dataset: remove\
    \ peaks with m/z outside [0, 1000], discard spectra with <10 peaks, remove spectra\
    \ without InChIKey annotation. Pre-select library candidate spectra using precursor\
    \ m/z matching (1 ppm tolerance) to reduce computational cost. Compute cosine\
    \ similarity scores with relative intensity threshold <0.01, tolerance 0.005,\
    \ and min_match=6; compute modified cosine with tolerance 0.005 and min_match=10.\
    \ Compute Spec2Vec similarity scores using both 15-epoch and 50-epoch pre-trained\
    \ Word2Vec models on parent-mass-scaled peak subsets. For each similarity method,\
    \ rank query spectra and classify hits as true positives (matching planar InChIKey)\
    \ or false positives (non-matching structure) to construct ROC curves. Calculate\
    \ true-positive rate, false-positive rate, and area-under-curve for each method\
    \ and compare against reported paper benchmarks. Validation: ROC curve performance\
    \ metrics (AUC, TP/FP rates) must show Spec2Vec (especially 50-epoch model) superior\
    \ to cosine and modified cosine, with lower false-positive rates at equivalent\
    \ true-positive thresholds, matching patterns reported in the paper. References:\
    \ source article (DOI: 10.1371/journal.pcbi.1008724) Load pre-processed spectra\
    \ and pre-trained Word2Vec model into memory Tokenize each spectrum: convert peaks\
    \ to 'peak@xxx.xx' words (2-decimal binning) and neutral losses (5.0\u2013200.0\
    \ Da range) to 'loss@xxx.xx' words Retrieve Word2Vec embeddings for all peak and\
    \ loss words; track unknown words not in vocabulary Compute weighted spectrum\
    \ vector as sum of embeddings scaled by square root of normalized peak intensity\
    \ Calculate missing fraction (ratio of intensity from unknown peaks to total intensity)\
    \ and filter spectra with missing fraction \u22650.05 Validation: confirm spectrum\
    \ vectors have correct dimensionality (matching Word2Vec embedding size), all\
    \ vectors are non-zero, and missing fraction metric is computed for every spectrum\
    \ References: source article (DOI: 10.1371/journal.pcbi.1008724) Load AllPositive\
    \ dataset (95,320 spectra, pre-filtered to m/z \u2208 [0, 1000], \u226510 peaks)\
    \ and pre-trained Word2Vec model (15 epochs, CBOW, window=500, negative=5). Convert\
    \ each spectrum to a document: represent peaks as 'peak@xxx.xx' words (2-decimal\
    \ binning) and add neutral losses (5.0\u2013200.0 Da) as 'loss@xxx.xx' words.\
    \ Normalize peak intensities to maximum = 1 per spectrum; compute missing fraction\
    \ as 1 \u2212 (\u03A3\u221Aw_i for words in model vocabulary) / (\u03A3\u221A\
    w_i for all words). Aggregate missing-fraction statistics across all spectra and\
    \ compute mean coverage (1 \u2212 mean missing fraction). Vary effective corpus\
    \ size by progressively adding spectra in order and recompute coverage metrics\
    \ at each step to generate a corpus-size scaling curve. Validation: verify that\
    \ final mean coverage reaches \u226597% when corpus includes all 95,320 spectra,\
    \ matching the reported 97% peak coverage for the AllPositive 15-epoch model;\
    \ confirm no missing-fraction value exceeds the recommended threshold of 0.05\
    \ for \u226595% of spectra. References: source article (DOI: 10.1371/journal.pcbi.1008724)"
