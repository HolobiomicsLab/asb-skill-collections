evidence_spans:
- LipidMatch can be used with various peak picking software (for example MZmine, XCMS, MS-DIAL, and Compound Discoverer)
- An example of feature annotation using LC-MS AIF chromatograms processed using xcms and RamClustR packages
- It makes use of an established retention time correction algorithm from the `xcms` package
- The *xcms* R package provides functionality to efficiently preprocess LC-MS (as well as GC-MS and LC-MS/MS) data.
