name: RDKit
slug: rdkit
evidence_spans:
- Tanimoto similarity (Jaccard index) based on daylight-like molecular fingerprints, version 2020.03.2, 2048 bits, derived using rdkit
- standard library for parsing and manipulating SMILES and chemical structures
- Powered by RDKit
- molecular graph
- we used Tanimoto scores on RDKit [23] Daylight fingerprints (2048 bits) to compute structural similarities
- Use the RDKit converter as a reference implementation
