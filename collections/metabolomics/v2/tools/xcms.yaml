version_used: 3.11.4
evidence_spans:
- AutoTuner is a parameter tuning algorithm for XCMS, MZmine2, and other metabolomics data processing softwares.
- the estimates may be entered directly into XCMS to processes raw untargeted metabolomics data.
- 'Other metabolomics data processing tools can also be used for customized evaluation: `XCMS'
- XCMS Development Version 3.11.4 or above
- Use XCMS package (https://bioconductor.org/packages/release/bioc/html/xcms.html) for peak picking, alignment and grouping
- open source tools such as XCMS and MS-Dial
