name: mass2adduct
slug: mass2adduct
evidence_spans:
- This package presents tools for counting and identifying possible adducts in MS data
- library(mass2adduct)
- This package presents tools for counting and identifying possible adducts in MS data, and accompanies Janda et al. (in prep.).
- We can match massdiffs to specific adduct types using the same function `adductMatch`
- This performs a correlation test (by default two-tailed with Pearson's method) on each pair of peaks in the massdiff object.
derived_from:
