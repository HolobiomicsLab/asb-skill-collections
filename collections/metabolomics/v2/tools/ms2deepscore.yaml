name: MS2DeepScore
slug: ms2deepscore
evidence_spans:
- MS2DeepScore to predict structural similarity scores for spe
- we used the MS2DeepScore base network (Fig. 1) to compute the 200-dimensional spectral embeddings for all 3601 spectra in the test set
- Our MS2DeepScore Python library offers two types of data generators
- '`ms2deepscore` provides a Siamese neural network that is trained to predict molecular structural similarities'
- To estimate the uncertainty of a prediction we used Monte-Carlo Dropout ensembles
- t-SNE embedding that serves as an overview representation of mass spectral similarities based on ms2deepscore
