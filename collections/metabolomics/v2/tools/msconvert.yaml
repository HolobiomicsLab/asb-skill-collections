name: msconvert
slug: msconvert
evidence_spans:
- For MS Data conversion to .mzXML or .mzML file format use msconvert, distributed with the ProteoWizard Project
- AutoTuner is designed to work directly with raw mass spectral data that has been processed by using MSconvert.
- uses msConvert for file conversion to extracted precursor ion chromatogram (PIC)
- imzML Writer relies on MS convert to convert raw instrument data into the open format mzML, requiring a working install.
- imzML Writer relies on MS convert to convert raw instrument data into the open format mzML.
- The conversion tool can use MSConvert, which you need to download and install yourself.
