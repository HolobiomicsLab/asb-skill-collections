name: Spec2Vec
slug: spec2vec
evidence_spans:
- we introduce Spec2Vec, a novel spectral similarity score
- spec2vec (https://github.com/iomega/spec2vec). Both packages are freely available and can be installed via conda
- The underlying code was developed into two Python packages to handle and compare mass spectra, matchms (https://github.com/matchms/matchms) and spec2vec (https://github.com/iomega/spec2vec)
- MEMO is mainly built on `matchms`_ and `spec2vec`_ packages for handling the MS2 spectra
- recently introduced unsupervised Spec2V
- Automated Mass2Motif Annotation Guidance (MAG) with Spec2Vec
