name: mzmine
slug: mzmine
canonical_url: https://github.com/GarrettLab-UF/LipidMatch
evidence_spans:
- mzmine is an open-source software for mass spectrometry data processing
- Getting started with the [Documentation](https://mzmine.github.io/mzmine_documentation/index.html)
- The evaluation helpers rely on peak picking using MZMine parameters defined in `PeakPicking.py`.
- -Inventa takes input directly from MZmine2 or [MZmine 3](http://mzmine.github.io/)
- LipidMatch can be used with various peak picking software (for example MZmine, XCMS, MS-DIAL, and Compound Discoverer)
- Duplicate filtering on MZmine's MGF and CSV files (NEG)
