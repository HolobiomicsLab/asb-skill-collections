evidence_spans:
- pathway to metabolite mappings are obtained from the KEGG resource using the KEGGREST package
- query the KEGG database [59] using the R package KEGGREST [60]
- MetaboDirect can use the assigned molecular formulas to query the KEGG database [59] using the R package KEGGREST [60]
- which retrieves data from the KEGG API using the function ```keggGet``` from the package KEGGREST
