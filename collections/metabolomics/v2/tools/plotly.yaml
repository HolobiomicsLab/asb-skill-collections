name: Plotly
slug: plotly
evidence_spans:
- interactive visualization
- integrates seamlessly with various plotting library backends (matpotlib, bokeh and plotly)
- 'Extension: PLOTLY'
- Multiple backends supported including matplotlib, bokeh, and plotly
- Rendering is typically slower than the BOKEH backend
- These plots can be generated by setting the `backend='ms_plotly'`. PLOTLY plots inferfances well with StreamLit WebApps and allow for interactive 3D plots.
