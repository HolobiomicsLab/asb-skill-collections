- name: RforMassSpectrometry
  doi: 10.5281/zenodo.15180830
  title: 'R for Mass Spectrometry (Bioconductor ecosystem book / package suite)'
  year: 2025
  category: Multifunctional
  repo_url: https://github.com/rformassspectrometry
  status: hold
  wave: community-2026-06
  resource_type: software-ecosystem
  source_issue: 14   # filed alongside #13
  access:
    type: gold-oa
    license: cc-by-4.0
    is_oa: true
    verified_via: zenodo_record_license
    verified_on: '2026-06-23'
  triage:
    proposer: lfnothias
    rationale: >-
      The R for Mass Spectrometry ecosystem (Spectra, MsCoreUtils, MsBackend*,
      MetaboCoreUtils, xcms, …) is the foundational Bioconductor tooling for
      reproducible LC-MS/MS data handling, preprocessing, and annotation. Widely
      used and authoritative for retrieval grounding of R-based workflows.
    decision: accept
    notes: >-
      Software/ecosystem DOIs are accepted as first-class (policy 2026-06-23), so the
      Zenodo book release qualifies. Optionally also anchor to per-package method
      papers (e.g. the Spectra paper) for richer grounding. Author overlap with #14
      (Rainer). OA confirmed (CC-BY-4.0). Ready for maintainer to move to v2 corpus.

