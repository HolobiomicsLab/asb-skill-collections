      to samples.
    claim_type: finding
    speculative: false
    entity_id: dataset_example_expression_matrix
  - claim_text: The exampleExpressionMatrix values are log-scaled and the samples
      are quantile normalized.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: examplePathways is a list of mouse pathways from the reactome.db package.
    claim_type: finding
    speculative: false
    entity_id: tool_reactome_db
  - claim_text: The 5990980_Cell_Cycle pathway had a pctEvar of 1.0525898 and a pval
      of 2.276767e-39 in GESECA analysis.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The 5990979_Cell_Cycle,_Mitotic pathway had a pctEvar of 1.0466758
      and a pval of 3.891185e-39 in GESECA analysis.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The 5991851_Mitotic_Prometaphase pathway had a pctEvar of 0.7485590
      and a pval of 1.409623e-24 in GESECA analysis.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The 5992217_Resolution_of_Sister_Chromatid_Cohesion pathway had a
      pctEvar of 0.7075162 and a pval of 1.265783e-22 in GESECA analysis.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The 5991454_M_Phase pathway had a pctEvar of 0.6020886 and a pval
      of 6.237558e-22 in GESECA analysis.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The collapsePathways function can be used to select only independent
      pathways in fgsea results.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The mapIdsList function is similar to AnnotationDbi::mapIds and can
      be used to convert leading edge to human-readable format.
    claim_type: finding
    speculative: false
    entity_id: map_ids_list_func
  - claim_text: fgsea is parallelized using the BiocParallel package.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: By default the first registered backend returned by bpparam() is used
      in fgsea parallelization.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: fgsea has a reactomePathways function that obtains pathways from Reactome
      for a given set of genes.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The reactomePathways function in fgsea requires the reactome.db package
      to be installed.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: fgsea can load pathways from .gmt files using the gmtPathways function.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The fora function in fgsea performs over-representation analysis based
      enrichment tests using the hypergeometric test.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The fora function requires a foreground set of genes, a background
      set of all robustly detected genes, and some pathways.
    claim_type: finding
    speculative: false
    entity_id: fora_func
  speculative: false
  task_openness: open
  method_alternatives:
  - fgseaMultilevel can be used as an alternative P-value estimation procedure
  substitution_constraints:
  - Gene identifiers must be consistent between expression matrix and pathway list
  - Expression matrix values must be log-scaled and quantile normalized
  - Center parameter must be set to FALSE when using reduced/preprocessed matrices
