narrative:
  tagline: fgsea is an R-package for fast preranked gene set enrichment analysis (GSEA)
    that enables quick and accurate calculation of arbitrarily low GSEA P-values for
    gene set collections. The package implements an adaptive multi-level split Monte-Carlo
    scheme for P-value estimation and includes GESECA for gene set co-regulation analysis
    in multi-conditional data.
  pseudo_abstract: fgsea provides fast and accurate GSEA P-value calculation for gene
    set collections through an adaptive multi-level split Monte-Carlo scheme. The
    package supports preranked GSEA on ranked gene lists (e.g., from example pathways
    and ranks) and includes GESECA, a method for identifying co-regulated gene sets
    in multi-conditional expression data without requiring explicit sample contrasts.
    GESECA calculates gene set scores based on the variance of correlated genes within
    each set and estimates P-values via adaptive multilevel Markov Chain Monte Carlo
    with gene permutations. The package has been demonstrated on diverse data types
    including bulk microarray time-course data (GSE200250 Th2 activation), single-cell
    RNA-seq (GSE116240 atherosclerosis), spatial transcriptomics (10X Visium glioblastoma),
    and high-resolution spatial data (10X Xenium ovarian cancer), supporting both
    full-matrix and PCA-reduced expression inputs.
  research_questions:
  - Can the fgsea package calculate gene set enrichment analysis results on preranked
    gene lists with arbitrarily low P-values using its default parameters?
  - Does fgsea produce consistent enrichment scores and p-values for known pathway
    activations when applied to normalized gene expression data from a time-course
    experiment?
  - Does dimensionality reduction via PCA to 10 dimensions preserve the pathway enrichment
    results (pathway scores and p-values) obtained from geseca() analysis on the full-dimensional
    GSE200250 expression matrix?
  - Does the fgsea package enable accurate and rapid calculation of gene set enrichment
    P-values across arbitrarily low thresholds?
  - How does the adaptive multi-level split Monte-Carlo scheme in fgsea adjust P-value
    precision when the eps parameter is set to zero rather than using a default lower-bound
    threshold?
  methods_summary: "Load fgsea package and bundled example datasets (examplePathways,\
    \ exampleRanks). Execute fgsea() with preranked gene statistics, pathway collection,\
    \ and default P-value estimation bounds (eps=1e-10, minSize=15, maxSize=500).\
    \ Sort results by p-value and extract top upregulated and downregulated pathways.\
    \ Generate enrichment curve visualization for a single pathway using plotEnrichment().\
    \ Create multi-pathway GSEA table heatmap using plotGseaTable() to display running\
    \ enrichment sums and statistical significance across selected pathways. Validation:\
    \ fgsea result table must contain pathways with computed pval, padj, ES, and NES\
    \ fields; enrichment plots must display running sum curves; GSEA table must render\
    \ top 20 pathways (10 up, 10 down) with gseaParam=0.5. References: GSE200250 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE200250);\
    \ GSE116240 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE116240); GSE14308\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE14308) Load GSE200250\
    \ from NCBI GEO and extract Th2 time-course samples. Apply log-transformation\
    \ and quantile normalization using limma. Filter duplicates, invalid identifiers,\
    \ and retain top 12,000 genes by mean expression. Obtain HALLMARK gene sets from\
    \ MSigDB for mouse. Run GESECA with minSize=15, maxSize=500 to score gene set\
    \ coregulation across time points. Validation: confirm that top pathways show\
    \ expected temporal activation (E2F at 24h, hypoxia at 48h) with p-values and\
    \ enrichment scores matching published ranges. References: GSE200250 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE200250);\
    \ GSE116240 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE116240); GSE14308\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE14308) Load GSE200250\
    \ microarray data from GEO and extract Th2 time-course samples Apply log2 transformation\
    \ and quantile normalization to expression matrix Filter genes to top 12,000 by\
    \ mean expression and remove duplicates/invalid identifiers Center gene expression\
    \ matrix rows to zero mean and perform standard PCA extraction Retain first 10\
    \ principal components (feature loadings: genes \xD7 10 PCs) as reduced expression\
    \ matrix Run GESECA on full and reduced matrices with identical parameters (minSize=15,\
    \ maxSize=500, center=FALSE for reduced) Compare pathway p-values between full\
    \ and reduced results via Pearson correlation of log10-transformed p-values Validation:\
    \ confirm log10 p-value correlation \u22650.95 to confirm dimensionality reduction\
    \ preserves pathway scores References: GSE200250 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE200250);\
    \ GSE116240 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE116240); GSE14308\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE14308) Load GSE116240\
    \ Seurat object and annotate cell clusters into macrophage subtypes (Adventitial,\
    \ Intimal non-foamy, Intimal foamy, ISG+). Apply SCTransform normalization with\
    \ 10,000 variable features to stabilize variance and define gene universe. Run\
    \ reverse PCA (npcs=50) on SCTransform-normalized expression to extract feature\
    \ loadings matrix, reducing sample dimensionality while preserving gene-level\
    \ signals. Load KEGG_LEGACY pathways from MSigDB and run GESECA with minSize=5,\
    \ maxSize=500, center=FALSE, eps=1e-100 to compute gene-set co-regulation scores\
    \ and empirical p-values. Generate tSNE/UMAP reduction plots showing pathway scores\
    \ by cell type and verify that KEGG_LEISHMANIA_INFECTION localizes to non-foamy\
    \ intimal macrophages and KEGG_LYSOSOME to foamy intimal macrophages. Validation:\
    \ pathway-cell-type associations are confirmed when pathway score distributions\
    \ show statistically significant separation (visual inspection or Mann-Whitney\
    \ U test, p<0.05) between target and non-target cell types, and signals match\
    \ published biology (Kim et al. findings on inflammatory vs. lysosomal programs).\
    \ References: GSE200250 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE200250);\
    \ GSE116240 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE116240); GSE14308\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE14308) Load example gene\
    \ set collection (examplePathways) and preranked gene statistics (exampleRanks)\
    \ into R environment with reproducible random seed. Execute fgsea function with\
    \ default eps=1e-10 lower bound, recording enrichment scores, raw P-values, adjusted\
    \ P-values, and effect sizes (ES, NES) for all pathways. Re-execute fgsea with\
    \ eps=0 to activate unrestricted adaptive multi-level Monte Carlo P-value refinement\
    \ for the same input data. Construct merged comparison table indexed by pathway,\
    \ computing pairwise differences and log-scale ratios of P-values from both runs.\
    \ Visualize distribution of P-value improvements across pathways and verify ranking\
    \ consistency between methods. Validation: confirm that eps=0 execution completes\
    \ without error, produces valid numeric P-values for all pathways, and demonstrates\
    \ lower (more precise) P-value estimates for top-ranked pathways relative to default\
    \ run. References: GSE200250 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE200250);\
    \ GSE116240 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE116240); GSE14308\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE14308)"
  domain: bioinformatics
  techniques:
  - enrichment-analysis
  - pathway-analysis
  - statistical-analysis
  - false-discovery-rate-correction
  claims:
  - claim_text: fgsea is an R-package for fast preranked gene set enrichment analysis
      (GSEA).
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The fgsea package allows to quickly and accurately calculate arbitrarily
      low GSEA P-values for a collection of gene sets.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: P-value estimation in fgsea is based on an adaptive multi-level split
      Monte-Carlo scheme.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: The fgsea package default lower bound for estimating P-values is eps=1e-10.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: GESECA is a method to identify gene sets that have high gene correlation.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA takes as input a gene expression matrix E where rows and columns
      correspond to genes and samples respectively, and a list of gene sets P.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: By default, GESECA method performs centering for rows of the matrix
      E.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA score does not require an explicit sample annotation or a contrast.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA can be applied to various types of sequencing technologies
      including RNA-seq, single-cell sequencing, and spatial RNA-seq.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA assesses statistical significance for a given gene set by using
      gene permutations.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA uses an adaptive multilevel Markov Chain Monte Carlo scheme
      for P-value estimation.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The first example in the GESECA tutorial considers a time course data
      of Th2 activation from the dataset GSE200250.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: HALLMARK_E2F_TARGETS genes are strongly activated at 24 hours time
      point in Th2 cells.
    claim_type: finding
    speculative: false
    entity_id: pathway_e2f_targets
  - claim_text: HALLMARK_HYPOXIA genes are activated around 48 hours in Th2 cells.
    claim_type: finding
    speculative: false
    entity_id: fgsea_system
  - claim_text: When the expression matrix contains many samples, a PCA-reduced expression
      matrix can be used instead of the full matrix to improve performance.
    claim_type: finding
    speculative: false
  - claim_text: The sample space was reduced from a higher dimension to 10 dimensions
      in one GESECA example.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: GESECA scores and P-values obtained on a reduced matrix are similar
      to those obtained for the full matrix.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The GSE116240 dataset features single cell RNA sequencing of aortic
      CD45+ cells and foam cells from atherosclerotic aorta.
    claim_type: finding
    speculative: false
    entity_id: dataset_gse116240
  - claim_text: Inflammatory pathways such as KEGG_LEISHMANIA_INFECTION are more associated
      with non-foamy intimal macrophages.
    claim_type: finding
    speculative: false
    entity_id: pathway_kegg_leishmania
  - claim_text: KEGG_LYSOSOME pathway is specific to intimal foamy macrophages.
    claim_type: finding
    speculative: false
    entity_id: pathway_kegg_lysosome
  - claim_text: GESECA can be used for gene set enrichment analysis of spatial transcriptomics
      profiling.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: A glioblastoma sample analyzed with GESECA shows a distinct hypoxic
      region defined by HALLMARK_HYPOXIA.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: HALLMARK_INTERFERON_GAMMA_RESPONSE defines a reactive immune region
      in glioblastoma.
    claim_type: finding
    speculative: false
    entity_id: pathway_ifn_gamma
  - claim_text: HALLMARK_OXIDATIVE_PHOSPHORYLATION pathway is more characteristic
