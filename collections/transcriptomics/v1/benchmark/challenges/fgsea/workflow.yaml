    claim_type: finding
    speculative: false
    entity_id: plot_coregulation_image_func
  - claim_text: An R-package for performing GESECA (GEne SEt Co-regulation Analysis)
      is available.
    claim_type: finding
    speculative: false
    entity_id: geseca_system
  - claim_text: The exampleExpressionMatrix is a numeric expression matrix of the
