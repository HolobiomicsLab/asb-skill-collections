  task_openness: closed
  method_alternatives:
  - minimap2 full Smith-Waterman as alternative to selective alignment for validation
  - sparse fixed-k anchors, reference-extended MEMs, or unitig-constrained uni-MEMs
    instead of piscem-rs MEM extraction
  - C++ salmon (legacy) as alternative for reproducibility of older results
  - Dedicated pseudoaligners as alternatives to sketch mode
  substitution_constraints:
  - preMergeChainSubThresh cannot be separately CLI-set in Rust port; uses loss-less
    ref-distance early-break instead of salmon's 0.75 pre-alignment prune
  - cf1-rs cDBG builder does not expose bloom-filter size configuration unlike C++
    salmon
  - salmon 2.0 cannot read C++ (pufferfish) indices and requires index rebuild
  - salmon alevin is removed; users must migrate to alevin-fry ecosystem
