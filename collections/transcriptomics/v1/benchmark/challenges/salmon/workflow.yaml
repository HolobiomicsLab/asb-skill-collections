narrative:
  tagline: Salmon 2.0 is a from-scratch Rust rewrite of the widely-used salmon RNA-seq
    quantification tool, maintaining the same workflow and output formats while achieving
    quantitative parity with the C++ 1.12.0 release on both simulated and real data.
  pseudo_abstract: "This work describes salmon 2.0, a complete Rust port of salmon\
    \ that preserves the familiar index \u2192 quant workflow and downstream-compatible\
    \ output formats. On a byte-identical reference index, salmon 2.0 achieves per-transcript\
    \ Pearson correlations of 0.99854 (NumReads) and 0.99897 (TPM) with C++ salmon\
    \ 1.12.0 on real short-read data (GEUVADIS ERR188044), with per-read mapping agreement\
    \ at 99.83%. After fixing a genuine k-mer-orientation bug in pufferfish's SSHash\
    \ streaming lookup (which affected C++ salmon 1.11.4), both implementations achieve\
    \ 85.55% mapping rate on yeast benchmark data (ERR458493), matching within 1 read\
    \ and reaching 0.99854 NumReads Pearson correlation. The ~0.19% total-count difference\
    \ on byte-identical indices is attributable to default chain pruning thresholds:\
    \ C++ salmon applies orphanChainSubThresh=0.95 and postMergeChainSubThresh=0.9\
    \ before alignment, while salmon 2.0 defaults both to 0.0, accounting for ~80%\
    \ of the 62.8k-read mapping-count gap; matching these thresholds brings the tools\
    \ to 92.038% agreement. The Rust port also documents the writeMappings SAM-output\
    \ mechanism, which requires explicit buffer flushing to prevent record loss when\
    \ the output stream is closed."
  research_questions:
  - How closely do the quantification results (NumReads and TPM) from salmon 2.0 (Rust
    rewrite) agree with salmon 1.12.0 (C++ version) when run in selective-alignment
    mode on the same dataset and index?
  - Does the Rust port of salmon achieve equivalent mapping rates and correlation
    metrics to C++ salmon 1.11.4 after the pufferfish SSHash streaming orientation
    bug is fixed?
  - Does applying C++ salmon 1.12.0's chain score thresholds (orphanChainSubThresh=0.95,
    postMergeChainSubThresh=0.9) to the Rust salmon port on ERR188044 reduce the mapping
    count gap and confirm that ~80% of the discrepancy is attributable to the orphan/post-merge
    pruning default difference?
  - Does the mapping rate and NumReads Pearson correlation remain stable when the
    Rust mapper uses alternative seed representations (sparse fixed-k anchors, reference
    k-mer variants) instead of the default unitig-constrained approach?
  - How does the writeMappings flush bug in SAM output streaming affect record completeness,
    and what is the mechanism by which flushing the ostream buffer before close ensures
    all mapped reads appear in the output file?
  methods_summary: "Prepare a cleaned GRCh38 cDNA FASTA with deterministic non-ACGT\
    \ replacement to ensure byte-identical indices across both salmon versions. Build\
    \ a selective-alignment index using salmon 2.0 (Rust) with default parameters\
    \ (k-mer length, threads, no special decoy handling unless documented). Build\
    \ an identical index using C++ salmon 1.12.0 from the same cleaned FASTA with\
    \ matching parameters. Quantify ERR188044 paired-end reads (36.35M, 76 bp) using\
    \ salmon 2.0 in selective-alignment mode with auto-detect library type (-l A),\
    \ no bias correction, and Rust-default chain-pruning thresholds (orphanChainSubThresh=0.0,\
    \ postMergeChainSubThresh=0.0). Quantify the same reads using C++ salmon 1.12.0\
    \ with identical mapping settings (-l A, no bias) and C++ defaults (orphanChainSubThresh=0.95,\
    \ postMergeChainSubThresh=0.9). Extract NumReads and TPM per transcript from both\
    \ quant.sf files and compute Pearson correlations; compute total assigned NumReads\
    \ difference as (Rust total \u2212 C++ total) / C++ total \xD7 100%. Compare unmapped_names.txt\
    \ files from both runs, extracting only fully-unmapped reads (code 'u'), and compute\
    \ per-read mapping agreement as the fraction of reads on which both tools agree\
    \ (mapped or unmapped). Validation: Pearson correlations for NumReads and TPM\
    \ must both exceed 0.998 (reported 0.99854 and 0.99897); per-read mapping agreement\
    \ must reach \u226599.8% (reported 99.83%); total NumReads difference must stay\
    \ within \xB10.5% (reported \u22120.19%). References: source article (DOI: 10.1038/nmeth.4197);\
    \ ERR458493 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR458493); ERR188044 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR188044)\
    \ Acquire ERR458493 single-end reads and Ensembl R64-1-1 cDNA reference. Build\
    \ salmon index from reference using default parameters. Quantify reads with C++\
    \ salmon 1.11.4 (pre-fix) in selective-alignment mode (-l U, no bias, writeMappings\
    \ enabled), extract mapping rate and quant.sf abundance table. Apply pufferfish\
    \ commit 5dce7f4 (SSHash streaming orientation correction) and re-quantify with\
    \ identical parameters; compare mapping rate and quant.sf to pre-fix run. Quantify\
    \ reads using Rust salmon port with identical parameters; extract mapping rate\
    \ and quant.sf. Compute NumReads and EffectiveLength Pearson correlations between\
    \ C++ post-fix and Rust outputs. Cross-validate strand and locus placement of\
    \ discordant reads (e.g., ERR458493.850) using SAM writeMappings output to confirm\
    \ orientation fix causation. Validation: C++ pre-fix mapping rate = 83.48% \xB1\
    \ 1 read, C++ post-fix = 85.55% \xB1 1 read matching Rust, NumReads Pearson \u2265\
    \ 0.998, EffectiveLength Pearson \u2265 0.999. References: source article (DOI:\
    \ 10.1038/nmeth.4197); ERR458493 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR458493);\
    \ ERR188044 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR188044) Obtain a byte-identical\
    \ reference index (GRCh38 cDNA, 193,759 transcripts) and GEUVADIS ERR188044 paired-end\
    \ reads (36.35M, 76 bp). Execute salmon 2.0 quant on ERR188044 with selective\
    \ alignment enabled, chain-pruning parameters set to C++ salmon 1.12.0 defaults\
    \ (orphanChainSubThresh=0.95, postMergeChainSubThresh=0.9), and no bias correction.\
    \ Extract and tabulate mapping outcomes: total mapped reads, mapping rate (%),\
    \ per-read agreement with C++ baseline, Rust-only and C++-only read counts, NumReads\
    \ and TPM Pearson correlations. Re-align boundary-case reads (those mapped by\
    \ one tool but not the other) using minimap2 full Smith-Waterman to classify each\
    \ as strong/weak/unaligned, assessing the symmetry and genuine-alignment quality\
    \ of the residual disagreement. Validation: Rust mapping rate \u226592.03% (within\
    \ 0.02% of C++ 1.12.0 baseline 92.011%); residual per-read disagreement <20,000\
    \ reads; per-read mapping agreement \u226599.8%; NumReads Pearson \u22650.998.\
    \ References: source article (DOI: 10.1038/nmeth.4197); ERR458493 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR458493);\
    \ ERR188044 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR188044) Load GEUVADIS ERR188044\
    \ (36.35M paired-end 76 bp reads) and byte-identical GRCh38 cDNA reference index\
    \ (193,759 transcripts). Execute salmon 2.0 Rust mapper in selective-alignment\
    \ mode with default seed representation (libType A, no bias, multi-threaded) and\
    \ record mapping rate and NumReads per transcript. Re-run salmon mapper three\
    \ times, each with an alternative seed representation (sparse fixed-k anchors,\
    \ reference-extended MEMs, unitig-constrained uni-MEMs), recording mapping rate\
    \ and per-transcript NumReads. Calculate Pearson correlation coefficient between\
    \ NumReads vectors from each variant and the baseline default. Validation: confirm\
    \ all variants achieve mapping rate within \u22640.01% of baseline and Pearson\
    \ r \u2265 0.99999995 for NumReads, establishing seed granularity was not the\
    \ root cause of prior C++ vs. Rust mapping discrepancies. References: source article\
    \ (DOI: 10.1038/nmeth.4197); ERR458493 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR458493);\
    \ ERR188044 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR188044) Inspect salmon\
    \ C++ source code to locate ostream_sink_mt initialization in QuantOptionsUtils.cpp\
    \ where force_flush is set to false. Modify the sink configuration to enable force_flush\
    \ = true, ensuring all buffered mapping records are written to disk before stream\
    \ closure. Rebuild salmon from the modified source code. Execute salmon index\
    \ on the Ensembl R64-1-1 reference transcriptome. Run salmon quant in selective-alignment\
    \ mode with --writeMappings flag on ERR458493 test reads. Extract the SAM record\
    \ count (grep '^[^@]' output.sam | wc -l) and compare against the NumReads field\
    \ in the generated quant.sf file. Validation: SAM record count must equal the\
    \ reported NumReads in quant.sf, confirming no records were lost to buffer truncation.\
    \ References: source article (DOI: 10.1038/nmeth.4197); ERR458493 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR458493);\
    \ ERR188044 (https://www.ncbi.nlm.nih.gov/sra/?term=ERR188044)"
