narrative:
  tagline: Scanpy is a scalable Python toolkit for analyzing single-cell gene expression
    data, integrating preprocessing, visualization, clustering, trajectory inference,
    and differential expression testing with the anndata data structure.
  pseudo_abstract: Scanpy provides a comprehensive set of computational methods for
    single-cell analysis, including preprocessing functions for normalization and
    quality control, graph-based clustering via the Leiden algorithm, embedding techniques
    such as UMAP and t-SNE, trajectory inference through PAGA, and differential expression
    testing via rank_genes_groups. The toolkit is designed to handle large datasets
    efficiently, demonstrated through reproduction of standard workflows on benchmark
    datasets including PBMC3k and paul15 hematopoiesis data. Testing is performed
    using pytest with Hatch environment configuration, and the implementation leverages
    the anndata data structure for organizing and annotating single-cell observations
    and gene expression matrices.
  research_questions:
  - Does Scanpy successfully execute a complete single-cell analysis workflow including
    preprocessing, clustering, and embedding on standard datasets?
  - Can preprocessing functions in the scanpy pp module operate on Dask-backed AnnData
    objects without eagerly loading the entire expression matrix into memory?
  - Does Scanpy's rank_genes_groups function with Wilcoxon test produce marker gene
    rankings that match expected documentation examples when applied to leiden-clustered
    pbmc3k data?
  - How does the PAGA (Partition-based Graph Abstraction) algorithm construct a connectivity
    matrix from clustered single-cell data, and what is the expected dimensionality
    of the resulting abstraction?
  - Does the Scanpy test suite execute without failures when invoked via the Hatch
    environment using the standard test command?
  methods_summary: "Load pbmc3k dataset as an AnnData object containing ~3,000 cells\
    \ and ~13,000 genes. Apply depth normalization followed by log1p transformation\
    \ to stabilize variance and scale expression values. Select ~2,000 highly variable\
    \ genes to reduce noise and focus on genes with biological signal. Scale gene\
    \ expression to unit variance and compute PCA for dimensionality reduction. Construct\
    \ k-nearest neighbor graph using Euclidean distance in PCA space (n_neighbors=15).\
    \ Detect cell clusters using the Leiden community-detection algorithm on the neighbor\
    \ graph. Embed cells in 2-D space using UMAP for visualization, preserving local\
    \ and global structure. Validation: Verify that adata.obs contains 'leiden' column\
    \ with \u22652 unique cluster labels and adata.obsm contains 'X_umap' with shape\
    \ (n_cells, 2). References: source article (DOI: 10.1186/s13059-017-1382-0) Load\
    \ or construct an AnnData object with Dask-backed expression matrix. Execute a\
    \ pp module function with Dask-compatible parameters. Verify lazy evaluation by\
    \ confirming operation completes without materializing full matrix. Validate AnnData\
    \ structure: obs/var dimensions, metadata integrity, and array type consistency.\
    \ Validation: operation completes successfully with Dask array remaining un-materialized\
    \ and obs/var dimensions matching expected cell and gene counts. References: source\
    \ article (DOI: 10.1186/s13059-017-1382-0) Load pre-processed pbmc3k dataset with\
    \ pre-computed leiden clusters Apply Wilcoxon rank-sum test via tl.rank_genes_groups\
    \ to identify differentially expressed genes per cluster Extract ranked results\
    \ using sc.get.rank_genes_groups_df or access adata.uns Filter and sort by log\
    \ fold-change and adjusted p-value to identify top marker genes Compare against\
    \ known reference marker gene names and score ranges from Scanpy documentation\
    \ Validation: Top marker gene names and p-value/fold-change ranges match documented\
    \ examples References: source article (DOI: 10.1186/s13059-017-1382-0) Load paul15\
    \ dataset into an AnnData object using Scanpy's dataset module. Preprocess by\
    \ computing k-nearest neighbors graph to establish cell\u2013cell connectivity.\
    \ Partition cells into clusters using Leiden algorithm to define cluster-level\
    \ groupings. Apply PAGA to abstract the neighborhood graph into a coarse-grained\
    \ partition-based graph where nodes are clusters and edges represent inter-cluster\
    \ connectivity. Validation: confirm that adata.uns['paga'] key exists, contains\
    \ a 'connectivities' sparse matrix, and matrix dimensions equal (n_unique_clusters,\
    \ n_unique_clusters). References: source article (DOI: 10.1186/s13059-017-1382-0)\
    \ Clone the scverse/scanpy repository locally and navigate to the repository root\
    \ directory. Create and activate the Hatch test environment by invoking `hatch\
    \ test`, which reads hatch.toml and installs dependencies. Execute the full pytest\
    \ test suite, which reads pytest configuration and runs all test modules in scanpy/tests\
    \ with matplotlib plot comparison setup active. Capture and parse the test execution\
    \ output to confirm exit code is 0 and no non-skipped test failures are reported.\
    \ Validation: confirm test run exits with code 0 and the summary line reports\
    \ zero failed tests, matching the CI badge passing state reported by the repository.\
    \ References: source article (DOI: 10.1186/s13059-017-1382-0)"
