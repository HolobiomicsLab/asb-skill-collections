narrative:
  tagline: Limma is an R package for analyzing gene expression data through linear
    models and empirical Bayesian methods, designed to assess differential expression
    across diverse technologies including microarrays, RNA-seq, and proteomics.
  pseudo_abstract: The limma package provides methods for analyzing comparisons between
    many RNA targets simultaneously in arbitrarily complex designed experiments. Empirical
    Bayesian methods estimate hyperparameters of the prior distribution over gene-wise
    variances, enabling computation of moderated t-statistics and B-statistics that
    remain stable even when the number of arrays is small. Linear model and differential
    expression functions apply to a wide variety of gene expression technologies including
    microarrays (single-channel or two-color), quantitative PCR, RNA-seq, and proteomics.
    The package also provides normalization and background correction functions for
    microarrays and similar technologies.
  research_questions:
  - How does limma estimate hyperparameters of the prior distribution over gene-wise
    variances to compute moderated t-statistics and B-statistics?
  - What does the lmFit function in limma produce when applied to a microarray dataset
    with a specified design matrix?
  - Does prepending edgeR's calcNormFactors normalization to the limma voom pipeline
    alter the ranked list of differentially expressed genes compared to the standard
    limma-only workflow?
  methods_summary: 'Load a pre-fitted lmFit object containing gene-wise ordinary least-squares
    estimates and residual variances Apply empirical Bayes estimation to fit a scaled
    inverse-chi-squared prior distribution over gene-wise variances Compute moderated
    t-statistics by shrinking gene variances toward the posterior mean under the fitted
    prior Calculate B-statistics (log-odds of differential expression) from the moderated
    t-statistics and estimated prior degrees of freedom Validation: verify that moderated
    t-statistics show reduced variance and improved power-to-detect compared to ordinary
    t-statistics, particularly for genes with small sample sizes or low initial variance
    estimates References: source article (DOI: 10.1093/nar/gkv007) Load microarray
    expression matrix and sample metadata from a public GEO repository. Construct
    a design matrix encoding experimental groups, conditions, and any batch or covariate
    effects. Apply limma''s lmFit function to fit row-wise linear models across all
    genes using the design matrix. Retrieve the MArrayLM object containing coefficient
    estimates, standard errors, and model diagnostics. Validation: Confirm that the
    MArrayLM object contains a non-empty coefficients matrix with dimensions matching
    the number of genes and design matrix columns, and that all standard error estimates
    are positive and finite. References: source article (DOI: 10.1093/nar/gkv007)
    Load raw RNA-seq read counts and metadata; construct design matrix from experimental
    annotations. Apply edgeR''s calcNormFactors with TMM method to compute library
    size scaling factors accounting for composition bias. Execute voom transformation
    using TMM-normalized library sizes to calculate precision weights for each observation.
    Fit linear models using lmFit, then apply empirical Bayes variance moderation
    with eBayes. Extract top differentially expressed genes and quantify concordance
    with limma-only baseline. Validation: Confirm that TMM-voom and limma-only outputs
    both pass Benjamini-Hochberg FDR correction at threshold 0.05; report overlap
    of significant genes and magnitude of log-fold-change differences between methods.
    References: source article (DOI: 10.1093/nar/gkv007)'
