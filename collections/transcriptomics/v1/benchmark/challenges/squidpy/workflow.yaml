narrative:
  tagline: Squidpy is a Python toolkit for scalable analysis and visualization of
    spatial molecular data, building on scanpy and anndata to provide streamlined
    APIs for spatial statistics, feature extraction, and interactive exploration.
  pseudo_abstract: Squidpy enables comprehensive analysis of spatial single-cell data
    through modular and scalable workflows. The toolkit provides core functionality
    for constructing and analyzing spatial neighbor graphs via spatial_neighbors,
    computing neighborhood enrichment statistics through nhood_enrichment, and detecting
    spatially variable genes using sepal. Image analysis capabilities are supported
    through lazy dask-backed computation in calculate_image_features on the ImageContainer.
    The package integrates with standard AnnData workflows and supports multiple spatial
    omics platforms including Visium, Vizgen, and Nanostring through dedicated reader
    functions. Additionally, Squidpy exposes extensible graph construction mechanisms
    through GraphBuilder and GraphBuilderCSR base classes, enabling custom implementations
    such as approximate nearest-neighbor backends while maintaining compatibility
    with built-in postprocessors and multi-library support.
  research_questions:
  - Does squidpy.gr.spatial_neighbors correctly construct and store a CSR graph in
    an AnnData object with expected keys and structure when applied to a bundled example
    dataset?
  - How does the PynndescentKNNBuilder class implement graph construction by subclassing
    GraphBuilderCSR and integrating pynndescent as its nearest-neighbor backend?
  - Does squidpy's nhood_enrichment function correctly compute and store neighborhood
    enrichment scores in an AnnData object when applied to spatial data with a pre-built
    neighbor graph?
  - Does squidpy.gr.sepal successfully compute spatial statistics and attach gene
    ranking scores to an AnnData object with the expected field names when applied
    to spatial transcriptomics datasets?
  - Does squidpy's im.calculate_image_features function support lazy computation via
    dask, and does it correctly materialize computed features into the AnnData object
    while preserving intermediate computations as dask arrays?
  methods_summary: "Install squidpy package and its dependencies (scanpy, anndata,\
    \ scipy) using pip or environment manager. Load a bundled example dataset from\
    \ squidpy.datasets (e.g., visium or imc) into an AnnData object. Execute squidpy.gr.spatial_neighbors\
    \ on the AnnData object to construct the spatial graph using coordinate data.\
    \ Verify that adjacency and distance matrices are stored as CSR sparse matrices\
    \ in adata.obsp with correct shape, sparsity, and dtype. Validate diagonal properties:\
    \ distance matrix has zero diagonal; adjacency matrix diagonal is set according\
    \ to the set_diag parameter. Validation: confirm that both matrices have identical\
    \ sparsity structure, shape equals (n_obs, n_obs), and the graph is ready for\
    \ downstream spatial analysis. References: source article (DOI: 10.1038/s41592-021-01358-2)\
    \ Install pynndescent and create PynndescentKNNBuilder subclass of GraphBuilderCSR\
    \ with configurable n_neighs parameter. Instantiate NNDescent model on input coordinates\
    \ with Euclidean metric and query for k-nearest neighbors. Flatten k\xD7n_obs\
    \ indices and distances into 1D arrays and construct CSR adjacency matrix (float32)\
    \ and distance matrix (float64) with matching sparsity patterns. Set diagonal\
    \ elements: adj diagonal to 1.0 (if set_diag) or existing value, dst diagonal\
    \ to 0.0. Validation: verify output matrices are CSR format, shapes are (n_obs,\
    \ n_obs), sparsity patterns match, and diagonals are correctly set. References:\
    \ source article (DOI: 10.1038/s41592-021-01358-2) Load Visium example dataset\
    \ containing spatial coordinates and cell-type annotations. Construct spatial\
    \ neighbor graph using radius-based neighborhood detection on spatial coordinates.\
    \ Compute neighborhood enrichment by comparing observed co-occurrence of annotated\
    \ cell types in spatial neighborhoods against shuffled distributions. Store enrichment\
    \ statistics in AnnData.uns dictionary under 'nhood_enrichment' key. Validation:\
    \ verify that the enrichment matrix exists in .uns, has expected dimensions [n_categories,\
    \ n_categories], and contains numeric enrichment scores. References: source article\
    \ (DOI: 10.1038/s41592-021-01358-2) Load a bundled spatial dataset (slideseqv2\
    \ or merfish) via squidpy.datasets into an AnnData container. Execute squidpy.gr.sepal\
    \ on the loaded AnnData object to compute gene-level spatial enrichment scores\
    \ and rankings. Extract and inspect output fields from AnnData .var, .uns, and\
    \ .obsm slots to identify sepal-specific columns and matrices. Validate field\
    \ names, data types, array dimensions, and absence of unexpected NaN/inf values\
    \ against squidpy's expected schema. Validation: Confirm that all sepal output\
    \ fields are present with correct dimensionality and no missing or corrupted values;\
    \ generate a structured verification report. References: source article (DOI:\
    \ 10.1038/s41592-021-01358-2) Load spatial coordinates and image file into squidpy.im.ImageContainer\
    \ and link to AnnData object. Enable dask lazy computation mode in im.calculate_image_features\
    \ to defer actual pixel-level calculations. Extract image features across specified\
    \ scales or layers, storing intermediate results as dask arrays in memory. Explicitly\
    \ collect and materialize dask arrays into AnnData.obsm or AnnData.var slots.\
    \ Validation: Confirm all requested features are present in the output AnnData\
    \ object, intermediate computation arrays remained as dask objects before collection,\
    \ and no data loss occurred during materialization. References: source article\
    \ (DOI: 10.1038/s41592-021-01358-2)"
