    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP will by default filter all SNP-related probes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP will by default filter all multi-hit probes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP will by default filter out all probes located in chromosome
