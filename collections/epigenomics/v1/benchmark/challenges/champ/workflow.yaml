      service from data loading to final gene set enrichment analysis.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: The current latest version of ChAMP is 2.29.1, which supports EPICv2.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP version 2.29.1 must be used along with ChAMPdata version 2.23.1
      or later.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP provides Type-2 probe correction methods including SWAN, Peak
      Based Correction (PBC), and BMIQ.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: BMIQ is the default choice for Type-2 probe correction in ChAMP.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP includes the Functional Normalization function offered by the
      minfi package.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP implements the singular value decomposition (SVD) method for
      assessing batch effects.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP has implemented the ComBat method for correction of multiple
      batch effects.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP provides cell-type heterogeneity adjustment via RefbaseEWAS.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP includes a function for inferring copy-number alterations from
      450k or EPIC data.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: 'ChAMP offers three DMR detection methods: Probe Lasso, Bumphunter,
      and DMRcate.'
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP includes a function to detect Differentially Methylated Blocks.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP incorporates methods that correct for bias caused by unequal
      representation of probes among genes in Gene Set Enrichment Analysis.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP incorporates the FEM package for inferring gene modules in user-specified
      gene networks that exhibit differential methylation between phenotypes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP provides a more comprehensive and complete analysis pipeline
      from reading original data files to final tertiary analysis results compared
      to other available packages.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: ChAMP provides Shiny and Plotly-based WebBrowser interactive analysis
