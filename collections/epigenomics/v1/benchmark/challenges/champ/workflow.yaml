    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: champ.load() cannot perform filtering on beta matrix alone.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: 'ChAMP generates three main plots in quality control: mdsPlot, densityPlot,
      and dendrogram.'
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: QC.GUI() provides five interactive plots for quality control.
    claim_type: finding
    speculative: false
    entity_id: comp_qc_gui
  - claim_text: 'ChAMP provides four methods for Type-2 probe normalization: BMIQ,
      SWAN, PBC, and Functional Normalization.'
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: BMIQ has been updated to version 1.6.
    claim_type: finding
    speculative: false
    entity_id: tool_bmiq
  - claim_text: BMIQ version 1.6 provides better normalization for EPIC array data.
    claim_type: finding
    speculative: false
    entity_id: tool_bmiq
  - claim_text: BMIQ may not converge and provide output for certain samples if the
      methylation distribution deviates markedly from a 3-state beta-mixture distribution.
    claim_type: finding
    speculative: true
    entity_id: tool_bmiq
  - claim_text: ChAMP uses Random Matrix Theory from the isva package to detect numbers
      of latent variables in SVD analysis.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: If more than 20 components are detected in SVD analysis, only the
      top 20 are selected.
    claim_type: finding
    speculative: false
  - claim_text: ComBat logit transforms beta values before adjustment and then computes
      the reverse logit transformation following adjustment.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: champ.DMP() implements the limma package to calculate p-values for
      differential methylation using a linear model.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: champ.DMP() supports numeric variables like age.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: champ.DMP() supports categorical variables which contain more than
      two phenotypes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: For numeric variables, champ.DMP() conducts linear regression on each
      CpG site.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: For categorical variables, champ.DMP() performs contrast comparison
      between each two phenotypes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: 'Three DMR algorithms are implemented in ChAMP: Bumphunter, ProbeLasso,
      and DMRcate.'
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: Bumphunter groups all probes into small clusters, then applies random
      permutation method to estimate candidate DMRs.
    claim_type: finding
    speculative: false
    entity_id: tool_bumphunter
  - claim_text: DMRcate is a data-driven approach that is agnostic to all annotations
      except for chromosomal coordinates.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: champ.DMR() only takes categorical covariates with exactly two phenotypes.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: The ChAMP pipeline can run 200 samples successfully on a computer
      with 8GB of memory.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: The champ.load() function uses the most memory in the ChAMP pipeline.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: Users can conduct nearly all ChAMP analysis even if they are not starting
      from raw .idat files, as long as they have a methylation beta matrix and corresponding
      phenotypes file.
    claim_type: finding
    speculative: false
    entity_id: champ_system
