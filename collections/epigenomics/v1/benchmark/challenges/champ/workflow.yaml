    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: R version 3.3 or above is required to install ChAMP.
    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: Bioconductor version 3.5 is the newest version recommended for ChAMP
