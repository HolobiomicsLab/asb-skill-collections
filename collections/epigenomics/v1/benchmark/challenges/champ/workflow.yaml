    claim_type: finding
    speculative: false
    entity_id: champ_system
  - claim_text: Users must install the latest ChAMPdata package (version 2.8.1) to
      make ChAMP version above 2.8.3 work.
    claim_type: finding
    speculative: false
    entity_id: champ_system
