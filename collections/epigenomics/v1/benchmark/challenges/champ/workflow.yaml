narrative:
  tagline: ChAMP is a comprehensive R package for DNA methylation array analysis on
    Illumina 450K and EPIC platforms, providing an integrated pipeline from raw data
    loading through quality control, normalization, and differential methylation detection
    to gene set enrichment analysis.
  pseudo_abstract: ChAMP implements a complete methylation analysis workflow that
    accepts Illumina methylation data from .idat files or beta-value matrices. The
    package loads 485,512 probes for 450K arrays and 867,531 probes for EPIC arrays
    before quality filtering, then applies successive filtering to remove probes with
    detection p-value > 0.01 and probes with fewer than 3 beads in at least 5% of
    samples. ChAMP provides multiple normalization methods (BMIQ, SWAN, PBC, Functional
    Normalization) to correct for type-I and type-II probe biases, implements SVD
    analysis capping at 20 components when Random Matrix Theory detects more than
    20 latent variables, and supports ComBat batch effect correction. The package
    identifies differentially methylated positions and regions using limma, Bumphunter,
    ProbeLasso, and DMRcate algorithms, detects differentially methylated blocks,
    and performs gene set enrichment analysis with bias correction. Interactive web-based
    GUI functions enable visualization of results. When applied to the EPIC simulation
    dataset, champ.DMR() detects approximately 4700+ differentially methylated regions
    (fewer than the 5000 simulated due to single- or two-CpG regions not meeting DMR
    criteria), and champ.Block() detects no differentially methylated blocks in this
    dataset.
  research_questions:
  - Do champ.load() and champ.import() correctly load the expected numbers of probes
    before filtering for the HumanMethylation450 and EPIC array types?
  - Does champ.filter() applied to the HumanMethylation450 test dataset remove probes
    with detection p-value > 0.01 and probes with fewer than 3 beads in at least 5%
    of samples?
  - When champ.DMR() is applied to the EPIC simulation dataset using bumphunter-based
    detection, how many differentially methylated regions are identified?
  - When champ.Block() is applied to the EPICSimData simulation dataset with arraytype='EPIC',
    are any differentially methylated blocks detected?
  - Does champ.SVD() correctly limit the number of reported principal components to
    a maximum of 20 when Random Matrix Theory detects more than 20 latent components
    in the data?
  methods_summary: "Load HumanMethylation450 test dataset (450K lung tumor data) into\
    \ ChAMP environment using champ.load() function. Extract and record pre-filter\
    \ probe count from loaded 450K object. Load EPICSimData test dataset using champ.load()\
    \ or data() function into ChAMP environment. Extract and record pre-filter probe\
    \ count from loaded EPIC object. Validation: Verify that 450K pre-filter probe\
    \ count equals 485,512 and EPIC pre-filter probe count equals 867,531, confirming\
    \ successful data import and correct array type detection. References: GSE40279\
    \ (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE40279) Load HumanMethylation450\
    \ test dataset (8 samples) into R environment using ChAMP data import functions\
    \ Execute champ.filter() with default parameters on the raw methylation dataset\
    \ Filter probes with detection p-value > 0.01 to remove low-confidence measurements\
    \ Filter probes with fewer than 3 beads in \u22655% of samples to ensure sufficient\
    \ bead replication Validate: Confirm that probe count decreases match expected\
    \ filtering thresholds and that filtered matrix contains only high-quality probes\
    \ References: GSE40279 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE40279)\
    \ Load EPICSimData from ChAMPdata using data() function in R environment Execute\
    \ champ.DMR() on loaded EPIC simulation data with bumphunter algorithm selected\
    \ Parse and tabulate detected DMR results with genomic coordinates and p-values\
    \ Count total number of DMRs in output table Validation: Verify DMR count is within\
    \ expected range of ~4700+, consistent with reported bumphunter simulation benchmark\
    \ References: GSE40279 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE40279)\
    \ Load EPICSimData simulation dataset into R environment Execute champ.Block()\
    \ with arraytype='EPIC' to detect differentially methylated blocks Launch Block.GUI()\
    \ to visualize and inspect block detection results interactively Validation: Confirm\
    \ that zero differentially methylated blocks are detected, matching expected behavior\
    \ for this synthetic dataset References: GSE40279 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE40279)\
    \ Load normalized beta matrix (n \xD7 m: samples \xD7 probes) into R environment.\
    \ Execute champ.SVD() function on the beta matrix to compute singular value decomposition\
    \ and detect latent batch components using Random Matrix Theory. Retrieve the\
    \ number of latent components detected; verify that output is capped at maximum\
    \ 20 components even if RMT identifies more. Validation: Confirm that champ.SVD()\
    \ component count \u2264 20 in all cases where Random Matrix Theory signals detection\
    \ of components. References: GSE40279 (https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE40279)"
  domain: genomics
  techniques:
  - batch-correction
  - differential-abundance-analysis
  - normalization
  - quality-control
  - statistical-analysis
