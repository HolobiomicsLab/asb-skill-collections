narrative:
  tagline: HiC-Pro is an optimized and flexible pipeline for Hi-C data processing
    that automates installation of key dependencies and provides containerized deployment
    options.
  pseudo_abstract: HiC-Pro describes a configurable pipeline architecture for Hi-C
    data processing with integrated dependency management. The pipeline implements
    SAM processing using samtools (>=1.9), which can be automatically installed if
    not detected; requires the iced module for normalization, which must be independently
    installed as it is no longer part of the HiC-Pro source code; and supports an
    installation configuration mechanism where users edit a config-install.txt file
    to specify tool paths. When paths are not explicitly set, the system searches
    for dependencies in the $PATH environment variable before executing the installation
    command. HiC-Pro provides multiple deployment options through conda, Docker, and
    Singularity containers to ease dependency installation.
  research_questions:
  - What post-processing operations does HiC-Pro apply to SAM/BAM files output from
    the alignment stage?
  - How does the ICE normalization algorithm iteratively correct and balance raw Hi-C
    contact matrices using the iced Python module?
  - How does HiC-Pro detect the installation paths of required binary tools (Bowtie2,
    samtools) and generate an environment-specific configuration file during setup?
  - Can a Conda environment be successfully created from an environment specification
    file with all required Python (>3.7) and R dependencies for HiC-Pro, and can tool
    binaries (bowtie2, samtools, iced) be correctly resolved within that environment?
  methods_summary: "Prepare HiC-Pro installation directory and config-install.txt\
    \ template. Set SAMTOOLS_PATH in config-install.txt to the full path of samtools\
    \ binary (>=1.9), or leave empty for automatic PATH-based detection. Execute 'make\
    \ CONFIG_SYS=config-install.txt install' to run dependency checking and validation.\
    \ Validate: Confirm that samtools (>=1.9) is correctly detected and its full path\
    \ is recorded in the generated config-system.txt file. References: source article\
    \ (DOI: 10.1186/s13059-015-0831-x) Verify Python >3.7 interpreter availability\
    \ and accessibility. Obtain iced module source code from the official GitHub repository\
    \ (https://github.com/hiclib/iced). Install iced and declare transitive dependencies\
    \ (numpy \u22651.18.1, scipy \u22651.4.1) via pip or setup.py. Validate iced installation\
    \ by importing the module and querying version and core API functions. Validation:\
    \ confirm iced module is importable, all required dependencies meet version thresholds,\
    \ and no import errors occur on test invocation. References: source article (DOI:\
    \ 10.1186/s13059-015-0831-x) Parse config-install.txt user input to extract explicit\
    \ paths and cluster scheduler preference. Query system PATH using 'which' for\
    \ each binary (bowtie2, samtools, R, Python) where user did not provide explicit\
    \ path. Verify bowtie2 and samtools presence; auto-install either if missing and\
    \ version requirements (samtools >=1.9, Python >3.7) are not met. Collect all\
    \ resolved paths and parameters into a key\u2013value structure conforming to\
    \ the config-system.txt schema. Write the locked, immutable config-system.txt\
    \ file to the installation PREFIX directory. Validation: config-system.txt exists,\
    \ is read-only, and contains non-empty entries for all six required fields (PREFIX,\
    \ BOWTIE2_PATH, SAMTOOLS_PATH, R_PATH, PYTHON_PATH, CLUSTER_SYS). References:\
    \ source article (DOI: 10.1186/s13059-015-0831-x) Install Miniconda package manager\
    \ from official sources. Create Conda environment from HiC-Pro environment.yml\
    \ with specified installation path. Activate the Conda environment to make all\
    \ dependencies available. Verify Python version and import all required Python\
    \ libraries (bx-python, numpy, scipy, pysam, argparse) to confirm correct installation.\
    \ Verify R availability and test loading of required R packages (ggplot2, RColorBrewer,\
    \ grid). Verify tool binaries (bowtie2, samtools >=1.9) are executable and in\
    \ PATH. Independently install and import iced module since it is not part of HiC-Pro\
    \ source. Validation: Generate dependency verification report confirming all tool\
    \ versions meet minimum requirements, all Python and R packages are importable,\
    \ and all binary paths are resolved. References: source article (DOI: 10.1186/s13059-015-0831-x)"
  domain: bioinformatics
