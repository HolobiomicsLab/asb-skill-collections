narrative:
  tagline: MACS3 is a model-based ChIP-Seq peak-calling tool that implements duplicate
    filtering, fragment-length prediction, and local-background normalization to identify
    enriched genomic regions.
  pseudo_abstract: "MACS3 performs ChIP-Seq peak calling through a multi-step pipeline\
    \ beginning with duplicate filtering of aligned reads and prediction of fragment\
    \ length d from ChIP data using cross-correlation analysis. The pipeline then\
    \ generates coverage tracks via pileup, constructs local-background lambda tracks\
    \ from control data at multiple scales (d, 1kb, 10kb, and genome-wide), and compares\
    \ ChIP and control signals using a Poisson model to compute p-value or q-value\
    \ scores at each genomic position. Final peak identification is achieved by applying\
    \ score cutoffs to identify contiguous enriched regions. MACS3 also provides granular\
    \ subcommands\u2014filterdup, predictd, pileup, bdgcmp, bdgopt, and bdgpeakcall\u2014\
    that enable users to execute and customize each analysis step independently, supporting\
    \ both single-end and paired-end sequencing data."
  research_questions:
  - What are the read counts after duplicate filtering and the predicted fragment
    length d when running MACS3 callpeak on CTCF ChIP-Seq data?
  - How does the MACS3 callpeak pipeline decompose into individual subcommands (filterdup,
    predictd, pileup, bdgcmp, bdgopt, bdgpeakcall) that progressively transform ChIP-Seq
    data into peak calls?
  - Does MACS3 callpeak correctly estimate the average insertion length (~253 bp)
    when processing paired-end ChIP-Seq data in the CTCF_PE_ChIP_chr22_50k.bedpe.gz
    file?
  methods_summary: "Filter duplicate reads from ChIP and control samples using macs3\
    \ filterdup with --keep-dup=1 to remove PCR artifacts. Estimate fragment length\
    \ d from filtered ChIP data using macs3 predictd with mfold parameters 5 50. Generate\
    \ multi-scale background models (d, 1 kb, 10 kb, genome-wide) from control pileup\
    \ using macs3 pileup with -B extension and macs3 bdgopt normalization. Combine\
    \ background tracks via maximum operation with macs3 bdgcmp and scale by ChIP-to-control\
    \ read count ratio. Compute base-pair q-values using macs3 bdgcmp qpois comparing\
    \ ChIP pileup against local lambda via local Poisson test. Call narrow peaks with\
    \ macs3 bdgpeakcall using cutoff 1.301 (-log10 q-value 0.05), minimum length 245\
    \ bp, and gap 100 bp. Validation: output narrowPeak file exists with non-zero\
    \ peak count, q-value scores in BedGraph span expected range, and peak intervals\
    \ do not overlap read artifacts. Filter duplicate reads from ChIP and control\
    \ samples to remove redundant reads at identical genomic locations, recording\
    \ final read counts for normalization. Predict the fragment length parameter d\
    \ from filtered ChIP data using autocorrelation-based fragment length estimation.\
    \ Generate ChIP pileup BEDGRAPH by extending reads in the 5\u2032\u21923\u2032\
    \ direction to the predicted fragment length. Build multi-scale local background\
    \ bias tracks from control by computing pileup signals at d, slocal (1 kb), and\
    \ llocal (10 kb) window sizes, then normalizing by the ratio d/window_size. Combine\
    \ background tracks by iteratively computing maximum values across all scales\
    \ and the genome-wide background count. Scale the combined local lambda bias track\
    \ to match the ChIP sample sequencing depth using the ratio of final read counts.\
    \ Apply local Poisson test by comparing ChIP pileup against scaled local lambda\
    \ to generate -log10(q-value) or -log10(p-value) score tracks. Validation: Call\
    \ narrow peaks using bdgpeakcall with user-specified cutoff (e.g., 1.301 for q\u2264\
    0.05), minimum peak length equal to fragment length d, and gap parameter set to\
    \ read length; verify output is in narrowPeak BED format with summit locations.\
    \ Estimate average insertion length (fragment length d) from paired-end read pairs\
    \ using macs3 predictd with -f BEDPE flag. Generate ChIP signal pileup track using\
    \ macs3 pileup with paired-end input (no --extsize needed); pileup automatically\
    \ spans between read pair 5' positions. Build local background noise tracks from\
    \ control data at multiple scales (d, slocal=1kb, llocal=10kb) using macs3 pileup\
    \ with -B option and compute genome-wide background. Normalize and combine background\
    \ tracks using macs3 bdgopt and macs3 bdgcmp to generate maximum local bias (lambda)\
    \ track scaled to match ChIP sequencing depth. Compare ChIP pileup to local lambda\
    \ using macs3 bdgcmp with Poisson model (-m qpois) to generate q-value score track\
    \ at each genomic position. Call narrow peaks by identifying regions exceeding\
    \ a q-value cutoff using macs3 bdgpeakcall with read length (-g) and fragment\
    \ length (-l) parameters; output narrowPeak format with summit coordinates. Validation:\
    \ confirm narrowPeak file exists, contains proper BED format with 5 required columns\
    \ plus summit position, and reported average insertion length from predictd matches\
    \ expected ~253 bp metric."
