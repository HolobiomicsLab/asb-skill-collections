  task_openness: closed
  method_alternatives:
  - finding a tool that's more suited to their data type, as `callpeak` is specifically
    optimized for ChIP-Seq
  - use the -B option for DNAse-Seq data or when cutting site is believed to be centrally
    located
  - skip predictd step if you have more accurate estimate of fragment length
  - bdgpeakcall for narrow peaks or bdgbroadcall for broad marks
  - if you only want to call broader peak and not interested in nested peak structure,
    simply use `bdgpeakcall` with weaker cutoff
  substitution_constraints:
  - bedGraph files from MACS3 are required to use in bdgbroadcall command, as all
    regions on the same chromosome should be continuous
  - for paired-end data in BAM format, must specify -f BAMPE option to get BEDPE format
    output
  - for paired-end data, BAM file for callvar must be sorted and indexed
