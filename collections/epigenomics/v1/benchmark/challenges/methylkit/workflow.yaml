  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: PC1/PC2 scatter plot visualization (PNG or PDF)
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: methylDiff object containing differential methylation test statistics, p-values,
