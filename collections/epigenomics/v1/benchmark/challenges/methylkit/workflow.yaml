    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: The unite function returns a methylBase object for comparative analysis.
    claim_type: finding
    speculative: false
    entity_id: comp_methylBase
  - claim_text: By default, unite produces bases/regions covered in all samples.
    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: The min.per.group option in unite can relax the requirement for coverage
      in all samples.
    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: The getCorrelation function can plot scatter plot and correlation
