  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Percentage overlap summary table showing the proportion of differentially
    methylated bases overlapping promoter, exon, and intron regions, and CpG island
    and shore categories
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
