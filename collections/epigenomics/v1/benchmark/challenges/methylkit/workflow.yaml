    claim_type: finding
    speculative: false
    entity_id: tool_processBismarkAln
  - claim_text: BAM files should be sorted and indexed for use with processBismarkAln.
    claim_type: finding
    speculative: false
    entity_id: tool_processBismarkAln
  - claim_text: Typical percent methylation histograms should have two peaks on both
      ends.
    claim_type: finding
    speculative: false
  - claim_text: In any given cell, any given base is either methylated or not.
    claim_type: finding
    speculative: false
  - claim_text: Experiments suffering from PCR duplication bias will have a secondary
      peak towards the right hand side of the coverage histogram.
    claim_type: finding
    speculative: false
  - claim_text: The unite function merges all samples for base-pair locations covered
      in all samples.
    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: Setting destrand=TRUE in unite will merge reads on both strands of
      a CpG dinucleotide.
    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: The default value of destrand in unite is FALSE.
    claim_type: finding
    speculative: false
    entity_id: tool_unite
  - claim_text: Setting destrand=TRUE in unite is only advised when looking at CpG
