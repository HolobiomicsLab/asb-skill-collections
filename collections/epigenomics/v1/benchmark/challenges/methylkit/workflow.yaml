narrative:
  tagline: methylKit is an R package for DNA methylation analysis and annotation from
    high-throughput bisulfite sequencing data, designed to handle RRBS and target-capture
    methods. It provides functionality for reading methylation calls, comparative
    analysis, differential methylation detection, and annotation of methylated regions.
  pseudo_abstract: "methylKit implements a comprehensive workflow for analyzing DNA\
    \ methylation from bisulfite sequencing experiments. The package reads methylation\
    \ call files into methylRawList objects, performs quality filtering by coverage,\
    \ and merges samples across common sites using the unite() function to produce\
    \ methylBase objects. Differential methylation is calculated via calculateDiffMeth()\
    \ using logistic regression or Fisher's exact test depending on sample size, with\
    \ p-values adjusted to q-values by the SLIM method; getMethylDiff() then extracts\
    \ hyper- and hypo-methylated bases using q-value and percent-methylation-difference\
    \ cutoffs. Sample relationships are visualized through clusterSamples() producing\
    \ dendrograms and PCASamples() generating scree plots and PC1/PC2 scatter plots.\
    \ Annotation integrates with genomation to classify differentially methylated\
    \ regions by overlap with gene features (promoters, exons, introns) and CpG islands\
    \ using annotateWithGeneParts() and annotateWithFeatureFlank(). The package describes\
    \ mechanisms for memory-efficient analysis via methylRawListDB objects that store\
    \ methylation data in tabix-indexed bgzipped files on disk, and for correcting\
    \ overdispersion in logistic regression models by calculating a scaling parameter\
    \ \u03C6 = X\xB2/(N-P) to adjust variance estimates."
  research_questions:
  - When differentially methylated bases are extracted from a methylDiff object using
    getMethylDiff() with q-value < 0.01 and 25% methylation difference thresholds,
    what are the counts of hyper-methylated versus hypo-methylated bases?
  - Does the methylKit package support storing methylation data in tabix-indexed bgzipped
    files on disk, and if so, how are the database path and metadata header configured?
  - How do the four samples (test1, test2, ctrl1, ctrl2) cluster based on methylation
    similarity, and what are their relationships in principal component space?
  - Does overdispersion correction in calculateDiffMeth() with overdispersion='MN'
    produce more stringent statistical tests (higher q-values) compared to uncorrected
    differential methylation analysis?
  - What is the distribution of differentially methylated bases across gene annotation
    features (promoters, exons, introns) and CpG island contexts (CpGi islands vs.
    shores)?
  methods_summary: "Load methylation call files using methRead() to obtain methylRawList\
    \ objects from CpG text files. Merge samples using unite() function to create\
    \ methylBase object containing only universally covered bases. Calculate differential\
    \ methylation using calculateDiffMeth(), which applies Fisher's exact test or\
    \ logistic regression based on sample count. Extract differentially methylated\
    \ bases using getMethylDiff() with q-value < 0.01 and \u226525% methylation difference\
    \ thresholds. Validation: Confirm hyper-methylated and hypo-methylated base counts\
    \ in output methylDiff object match published vignette values. Load example CpG\
    \ methylation files into R using methylKit's methRead() function with dbtype='tabix'\
    \ parameter to enable tabix-backed database storage mode. Inspect the resulting\
    \ methylRawListDB object to confirm the dbpath slot contains file-system paths\
    \ to bgzipped tabix files. Read and parse tabix file headers to extract and verify\
    \ methylKit version metadata. Validation: Confirm dbpath slot is non-empty, all\
    \ referenced tabix files exist on disk with valid .bgz and .tbi extensions, and\
    \ header version field is \u2265 1.13.1. Load the united methylBase object containing\
    \ merged methylation calls across all samples. Apply hierarchical clustering via\
    \ clusterSamples() to compute pairwise sample distances and construct a dendrogram.\
    \ Apply principal component analysis via PCASamples() to identify major axes of\
    \ methylation variation. Generate scree plot showing cumulative and per-component\
    \ variance explained by principal components. Generate PC1 vs. PC2 scatter plot\
    \ to visualize sample grouping in the first two principal components. Validation:\
    \ Dendrogram and PCA plots should visually match the vignette outputs and support\
    \ expected sample stratification based on methylation profiles. Generate synthetic\
    \ methylation data using dataSim() with 6 replicates and 1000 genomic sites to\
    \ create a methylBase object. Run calculateDiffMeth() with overdispersion correction\
    \ method set to MN and statistical test set to Chi-square. Run calculateDiffMeth()\
    \ again without overdispersion correction (baseline) on the same methylBase object.\
    \ Extract and tabulate q-value statistics from both runs and compare distributions.\
    \ Validation: Confirm that average q-values from the MN-corrected run are higher\
    \ than the uncorrected baseline, confirming more stringent multiple-testing control.\
    \ Load the methylDiff object and gene annotation (BED format) into the R environment.\
    \ Execute annotateWithGeneParts() to compute overlaps between differentially methylated\
    \ bases and promoter/exon/intron regions. Execute annotateWithFeatureFlank() to\
    \ classify bases relative to CpG islands and shore regions. Aggregate overlap\
    \ counts for each genomic feature class and compute percentages relative to total\
    \ differentially methylated bases. Validation: Output table percentages sum to\
    \ 100% per category (gene parts and CpG island features are mutually exclusive\
    \ within their respective groups), and counts match vignette reference statistics."
  domain: genomics
  techniques:
  - differential-abundance-analysis
  - statistical-analysis
  claims:
  - claim_text: methylKit is an R package for DNA methylation analysis and annotation
      from high-throughput bisulfite sequencing.
    claim_type: finding
    speculative: false
    entity_id: methylKit_system
  - claim_text: methylKit is designed to deal with sequencing data from RRBS and its
      variants.
    claim_type: finding
    speculative: false
    entity_id: methylKit_system
  - claim_text: DNA methylation in vertebrates typically occurs at CpG dinucleotides.
    claim_type: finding
    speculative: false
  - claim_text: Non-CpG cytosines are methylated in certain tissues such as embryonic
      stem cells.
    claim_type: finding
    speculative: false
  - claim_text: DNA methylation can act as an epigenetic control mechanism for gene
      regulation.
    claim_type: finding
    speculative: false
  - claim_text: Methylation can hinder binding of transcription factors.
    claim_type: finding
    speculative: false
  - claim_text: Methylated bases can be bound by methyl-binding-domain proteins which
      recruit chromatin remodeling factors.
    claim_type: finding
    speculative: false
  - claim_text: Aberrant DNA methylation patterns have been associated with many human
      malignancies.
    claim_type: finding
    speculative: false
  - claim_text: DNA methylation patterns can be used in a predictive manner for disease.
    claim_type: finding
    speculative: false
  - claim_text: In malignant tissues, DNA is either hypo-methylated or hyper-methylated
      compared to normal tissue.
    claim_type: finding
    speculative: false
  - claim_text: Hypo-methylation is traditionally associated with gene transcription
      on regulatory regions.
    claim_type: finding
    speculative: false
  - claim_text: Hyper-methylation is traditionally associated with gene repression.
    claim_type: finding
    speculative: false
  - claim_text: In bisulfite sequencing, bisulfite converts cytosine residues to uracil
      but leaves 5-methylcytosine residues unaffected.
    claim_type: finding
    speculative: false
  - claim_text: The methylation status of a base determined by high-throughput bisulfite
      sequencing is a percentage rather than a binary score.
    claim_type: finding
    speculative: false
  - claim_text: The percentage of methylation determines how many of the bases aligning
      to a given cytosine location have actual C bases in the reads.
    claim_type: finding
    speculative: false
  - claim_text: Sequencing errors contribute to non-binary methylation responses in
      high-throughput sequencing experiments.
    claim_type: finding
    speculative: false
  - claim_text: Incomplete bisulfite conversion contributes to non-binary methylation
      responses.
    claim_type: finding
    speculative: false
  - claim_text: Heterogeneity of samples and heterogeneity of paired chromosomes from
      the same sample contribute to non-binary methylation responses.
    claim_type: finding
    speculative: false
  - claim_text: The methRead function returns a methylRawList object which stores
      methylation information per sample for each covered base.
    claim_type: finding
    speculative: false
    entity_id: comp_methylRawList
  - claim_text: By default methRead requires a minimum coverage of 10 reads per base.
    claim_type: finding
    speculative: false
    entity_id: tool_methRead
  - claim_text: methylKit offers methylDB classes that store methylation information
      in an external bgzipped file indexed by tabix.
    claim_type: finding
    speculative: false
    entity_id: methylKit_system
  - claim_text: methylDB objects include methylRawListDB, methylRawDB, methylBaseDB
      and methylDiffDB classes.
    claim_type: finding
    speculative: false
    entity_id: comp_methylRawListDB
  - claim_text: Most functions in methylKit work with methylDB objects the same way
      as with normal methylKit objects.
    claim_type: finding
    speculative: false
    entity_id: methylKit_system
  - claim_text: Bismark is a popular aligner for bisulfite sequencing reads.
    claim_type: finding
    speculative: false
    entity_id: tool_Bismark
  - claim_text: The processBismarkAln function reads Bismark SAM/BAM files as methylRaw
