    claim_type: finding
    speculative: false
    entity_id: tool_getCorrelation
  - claim_text: The clusterSamples function clusters samples and draws a dendrogram.
    claim_type: finding
    speculative: false
    entity_id: tool_clusterSamples
  - claim_text: Setting plot=FALSE in clusterSamples returns a dendrogram object for
      manipulation.
    claim_type: finding
    speculative: false
    entity_id: tool_clusterSamples
  - claim_text: The PCASamples function can plot a scree plot for importance of components.
    claim_type: finding
    speculative: false
    entity_id: tool_PCASamples
  - claim_text: The assocComp function checks which principal components are statistically
      associated with potential batch effects.
    claim_type: finding
    speculative: false
    entity_id: tool_assocComp
  - claim_text: The assocComp function uses Kruskal-Wallis test or Wilcoxon test for
      categorical attributes.
    claim_type: finding
    speculative: false
    entity_id: tool_assocComp
  - claim_text: The assocComp function uses correlation test for numerical attributes.
    claim_type: finding
    speculative: false
    entity_id: tool_assocComp
  - claim_text: The removeComp function removes principal components from methylation
      data.
    claim_type: finding
    speculative: false
    entity_id: tool_removeComp
  - claim_text: The reconstruct function reconstructs a corrected methylBase object
      from a corrected percent methylation matrix.
    claim_type: finding
    speculative: false
    entity_id: comp_methylBase
  - claim_text: The tileMethylCounts function tiles the genome with windows and summarizes
      methylation information.
    claim_type: finding
    speculative: false
    entity_id: tool_tileMethylCounts
  - claim_text: The calculateDiffMeth function is the main function to calculate differential
      methylation.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: calculateDiffMeth uses Fisher's exact test or logistic regression
      depending on sample size per each set.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: P-values in calculateDiffMeth are adjusted to Q-values using SLIM
      method.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: calculateDiffMeth automatically uses logistic regression when there
      are replicates.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: The pool function can be used to pool replicates for Fisher's exact
      test.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: The getMethylDiff function selects differentially methylated regions
      based on q-value and percent methylation difference cutoffs.
    claim_type: finding
    speculative: false
    entity_id: tool_getMethylDiff
  - claim_text: The overdispersion parameter in logistic regression accounts for variance
      greater than expected by the binomial distribution.
    claim_type: finding
    speculative: false
  - claim_text: Overdispersion correction is not applied by default in calculateDiffMeth.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: Setting overdispersion="MN" applies overdispersion correction in calculateDiffMeth.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: The F-test is automatically used when overdispersion correction is
      applied in calculateDiffMeth.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: Covariates can be included in calculateDiffMeth analysis to separate
      their influence from treatment effect.
    claim_type: finding
    speculative: false
    entity_id: tool_calculateDiffMeth
  - claim_text: methylKit objects can be coerced to GRanges objects from GenomicRanges
      package.
    claim_type: finding
    speculative: false
    entity_id: methylKit_system
  - claim_text: The genomation package can be used to annotate differentially methylated
      regions with gene annotation.
    claim_type: finding
    speculative: false
    entity_id: tool_genomation
  speculative: false
  task_openness: mixed
  method_alternatives:
  - Fisher's exact test can be forced by pooling replicates using pool() function
    when you have multiple samples per group
  - Multiple-cores can be utilized for differential methylation calculation using
    mc.cores option
  - Bismark methylation extractor or methylDackel can be used to extract methylation
    calls instead of processBismarkAln()
  substitution_constraints:
  - methylKit is designed for bisulfite sequencing data (WGBS or RRBS) and not suitable
    for affinity-based methods like MIRA-seq or methylation arrays
instructions: Reproduce the 5-step workflow below. Honor each step's IO contract;
  produce the files listed under 'Final expected outputs'.
