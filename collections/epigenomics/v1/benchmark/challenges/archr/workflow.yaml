narrative:
  tagline: ArchR is an R package for processing and analyzing single-cell ATAC-seq
    data that describes mechanisms for paired scATAC-seq and scRNA-seq multiome analysis,
    trajectory analysis via Monocle3 and Slingshot, and peak matrix export for STREAM
    compatibility.
  pseudo_abstract: 'ArchR describes three analytical mechanisms for single-cell ATAC-seq
    analysis. For paired multiome workflows, the package outlines a four-step process:
    importFeatureMatrix ingests the feature matrix, addGeneExpressionMatrix adds scRNA-seq
    gene expression data, addIterativeLSI performs iterative dimensionality reduction,
    and addCombinedDims produces a joint reduced-dimension embedding integrating both
    modalities. For trajectory analysis, ArchR describes support for two complementary
    approaches through three functions: getMonocleTrajectories and addMonocleTrajectory
    enable Monocle3-based analysis, while addSlingShotTrajectories enables Slingshot-based
    analysis, allowing users to select their preferred trajectory method. Additionally,
    the package describes the exportPeakMatrixForSTREAM function to enable export
    of peak matrices compatible with STREAM.'
  research_questions:
  - How does ArchR ingest paired scRNA-seq gene expression data alongside scATAC-seq
    chromatin accessibility data and produce a unified reduced-dimension embedding
    for joint analysis?
  - How does ArchR conditionally invoke monocle3 versus Slingshot trajectory analysis
    functions based on user selection?
  - What function does ArchR provide to export a peak-by-cell matrix in a format compatible
    with the STREAM trajectory analysis tool?
  methods_summary: "Load scATAC-seq peak matrix and cell metadata into ArchR project\
    \ object via importFeatureMatrix. Append scRNA-seq gene expression matrix to the\
    \ same project via addGeneExpressionMatrix, aligning cells across modalities.\
    \ Compute joint iterative LSI decomposition on accessibility and expression data\
    \ via addIterativeLSI. Generate unified reduced-dimension embedding integrating\
    \ both modalities via addCombinedDims. Validation: Confirm multiome project object\
    \ contains both scATAC-seq and scRNA-seq assays with non-null LSI and combined\
    \ dimension slots. Load a prepared ArchR project with precomputed reduced dimensions\
    \ and cluster assignments. Evaluate the user-specified method selection parameter\
    \ (Monocle3 or Slingshot). Conditionally invoke addMonocleTrajectory or addSlingShotTrajectories\
    \ on the project based on selection. Return the modified ArchR project object\
    \ containing the trajectory embedding result. Validation: confirm the output ArchR\
    \ project object contains trajectory metadata and is compatible with downstream\
    \ ArchR analyses. Load a preprocessed ArchR project containing single-cell ATAC-seq\
    \ data with peak calls and cell annotations. Call the exportPeakMatrixForSTREAM\
    \ function on the ArchR project object to generate a peak-by-cell matrix. Write\
    \ the exported matrix to disk in STREAM-compatible CSV or TSV format (rows=peaks,\
    \ columns=cells). Validation: confirm the output file exists, contains expected\
    \ dimensions (peak count \xD7 cell count), and is readable by STREAM downstream\
    \ analysis tools."
  domain: genomics
  techniques:
  - clustering
  - dimensionality-reduction
