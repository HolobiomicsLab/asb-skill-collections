narrative:
  tagline: chromVAR is an R package that computes bias-corrected deviation scores
    to identify motifs and genomic annotations associated with variability in chromatin
    accessibility across cells or samples from ATAC-seq or DNAse-seq data.
  pseudo_abstract: chromVAR takes aligned fragments from ATAC-seq or DNAse-seq experiments
    and genomic annotations such as motif positions as inputs, then computes for each
    annotation and each cell or sample a bias-corrected deviation in accessibility
    from the expected accessibility based on the average of all cells or samples.
    The package returns a SummarizedExperiment object containing deviation scores
    and Z-scores that quantify motif-associated variability in chromatin accessibility
    after preprocessing with filterSamples, filterPeaks, addGCBias, computeExpectations,
    and getBackgroundPeaks. chromVAR enables ranking and differential analysis of
    motif usage, supports kmer-based annotation approaches for analyzing chromatin
    accessibility variability, and provides functions for analyzing annotation relationships
    such as synergy and correlation within chromatin data. The package was evaluated
    for single-cell clustering, where kmers+PCA represents the best chromVAR variant
    for clustering, though SnapATAC outperforms chromVAR for clustering tasks.
  research_questions:
  - What is the structure and composition of a chromVARDeviations object produced
    by applying the standard chromVAR preprocessing and motif deviation workflow to
    the example_counts dataset?
  - How can motifs be ranked by their variability in chromatin accessibility across
    cell populations, and which motifs show statistically significant differential
    deviation between distinct cell types?
  - Does kmer size (6-mer vs 7-mer) affect the magnitude of chromatin accessibility
    variability scores computed by chromVAR?
  - How do getAnnotationCorrelation and getAnnotationSynergy quantify redundancy and
    synergy between two annotation sets in a chromVARDeviations object?
  - How does SnapATAC's clustering performance compare to chromVAR variants (especially
    kmers+PCA) according to the Huidong Chen et al. benchmark study?
  methods_summary: "Load chromVAR ecosystem packages (chromVAR, motifmatchr, SummarizedExperiment,\
    \ Matrix, BiocParallel) and register serial processing backend. Load bundled example_counts\
    \ dataset and human genome reference; initialize GC bias calculations using addGCBias().\
    \ Filter low-quality samples (min_depth=1500, min_in_peaks=0.15) and reduce peak\
    \ set to non-overlapping regions using filterPeaks(). Retrieve JASPAR motifs and\
    \ match to filtered peaks using motifmatchr to generate peak-motif overlap matrix.\
    \ Compute expected accessibility distribution and generate GC-accessibility-matched\
    \ background peak sets for normalization. Execute computeDeviations() to produce\
    \ bias-corrected accessibility deviations and Z-scores for each motif-sample pair.\
    \ Validation: verify chromVARDeviations object has two assays (deviations, deviationScores),\
    \ row count equals motif count, column count equals sample count, and deviation\
    \ score values fall within expected numeric ranges. Load chromVARDeviations object\
    \ containing bias-corrected motif deviations and z-scores from filtered example\
    \ ATAC-seq data (10 GM + 10 H1 cells). Apply computeVariability to rank motifs\
    \ by standard deviation of z-scores across samples; compute bootstrap confidence\
    \ intervals by resampling cells and test against null hypothesis of variability\
    \ = 1. Visualize ranked motif variability using plotVariability to identify high-variability\
    \ motifs across the cell population. Apply differentialDeviations to test for\
    \ statistically significant differences in bias-corrected deviations between GM\
    \ and H1 cell types using cell-type annotations in colData. Validation: Verify\
    \ that variability rankings match expected high-variability motifs (e.g., cell-type-specific\
    \ TFs) and that differential-deviation p-values are properly computed and < 0.05\
    \ for true positives reported in the paper. Load and preprocess example_counts:\
    \ apply GC bias annotation, filter samples (min_depth=1500, min_in_peaks=0.15),\
    \ and filter peaks to remove overlaps. Generate 6-mer and 7-mer kmer annotation\
    \ matrices by scanning all peak sequences against all possible kmers of each length\
    \ using matchKmers. Compute bias-corrected deviations for each kmer set using\
    \ computeDeviations, which normalizes against background peak sets matched for\
    \ GC content and mean accessibility. Compute variability (standard deviation of\
    \ deviation Z-scores across all samples) for each kmer using computeVariability.\
    \ Extract and compare summary statistics (mean, median, standard deviation) of\
    \ variability distributions for 6-mers vs. 7-mers. Validation: confirm that 7-mer\
    \ variability distribution exhibits higher mean and median scores than 6-mer distribution,\
    \ consistent with the reported finding that 7-mers provide greater sequence specificity\
    \ and superior signal for de novo motif assembly. Load chromVARDeviations object\
    \ containing precomputed bias-corrected deviations and z-scores from prior computeDeviations\
    \ run Subset annotation matrices to isolate the two annotation sets to be compared\
    \ (e.g., JASPAR motifs and kmers) Apply getAnnotationCorrelation to compute pairwise\
    \ Pearson correlations between annotation sets, filtering out low-variability\
    \ and highly correlated annotations first Apply getAnnotationSynergy to compute\
    \ z-scores for variability synergy, comparing observed variance for dual-annotated\
    \ peaks against random subsamples of single-annotation peaks Export correlation\
    \ matrix and synergy score table as named CSV files with annotation identifiers\
    \ and statistical measures Validation: Verify correlation matrix is symmetric\
    \ with values in range [\u22121, 1], synergy z-scores are real-valued, and all\
    \ annotation pairs are named and present in both output tables Locate and download\
    \ the Huidong Chen et al. bioRxiv 739011 preprint and identify the clustering\
    \ benchmark results table or supplementary data file. Extract clustering accuracy\
    \ metrics (NMI, ARI, purity, or equivalent) for chromVAR kmers+PCA, SnapATAC,\
    \ and all other methods across each reported dataset. Construct a method-by-dataset\
    \ matrix where rows are methods (chromVAR kmers+PCA, SnapATAC, others), columns\
    \ are datasets, and cells contain accuracy scores. Calculate summary statistics\
    \ per method: mean accuracy, median accuracy, and per-dataset rank order to quantify\
    \ relative performance. Validation: Verify that the table confirms the two key\
    \ findings: (1) SnapATAC achieves higher mean clustering accuracy than chromVAR\
    \ variants, and (2) chromVAR kmers+PCA achieves higher accuracy than other chromVAR\
    \ configurations (motifs, cis-regions, etc.)."
  domain: genomics
  techniques:
  - dimensionality-reduction
  - clustering
  - enrichment-analysis
  claims:
  - claim_text: chromVAR is an R package for the analysis of sparse chromatin accessibility
      data from single cell or bulk ATAC or DNAse-seq data.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: The chromVAR package aims to identify motifs or other genomic annotations
      associated with variability in chromatin accessibility between individual cells
      or samples.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: Using kmers plus PCA appears to be the best variant of chromVAR for
      clustering.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: SnapATAC outperforms chromVAR for the clustering tasks evaluated in
      the paper.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: chromVAR may be complementary to other methods as a way of annotating
      TF motif usage in cells and clusters.
    claim_type: finding
    speculative: true
    entity_id: chromVAR_system
  - claim_text: The main computeDeviations function from chromVAR requires an object
      storing what peaks overlap what motifs or other annotations.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: chromVAR includes functions for creating annotation objects from a
      set of motifs or kmers.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: chromVAR has a function to make it easy to read in motifs from the
      JASPAR database.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: The companion package chromVARmotifs includes PWMs from a couple different
      sources that can be used with motifmatchr and chromVAR.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: The matchMotifs method returns a SummarizedExperiment with a matrix
      indicating what peaks contain what motifs.
    claim_type: finding
    speculative: false
    entity_id: comp_matchMotifs
  - claim_text: The matchKmers function in chromVAR can be used to make an annotation
      matrix for all kmers of a given length.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: The getCisGroups function annotates peaks based on chromosomal location.
    claim_type: finding
    speculative: false
    entity_id: comp_getCisGroups
  - claim_text: With default parameters, getCisGroups takes the first 25 peaks in
      a chromosome and considers those a group, then moves 10 peaks down and groups
      25 peaks together.
    claim_type: finding
    speculative: false
    entity_id: comp_getCisGroups
  - claim_text: The getAnnotations function can be used to read annotations in BED
      files into the appropriate SummarizedExperiment with matrix.
    claim_type: finding
    speculative: false
    entity_id: tool_SummarizedExperiment
  - claim_text: chromVAR includes a function getCounts for reading in fragment counts
      from bam or bed files.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: With paired end data, fragments are counted once if either or both
      ends of the fragment map to a peak.
    claim_type: finding
    speculative: false
  - claim_text: For single end data, a fragment is counted if the 5 prime end maps
      to the peak.
    claim_type: finding
    speculative: false
  - claim_text: The addGCBias function returns an updated RangedSummarizedExperiment
      with a new rowData column named bias.
    claim_type: finding
    speculative: false
    entity_id: comp_addGCBias
  - claim_text: The filterSamples function filters out samples with insufficient reads
      or a low proportion of reads in peaks.
    claim_type: finding
    speculative: false
    entity_id: comp_filterSamples
  - claim_text: Two parameters used for filtering are min_in_peaks and min_depth.
    claim_type: finding
    speculative: false
  - claim_text: The min_in_peaks parameter is set to 0.5 times the median proportion
      of fragments in peaks when not provided.
    claim_type: finding
    speculative: false
  - claim_text: The min_depth parameter is set to the maximum of 500 or 10 percent
      of the median library size when not provided.
    claim_type: finding
    speculative: false
  - claim_text: The filterPeaks function reduces the peak set to non-overlapping peaks
      keeping the peak with higher counts for peaks that overlap.
    claim_type: finding
    speculative: false
    entity_id: comp_filterPeaks
  - claim_text: 'The computeDeviations function has two required inputs: object and
      annotations.'
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The first argument to computeDeviations should be a RangedSummarizedExperiment
      with a counts assay storing fragment counts per peak per cell or sample.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The second argument to computeDeviations should be a RangedSummarizedExperiment
      with a motif_matches or annotation_matches assay.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The output from computeDeviations is a chromVARDeviations object that
      inherits from RangedSummarizedExperiment.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The deviations are the bias corrected deviations in accessibility.
    claim_type: finding
    speculative: false
  - claim_text: The deviationScores are the Z-scores for each bias corrected deviation.
    claim_type: finding
    speculative: false
  - claim_text: Background peaks are peaks that are similar to a peak in GC content
      and average accessibility.
    claim_type: finding
    speculative: false
  - claim_text: The computeExpectations function calculates the expectation in alternate
      ways.
    claim_type: finding
    speculative: false
    entity_id: comp_computeExpectations
  - claim_text: By default, computeExpectations computes the expected fraction of
      reads per peak as the total fragments per peak across all samples divided by
      total reads in peaks in all samples.
    claim_type: finding
    speculative: false
    entity_id: comp_computeExpectations
  - claim_text: When norm is set to TRUE, the expectation will be the average fraction
      of reads in a peak across the cells.
    claim_type: finding
    speculative: false
  - claim_text: Setting norm to TRUE is not recommended for single cell applications
      as cells with very few reads will have a large impact.
    claim_type: finding
    speculative: false
  - claim_text: chromVAR computes for each annotation and each cell or sample a bias
      corrected deviation in accessibility from the expected accessibility.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: It is recommended to use fixed-width, non-overlapping peaks for chromVAR.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: A peak width of 250 to 500 bp is recommended for chromVAR.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: For single cell data analysis, it can make sense to use peaks derived
      from bulk ATAC or DNAse-seq data.
    claim_type: finding
    speculative: false
  - claim_text: The getPeaks function reads in peaks as a GenomicRanges object.
    claim_type: finding
    speculative: false
  - claim_text: The readNarrowpeaks function reads in peak files, resizes peaks to
      a given size, and removes overlapping peaks.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: The getCounts function returns a chromVARCounts object with a Matrix
      of fragment counts per sample or cell for each peak.
    claim_type: finding
    speculative: false
    entity_id: comp_getCounts
  - claim_text: The Matrix package is used to store sparse matrices if the matrix
      is sparse.
    claim_type: finding
    speculative: false
  - claim_text: If RG tags are not used and each bam file represents an individual
      sample, the by_rg argument should be set to FALSE.
    claim_type: finding
    speculative: false
  - claim_text: The computeVariability function returns a data frame that contains
      the variability (standard deviation of the z scores) across all cell or samples
      for a set of peaks.
    claim_type: finding
    speculative: false
    entity_id: comp_computeVariability
  - claim_text: The computeVariability function returns bootstrap confidence intervals
      for variability by resampling cells or samples.
    claim_type: finding
    speculative: false
    entity_id: comp_computeVariability
  - claim_text: The computeVariability function returns a p-value for the variability
      being greater than the null hypothesis of 1.
    claim_type: finding
    speculative: false
    entity_id: comp_computeVariability
  - claim_text: The deviationsTsne function performs t-SNE and returns a data frame
      with the results.
    claim_type: finding
    speculative: false
    entity_id: comp_deviationsTsne
  - claim_text: With hundreds of cells, a perplexity of around 30 to 50 might make
      sense for t-SNE.
    claim_type: finding
    speculative: false
  - claim_text: The getJasparMotifs function fetches motifs from the JASPAR database.
    claim_type: finding
    speculative: false
    entity_id: dataset_JASPAR
  - claim_text: The getJasparMotifs function by default gets human motifs from JASPAR
      core database.
    claim_type: finding
    speculative: false
    entity_id: dataset_JASPAR
  - claim_text: The default p.cutoff value for motif matching is 0.00005.
    claim_type: finding
    speculative: false
  - claim_text: The computeDeviations function returns a SummarizedExperiment with
      two assays.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The first assay from computeDeviations contains bias corrected deviations
      in accessibility for each set of peaks per cell or sample.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The second assay from computeDeviations gives the deviation Z-score.
    claim_type: finding
    speculative: false
    entity_id: comp_computeDeviations
  - claim_text: The deviationsCovariability function returns a normalized covariance
      between the bias corrected deviations of any pair of annotations.
    claim_type: finding
    speculative: false
    entity_id: comp_deviationsCovariability
  - claim_text: The assembleKmers function builds de novo motifs using the kmer deviation
      results.
    claim_type: finding
    speculative: false
    entity_id: comp_assembleKmers
  - claim_text: 'The pwmDistance function returns a list with three matrices: dist,
      strand, and offset.'
    claim_type: finding
    speculative: false
    entity_id: comp_pwmDistance
  - claim_text: chromVAR includes a function for computing the synergy between pairs
      of annotations or motifs.
    claim_type: finding
    speculative: false
    entity_id: chromVAR_system
  - claim_text: Synergy is defined as the excess variability of chromatin accessibility
      for peaks sharing both motifs compared to a random sub-sample of peaks with
      one motif.
    claim_type: finding
    speculative: false
  speculative: false
  task_openness: open
  method_alternatives:
  - SnapATAC as alternative to chromVAR for clustering
  - readNarrowpeaks can be used instead of getPeaks for narrowpeak format
  - matchKmers can be used instead of matchMotifs for kmer-based annotations
  - getMatrixSet from TFBSTools can be used instead of getJasparMotifs
  substitution_constraints:
  - For Windows, MulticoreParam will not work; use SnowParam instead
