  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Kmer deviation object for 6-mers (RangedSummarizedExperiment with deviations
    and deviationScores assays)
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Kmer deviation object for 7-mers (RangedSummarizedExperiment with deviations
    and deviationScores assays)
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Named correlation matrix (CSV format) with annotation pair identifiers as
    row and column names and Pearson correlation coefficients as values, rows ordered
    by decreasing correlation magnitude
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: 'Synergy score table (CSV format) with columns: annotation_pair, z_score,
    p_value, and variability_excess; one row per unique pairwise combination'
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Structured TSV table with methods as rows, datasets as columns, and clustering
