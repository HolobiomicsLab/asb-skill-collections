  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
- path: Summary statistics (mean, median accuracy per method; per-dataset ranking)
    demonstrating SnapATAC superiority and chromVAR kmers+PCA as best chromVAR variant
  type: file
  tolerance: hash
  numeric_tolerance_pct: 0.05
