narrative:
  tagline: Juicer is a platform for analyzing kilobase resolution Hi-C data that includes
    a pipeline for generating Hi-C maps from fastq raw data files and command line
    tools for feature annotation on Hi-C maps.
  pseudo_abstract: Juicer provides a processing pipeline that generates Hi-C maps
    from fastq raw data files, forming the basis for ENCODE's Hi-C uniform processing
    pipeline. The platform incorporates command line tools designed for feature annotation
    on Hi-C maps, enabling users to annotate features on pre-generated Hi-C map artifacts.
  research_questions:
  - What is the input-to-output operation of the Juicer pipeline when processing Hi-C
    FASTQ data to generate Hi-C maps?
  - Does the ENCODE Hi-C uniform processing pipeline produce output that conforms
    to the reference format and integrity standards expected for Hi-C maps generated
    from FASTQ data?
  - What command line tools does Juicer provide for annotating features on pre-generated
    Hi-C maps?
  methods_summary: 'Select and clone Juicer version (1.6 stable or 2 development)
    from aidenlab/juicer GitHub repository. Obtain raw Hi-C FASTQ dataset from a public
    data repository. Configure Juicer pipeline parameters including reference genome,
    restriction enzyme, and computational resources. Execute Juicer pipeline to process
    raw reads through alignment, contact matrix construction, and normalization. Validation:
    verify that .hic output file is generated with non-empty contact matrices and
    contains required metadata. Obtain Hi-C FASTQ data from a public repository or
    accession identifier. Clone the ENCODE Hi-C uniform processing pipeline from ENCODE-DCC/hic-pipeline.
    Execute the pipeline wrapper to align reads, deduplicate, and bin contacts into
    a kilobase-resolution Hi-C map. Generate and compare checksums of the output .hic
    file against the ENCODE reference. Validation: Output .hic file exists, matches
    expected format, and checksum matches reference checksum. Load pre-generated .hic
    contact map file into Juicer environment Select appropriate feature annotation
    tool from Juicer CLI (loop detection or domain calling) Execute annotation algorithm
    on the contact map Output annotated genomic features with coordinates and/or boundary
    calls Validation: Verify output file exists, contains expected feature records
    (loops with contact pairs or domains with boundary coordinates), and matches format
    specifications of the chosen annotation tool'
