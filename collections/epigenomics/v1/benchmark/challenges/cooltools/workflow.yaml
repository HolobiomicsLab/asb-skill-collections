narrative:
  tagline: cooltools is a Python library that enables flexible and reproducible analysis
    of high-resolution Hi-C datasets stored in the cooler format. It provides computational
    tools for extracting quantitative genomic features with both a paired Python API
    and command-line interface.
  pseudo_abstract: "cooltools leverages the cooler sparse data format to address computational\
    \ challenges in high-resolution Hi-C analysis, including storage, memory efficiency,\
    \ and researcher time. The library provides a suite of tools for standard Hi-C\
    \ analyses\u2014including expected contact frequency calculation (expected_cis,\
    \ expected_trans), eigenvector-based compartment profiling (eigs_cis, eigs_trans),\
    \ insulation scoring and TAD boundary detection (insulation), directionality index\
    \ computation (directionality), averaged signal extraction at genomic features\
    \ (pileup), per-bin sequencing depth quantification (coverage), and random downsampling\
    \ (sample)\u2014with both Python API and command-line interfaces. Additional utilities\
    \ support saddle plot generation via digitization and saddle analysis, dot-caller\
    \ functionality for detecting chromatin loops, and virtual 4C analysis. The library\
    \ also includes mechanisms for adaptive coarse-graining and P(s) smoothing via\
    \ logbin_expected and interpolate_expected, though the API for the smoothing functions\
    \ remains under development. As part of the Open2C ecosystem, cooltools facilitates\
    \ workflows on high-performance computing clusters and in custom analysis notebooks,\
    \ supporting reproducible analysis across diverse Hi-C datasets."
  research_questions:
  - How is the adaptive_coarsegrain function integrated into the cooltools library
    as a utility within the cooltools.lib subpackage?
  - What is the documented output format for the cooltools.coverage function when
    applied to cooler files?
  - What is the format and valid range of insulation scores produced by cooltools.insulation
    when applied to Hi-C cooler files?
  - How does the logbin_expected function in cooltools perform log-binning and smoothing
    on a precomputed expected contact frequency table to produce a log-binned contact
    probability P(s) curve?
  - What are the input and output specifications for the cooltools.saddle function
    when applied to binned eigenvector track data from a cooler Hi-C matrix file?
  methods_summary: 'Clone and set up the cooltools development environment using git
    and editable pip installation mode. Verify adaptive_coarsegrain function is present
    in the cooltools.lib module and can be imported without errors. Execute pytest
    with coverage and style checking extensions (pytest-cov and pytest-flake8) on
    the lib package to verify code correctness and PEP-8 compliance. Build Sphinx
    documentation and confirm adaptive_coarsegrain appears in the automatically generated
    API reference for cooltools.lib. Validation: confirm file_exists for the function
    module, successful import without error, pytest test suite passes with zero style
    violations, and function is listed in generated HTML documentation at docs/_build/html/cooltools.lib.html.
    References: source article (DOI: 10.1101/2022.10.31.514564) Install cooltools
    in editable mode to access the bundled micro-C hESC test dataset and API functions.
    Load the cooler file using the cooler library''s read interface. Invoke cooltools.coverage()
    to compute per-bin sequencing depth, optionally storing cis contact counts. Export
    the coverage track to bedGraph or tabular format with genomic coordinates and
    depth values. Validation: verify output file format matches bedGraph specification
    or tabular schema; confirm row count equals the number of bins in the cooler file;
    check that all coverage values are non-negative numbers. References: source article
    (DOI: 10.1101/2022.10.31.514564) Load a cooler file from a public Hi-C dataset
    repository. Compute per-bin insulation scores using a sliding-window approach
    with a specified genomic window size. Apply Li or Otsu automatic thresholding
    to convert insulation scores into binary boundary annotations. Export insulation
    scores and boundary calls to a tabular format (TSV/CSV) and convert boundary coordinates
    to BED format. Validation: verify output tables contain expected columns, all
    boundary values are boolean, and insulation scores are numeric and within plausible
    ranges. References: source article (DOI: 10.1101/2022.10.31.514564) Load precomputed
    expected_cis table containing per-distance contact frequencies from cooler-derived
    Hi-C data. Partition genomic distances into logarithmically-spaced bins to compress
    the wide dynamic range of the distance axis. Apply smoothing kernel within each
    log bin to reduce noise while preserving large-scale trends in contact decay.
    Aggregate smoothed values per bin and compute bin-level statistics (count, aggregated
    smoothed frequency). Validation: confirm output TSV contains expected columns
    (dist_bp_bin, count_avg_smoothed), row count matches number of log bins, and all
    numeric values are finite and in expected ranges. References: source article (DOI:
    10.1101/2022.10.31.514564) Load cooler file and eigenvector track into memory
    as pandas DataFrames or compatible objects. Apply cooltools.digitize to partition
    eigenvector values into discrete compartment bins using quantile or threshold-based
    classification. Invoke cooltools.saddle with the cooler, digitized track, and
    optional parameters (e.g., min/max distance limits) to aggregate contact frequency
    across compartment pairs. Extract the untransformed saddledata array and compute
    saddle strength as an asymmetry metric. Validation: verify NPZ file contains expected
    array keys and dimensions; confirm saddle strength is a scalar float; check that
    no all-NaN rows or columns corrupt the matrix. References: source article (DOI:
    10.1101/2022.10.31.514564)'
