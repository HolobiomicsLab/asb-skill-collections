id: https://w3id.org/holobiomicslab/asb-schema/skill-bundle/v0.2
name: asb_skill_bundle_v0_2
description: >-
  LinkML schema for SciTask Skill Bundle v0.1 — a versioned, curated description of
  one reusable computational skill identified across multiple papers. Each bundle
  contains a human-readable skill description and 12 structured sidecars.

license: CC-BY-4.0
version: "0.2.0"

prefixes:
  linkml:   https://w3id.org/linkml/
  asb:      https://w3id.org/holobiomicslab/asb-schema/
  asbskill: https://w3id.org/holobiomicslab/asb-skill/
  schema:   http://schema.org/
  dcterms:  http://purl.org/dc/terms/
  pplan:    http://purl.org/net/p-plan#
  prov:     http://www.w3.org/ns/prov#
  EDAM:     http://edamontology.org/
  rocrate:  https://w3id.org/ro/crate#

imports:
  - linkml:types

default_prefix: asb
default_range: string

# ---------------------------------------------------------------------------
# Classes
# ---------------------------------------------------------------------------

classes:

  ToolRecord:
    description: >-
      A tool referenced in a Skill Bundle's tools.json sidecar.
    attributes:
      tool_name:
        description: Tool name (e.g. matchms, scikit-learn)
        range: string
        required: true
        annotations:
          importance: must_have
        close_mappings:
          - EDAM:operation_0004
      canonical_url:
        description: Canonical URL (GitHub, bio.tools, PyPI, etc.)
        range: uri
        annotations:
          importance: should_have
        close_mappings:
          - schema:codeRepository
      version:
        description: Version string used or recommended
        range: string
        annotations:
          importance: should_have
        close_mappings:
          - schema:softwareVersion
      tool_description:
        description: Short description of the tool
        range: string
        annotations:
          importance: should_have
        exact_mappings:
          - schema:description
      edam_topics:
        description: EDAM topic IRIs for this tool
        range: uri
        multivalued: true
        annotations:
          importance: nice_to_have
        exact_mappings:
          - EDAM:topic_0003

  PaperReference:
    description: A reference to a source paper that contributed to this skill bundle.
    attributes:
      doi:
        description: DOI of the paper
        range: string
        annotations:
          importance: should_have
        exact_mappings:
          - schema:identifier
      title:
        description: Title of the paper
        range: string
        annotations:
          importance: must_have
        exact_mappings:
          - schema:name
      relevance:
        description: Short note on the relevance of this paper to the skill
        range: string
        annotations:
          importance: nice_to_have
        close_mappings:
          - schema:description
      task_ids:
        description: task_id values from this paper that surfaced this skill
        range: string
        multivalued: true
        annotations:
          importance: nice_to_have
        close_mappings:
          - dcterms:isPartOf

  MergeAuditRecord:
    description: >-
      Per-merge audit record documenting alias deduplication decisions.
      Surfaces the data ``corpus_artifacts._semantic_dedup`` already records
      so dedup decisions are queryable and citable (IDEAS-E / spec §11).
    attributes:
      alias:
        description: Original skill label before deduplication
        range: string
        required: true
        annotations:
          importance: must_have
        close_mappings:
          - schema:alternateName
      target_slug:
        description: Canonical slug this alias was merged into
        range: string
        required: true
        annotations:
          importance: must_have
        exact_mappings:
          - schema:identifier
      jaccard_score:
        description: Token-set Jaccard similarity score used for the merge decision
        range: float
        annotations:
          importance: should_have
        close_mappings:
          - schema:value
      embedding_cosine:
        description: Cosine similarity of MiniLM embeddings (when semantic dedup ran)
        range: float
        annotations:
          importance: should_have
        close_mappings:
          - schema:value
      edam_match:
        description: True when both records share an EDAM operation IRI
        range: boolean
        annotations:
          importance: nice_to_have
        close_mappings:
          - schema:sameAs
      llm_judge_verdict:
        description: Free-form judgement string from an LLM dedup judge (if used)
        range: string
        annotations:
          importance: nice_to_have
        close_mappings:
          - schema:description
      method:
        description: Deduplication method (e.g. token_set_jaccard, semantic_embed, llm_judge)
        range: string
        annotations:
          importance: should_have
        close_mappings:
          - prov:wasGeneratedBy
      decision:
        description: Final merge decision
        range: MergeDecisionEnum
        required: true
        annotations:
          importance: must_have
        close_mappings:
          - prov:wasInfluencedBy
      decided_at:
        description: When the merge decision was recorded (ISO 8601)
        range: datetime
        annotations:
          importance: should_have
        close_mappings:
          - prov:generatedAtTime
      decided_by:
        description: Agent or person that made the decision (e.g. "agent:dedup", "orcid:0000-...")
        range: string
        annotations:
          importance: should_have
        close_mappings:
          - prov:wasAttributedTo

  SkillBundle:
    description: >-
      A versioned, curated description of one reusable computational skill
      identified across multiple papers. Contains a human-readable skill
      description and 12 structured sidecars (papers, parameters, failure modes,
      tools, environments, links, etc.).
    tree_root: true
    slots:
      - slug
      - skill_name
      - skill_description
      - when_to_use
      - skill_tools
      - edam_topics
      - edam_operation
      - scripts
      - skill_kb_path
      - bundle_dir
      - bundle_version
      - source_task_ids
      - source_papers
      - merged_aliases
      - merged_alias_records

  ASBSkill:
    description: >-
      Collection-time aggregated skill record — the deduplicated, paper-grounded
      scientific competency surfaced by ``corpus_artifacts.collect_skills`` at
      release time. Distinct from ``SkillBundle`` which is the per-capsule
      artifact. Mirrors the Python dataclass at agentic_science_builder.schemas.ASBSkill
      (renamed from SciSkill in Plan 2a / ASB-runtime).
    slots:
      - slug
      - skill_name
      - description
      - when_to_use
      - related_tools
      - source_task_ids
      - source_paper_doi
      - source_paper_title
      - source_papers
      - merged_aliases
      - merged_alias_records
      - edam_operation
      - edam_topics
      - kb_path
      - bundle_dir

  ASBTool:
    description: >-
      Collection-time aggregated tool record — the deduplicated, paper-grounded
      software-tool reference surfaced by ``corpus_artifacts.collect_tools``.
      Mirrors the Python dataclass at agentic_science_builder.schemas.ASBTool
      (renamed from SciTool in Plan 2a / ASB-runtime).
    slots:
      - slug
      - tool_name
      - canonical_url
      - related_skills
      - source_task_ids
      - source_paper_doi
      - source_paper_title
      - evidence_spans
      - version_used
      - install
      - resolution_attempts
      - edam_operation
      - edam_topics
      - bio_tools_id
      - license_tier
      - license
      - license_detection

  ToolAffordance:
    description: >-
      W3C WoT ActionAffordance-aligned mixin (IDEAS-F / spec §15).
      RESERVED for v1 — slot definitions exist but no ASB class consumes
      them yet. When the ecosystem standardises on WoT for executable
      tools, ASBTool (or an ExecutableTool subclass) will inherit from
      this mixin without breaking existing instances.
    mixin: true
    slots:
      - input_schema
      - output_schema
      - precondition
      - effect
      - side_effect_free

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  slug:
    description: >-
      Lowercase, hyphen-separated unique identifier for this skill bundle
      (e.g. spectral-similarity-scoring)
    range: string
    required: true
    annotations:
      importance: must_have
    exact_mappings:
      - schema:identifier

  skill_name:
    description: Human-readable canonical name of the skill
    range: string
    required: true
    annotations:
      importance: must_have
    exact_mappings:
      - schema:name

  skill_description:
    description: Full description of the skill's purpose and scope
    range: string
    annotations:
      importance: must_have
    exact_mappings:
      - schema:description

  when_to_use:
    description: Guidance on when and how to apply this skill
    range: string
    annotations:
      importance: should_have
    close_mappings:
      - pplan:Plan

  skill_tools:
    description: Tool records for tools associated with this skill
    range: ToolRecord
    multivalued: true
    annotations:
      importance: must_have
    close_mappings:
      - EDAM:operation_0004

  edam_topics:
    description: EDAM topic IRIs for this skill (e.g. http://edamontology.org/topic_3172)
    range: uri
    multivalued: true
    annotations:
      importance: should_have
    exact_mappings:
      - EDAM:topic_0003

  edam_operation:
    description: Primary EDAM operation IRI for this skill (e.g. http://edamontology.org/operation_3799)
    range: uri
    annotations:
      importance: should_have
    exact_mappings:
      - EDAM:operation_0004

  scripts:
    description: >-
      Paths to embedded script chunks from linked GitHub repositories
      (line-range copies, not full clones)
    range: string
    multivalued: true
    annotations:
      importance: nice_to_have
    exact_mappings:
      - prov:atLocation

  skill_kb_path:
    description: Relative path to the skill's knowledge base entry file (e.g. docs/skill_name.md)
    range: string
    annotations:
      importance: nice_to_have
    exact_mappings:
      - prov:atLocation

  bundle_dir:
    description: Absolute path to the offline skill knowledge base bundle directory
    range: string
    annotations:
      importance: nice_to_have
    exact_mappings:
      - prov:atLocation

  bundle_version:
    description: Version of this skill bundle (e.g. 0.1.0)
    range: string
    required: true
    annotations:
      importance: must_have
    close_mappings:
      - schema:version

  source_task_ids:
    description: task_id values of the SciTask Cards from which this skill was extracted
    range: string
    multivalued: true
    annotations:
      importance: should_have
    close_mappings:
      - dcterms:isPartOf

  source_papers:
    description: Structured references to papers that contributed to this bundle
    range: PaperReference
    multivalued: true
    annotations:
      importance: should_have
    close_mappings:
      - dcterms:source

  merged_aliases:
    description: Original labels of skills merged into this canonical entry
    range: string
    multivalued: true
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:alternateName

  merged_alias_records:
    description: Per-merge audit records documenting alias deduplication decisions
    range: MergeAuditRecord
    multivalued: true
    annotations:
      importance: nice_to_have
    close_mappings:
      - prov:wasGeneratedBy

  description:
    description: >-
      Retrieval-key description for an ASBSkill. Discipline-constrained
      (IDEAS-D / spec §5): 50–300 chars, leads with "Use when …", no marketing
      tokens. The CI gate in asb-skill-collections additionally enforces the
      banned-token list at release time.
    range: string
    required: true
    minimum_value: 50
    maximum_value: 300
    pattern: "^[Uu]se when .+"
    annotations:
      importance: must_have
      banned_tokens:
        - revolutionary
        - cutting-edge
        - best-in-class
        - powerful
        - amazing
        - state-of-the-art
        - groundbreaking
    exact_mappings:
      - schema:description

  related_tools:
    description: Canonical URLs / slugs of tools used by this skill
    range: string
    multivalued: true
    annotations:
      importance: should_have
    close_mappings:
      - EDAM:operation_0004

  source_paper_doi:
    description: Primary source paper DOI (flat field, complements source_papers[])
    range: string
    annotations:
      importance: should_have
    exact_mappings:
      - schema:identifier

  source_paper_title:
    description: Primary source paper title (flat field, complements source_papers[])
    range: string
    annotations:
      importance: nice_to_have
    exact_mappings:
      - schema:name

  kb_path:
    description: Relative path to the skill's knowledge-base entry file
    range: string
    annotations:
      importance: nice_to_have
    exact_mappings:
      - prov:atLocation

  tool_name:
    description: Tool name (mirrors ToolRecord.tool_name; used by ASBTool)
    range: string
    required: true
    annotations:
      importance: must_have
    close_mappings:
      - schema:name

  canonical_url:
    description: Canonical URL for the tool (GitHub, bio.tools, PyPI, etc.)
    range: uri
    annotations:
      importance: should_have
    close_mappings:
      - schema:codeRepository

  related_skills:
    description: Slugs of ASBSkill records that reference this tool
    range: string
    multivalued: true
    annotations:
      importance: should_have
    close_mappings:
      - dcterms:isPartOf

  evidence_spans:
    description: Verbatim quotes from source papers anchoring this tool reference
    range: string
    multivalued: true
    annotations:
      importance: should_have
    close_mappings:
      - prov:wasDerivedFrom

  version_used:
    description: Version string actually used in the source paper(s)
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:softwareVersion

  install:
    description: Install metadata dict (conda / pip / docker / etc.) produced by tool_resolver
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:installUrl

  resolution_attempts:
    description: Audit list of resolver attempts (each entry a dict; serialized as JSON)
    range: string
    multivalued: true
    annotations:
      importance: nice_to_have
    close_mappings:
      - prov:wasGeneratedBy

  bio_tools_id:
    description: >-
      bio.tools identifier for this tool (IDEAS-G). Reserved slot for the
      future bio.tools federation work; not populated in v1.
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:identifier

  license_tier:
    description: >-
      Consumer-facing license tier for this tool, rolled up most-restrictively
      across its source papers/repos (open / noncommercial / restricted). The
      same value carried in tools_index.json; propagated into tools/<slug>.yaml
      by scripts/enrich_tool_yaml.py.
    range: LicenseTierEnum
    annotations:
      importance: should_have
    close_mappings:
      - schema:license

  license:
    description: >-
      Detected SPDX-ish license identifier for the tool's primary repo
      (e.g. MIT, GPL-2.0, CC-BY-NC-4.0); null when undetected.
    range: string
    annotations:
      importance: nice_to_have
    exact_mappings:
      - schema:license

  license_detection:
    description: >-
      How the license was detected (e.g. github-api, readme-llm, none) — audit
      trail for the license_tier rollup.
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - prov:wasGeneratedBy

  input_schema:
    description: JSON Schema describing the tool's input payload (WoT ActionAffordance.input)
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:potentialAction

  output_schema:
    description: JSON Schema describing the tool's output payload (WoT ActionAffordance.output)
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:potentialAction

  precondition:
    description: Free-form precondition (e.g. "requires CUDA 12.x") — WoT-style affordance hint
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - prov:wasInfluencedBy

  effect:
    description: Free-form effect description for downstream agents
    range: string
    annotations:
      importance: nice_to_have
    close_mappings:
      - prov:generated

  side_effect_free:
    description: True when invoking the tool has no observable side effects (pure function)
    range: boolean
    annotations:
      importance: nice_to_have
    close_mappings:
      - schema:propertyID

enums:
  MergeDecisionEnum:
    description: Possible outcomes recorded by a MergeAuditRecord
    permissible_values:
      auto_merge:
        description: Auto-merged above the auto threshold
      manual_merge:
        description: Manually merged by a curator
      kept_separate:
        description: Reviewed and explicitly kept as distinct entries
      needs_review:
        description: Pending human review

  LicenseTierEnum:
    description: >-
      Consumer-facing license tier, orthogonal to open-access status. Governs
      acknowledgement / link-only handling for tools and skills.
    permissible_values:
      open:
        description: Permissive / open license — freely reusable
      noncommercial:
        description: Noncommercial-only license (e.g. CC-BY-NC) — requires acknowledgement
      restricted:
        description: Restricted or undetected license — link-only, conservative default
