# verify-coi.yml — Runs on PRs that touch review attestations.
# For every reviewer / paper-DOI pair in the PR diff, queries OpenAlex
# to verify or refute the reviewer's declared `is_coauthor` flag, and
# enforces co-reviewer requirement when COI is detected.
#
# Spec ref: §9.3 (Curator & community model — COI / self-review handling)
# Driver: scripts/check_coi.py

name: Verify COI

on:
  pull_request:
    paths:
      - 'collections/**/reviews/*.yaml'
      - 'collections/**/reviews/*.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-coi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml httpx

      - name: Identify review files changed in this PR
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$base" "$head" \
            | grep -E '^collections/.+/reviews/.+\.ya?ml$' \
            > /tmp/changed_reviews.txt || true
          echo "count=$(wc -l < /tmp/changed_reviews.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat /tmp/changed_reviews.txt

      - name: Verify each review attestation
        if: steps.changed.outputs.count != '0'
        id: verify
        run: |
          set -euo pipefail
          mkdir -p /tmp/coi-reports
          status_ok=true
          report=""
          while IFS= read -r review_file; do
            [ -z "$review_file" ] && continue
            orcid=$(python -c "import yaml,sys; d=yaml.safe_load(open('$review_file')); print(d['reviewer']['orcid'])")
            doi=$(python -c "import yaml,sys; d=yaml.safe_load(open('$review_file')); print(d['paper']['doi'])")
            declared=$(python -c "import yaml,sys; d=yaml.safe_load(open('$review_file')); print(str(d.get('is_coauthor', False)).lower())")
            co_reviewer=$(python -c "import yaml,sys; d=yaml.safe_load(open('$review_file')); cr=d.get('co_reviewer'); print('present' if cr else 'absent')")

            out="/tmp/coi-reports/$(basename "$review_file" .yaml).json"
            python scripts/check_coi.py --orcid "$orcid" --doi "$doi" --output "$out"

            detected=$(python -c "import json; d=json.load(open('$out')); print(str(d['is_coauthor']).lower())")
            pos=$(python -c "import json; d=json.load(open('$out')); print(d.get('author_position','none'))")

            line="| \`$review_file\` | $detected | $declared | $pos | $co_reviewer |"
            report="${report}${line}\n"

            # Enforce: declared == detected
            if [ "$declared" != "$detected" ]; then
              echo "::error file=$review_file::Declared is_coauthor=$declared but OpenAlex says $detected"
              status_ok=false
            fi
            # Enforce: when COI true, co_reviewer must be present
            if [ "$detected" = "true" ] && [ "$co_reviewer" != "present" ]; then
              echo "::error file=$review_file::is_coauthor=true but no co_reviewer block (spec §9.3 requires non-coauthor co-sign)"
              status_ok=false
            fi
          done < /tmp/changed_reviews.txt

          # Pass through to PR comment step
          {
            echo "report<<EOF"
            echo -e "| file | detected_coauthor | declared | author_position | co_reviewer |"
            echo -e "|---|---|---|---|---|"
            echo -e "$report"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          $status_ok

      - name: Post PR comment with COI report
        if: always() && steps.changed.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.verify.outputs.report }}`;
            const status = "${{ job.status }}";
            const heading = status === "success"
              ? "### ✅ COI verification passed"
              : "### ❌ COI verification failed (see annotations above)";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${heading}\n\n${report}\n\nDriver: \`scripts/check_coi.py\` · Spec §9.3`
            });
