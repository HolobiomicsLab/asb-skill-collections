# release.yml — triggered on tags matching <collection-slug>-v<N>
# Steps:
#   1. Validate the tagged collection passes all CI gates
#   2. Call regen_catalogue.py and commit the updated catalogue.jsonld
#   3. Upload the collection directory to Zenodo (fail-soft if ZENODO_TOKEN missing)
#   4. Update CITATION.cff with the minted DOI
#   5. Trigger mirror-to-hf.yml via workflow_dispatch
name: Release

on:
  push:
    tags:
      - "*-v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)run, e.g. metabolomics-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # On manual dispatch, check out the requested tag's content.
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract collection slug and version from tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          # Tag format: <slug>-v<release-version>  e.g. metabolomics-v0.1.0
          SLUG="${TAG%-v*}"
          # The release/tag version (e.g. 0.1.0) is independent of the on-disk
          # collection directory version (collections/<slug>/v<N>). Resolve the
          # actual collection dir = highest v<N> for this slug.
          COLL_VERSION="$(ls -d collections/${SLUG}/v* 2>/dev/null | sed 's#.*/v##' | sort -n | tail -1)"
          if [ -z "${COLL_VERSION}" ]; then
            echo "::error::no collection dir found under collections/${SLUG}/v*"; exit 1
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "version=${COLL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=${TAG} -> slug=${SLUG} collection dir v${COLL_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run CI validation gates
        run: |
          python -m pytest tests/ -v
          echo "All CI gates passed"

      - name: Regenerate catalogue.jsonld
        run: |
          python scripts/regen_catalogue.py --repo-root . --output catalogue.jsonld
          echo "catalogue.jsonld regenerated"

      - name: Commit updated catalogue.jsonld (fail-soft)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalogue.jsonld
          if git diff --cached --quiet; then
            echo "No catalogue changes to commit"
          else
            git commit -m "chore: regen catalogue.jsonld for ${{ steps.tag.outputs.tag }}"
            # The release runs from a detached tag commit; main may be ahead, so a
            # direct push is often non-fast-forward. Best-effort only — never fail
            # the release over the catalogue (it is regenerated/maintained on main
            # separately). Rebase onto current main, then try once.
            git fetch origin main || true
            if git push origin "HEAD:main" 2>/dev/null; then
              echo "catalogue.jsonld pushed to main"
            else
              echo "::notice::catalogue push skipped (non-fast-forward from tag commit); regenerate on main separately"
            fi
          fi

      - name: Upload to Zenodo (fail-soft if token missing)
        id: zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_PUBLISH: ${{ vars.ZENODO_PUBLISH }}
          COLLECTION_SLUG: ${{ steps.tag.outputs.slug }}
          COLLECTION_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          if [ -z "${ZENODO_TOKEN}" ]; then
            echo "ZENODO_TOKEN not set — skipping Zenodo upload"
            echo "doi=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PYEOF'
          import json, os, pathlib, requests, sys, zipfile, tempfile

          token = os.environ["ZENODO_TOKEN"]
          slug = os.environ["COLLECTION_SLUG"]
          version = os.environ["COLLECTION_VERSION"]
          collection_dir = pathlib.Path("collections") / slug / f"v{version}"

          if not collection_dir.exists():
            print(f"Collection dir not found: {collection_dir}", file=sys.stderr)
            sys.exit(1)

          headers = {"Authorization": f"Bearer {token}"}
          base_url = "https://zenodo.org/api"

          # Create a new deposition
          resp = requests.post(f"{base_url}/deposit/depositions",
              json={}, headers=headers, timeout=30)
          resp.raise_for_status()
          dep = resp.json()
          dep_id = dep["id"]
          bucket_url = dep["links"]["bucket"]
          print(f"Created Zenodo deposition {dep_id}")

          # Zip the collection directory
          with tempfile.NamedTemporaryFile(suffix=".zip", delete=False) as tf:
            zip_path = tf.name
          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
            for f in sorted(collection_dir.rglob("*")):
              if f.is_file():
                zf.write(f, f.relative_to(collection_dir.parent.parent))

          # Upload zip
          with open(zip_path, "rb") as fh:
            upload_resp = requests.put(
              f"{bucket_url}/{slug}-v{version}.zip",
              data=fh,
              headers=headers,
              timeout=120,
            )
            upload_resp.raise_for_status()
          print(f"Uploaded {slug}-v{version}.zip")

          # ---- Metadata: prefer a checked-in .zenodo.json, else derive from CITATION.cff ----
          zj = collection_dir / ".zenodo.json"
          if zj.exists():
            metadata = json.loads(zj.read_text())
            print(f"Using metadata from {zj}")
          else:
            import yaml
            citation_path = collection_dir / "CITATION.cff"
            title = f"ASB Skill Collection: {slug} v{version}"
            creators = [{"name": "Holobiomics Lab"}]
            if citation_path.exists():
              cff = yaml.safe_load(citation_path.read_text())
              title = cff.get("title", title)
              creators = []
              for a in cff.get("authors", []):
                if not a:
                  continue
                if a.get("name"):                       # entity author
                  c = {"name": a["name"]}
                else:                                    # person author
                  c = {"name": f"{a.get('family-names','')}, {a.get('given-names','')}".strip(", ")}
                if a.get("orcid"):
                  c["orcid"] = a["orcid"].rsplit("/", 1)[-1]
                creators.append(c)
            metadata = {
              "title": title,
              "upload_type": "dataset",
              "description": f"ASB Skill Collection release: {slug} (collection v{version}).",
              "creators": creators,
              "keywords": ["scientific-agents", "agent-skills", slug, "asb"],
              "license": "cc-by-4.0",
              "access_right": "open",
              "version": os.environ.get("GITHUB_REF_NAME", f"{slug}-v{version}"),
            }

          meta_resp = requests.put(
            f"{base_url}/deposit/depositions/{dep_id}",
            json={"metadata": metadata},
            headers={"Content-Type": "application/json", **headers},
            timeout=30,
          )
          meta_resp.raise_for_status()

          # DRAFT ONLY — do NOT publish. The deposition stays private/editable in
          # Zenodo until a maintainer reviews and clicks Publish (or sets
          # ZENODO_PUBLISH=true to opt in). This keeps the release "not public yet".
          edit_url = dep["links"].get("html", f"https://zenodo.org/deposit/{dep_id}")
          if os.environ.get("ZENODO_PUBLISH", "").lower() == "true":
            pub_resp = requests.post(
              f"{base_url}/deposit/depositions/{dep_id}/actions/publish",
              headers=headers, timeout=30)
            pub_resp.raise_for_status()
            doi = pub_resp.json().get("doi", "")
            print(f"Published. DOI: {doi}")
          else:
            doi = ""
            print(f"Draft created (NOT published). Review & publish here: {edit_url}")
            print(f"Draft deposition id: {dep_id}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as gho:
            gho.write(f"doi={doi}\n")
            gho.write(f"draft_id={dep_id}\n")
          PYEOF

      - name: Update CITATION.cff with minted DOI
        if: steps.zenodo.outputs.doi != ''
        env:
          DOI: ${{ steps.zenodo.outputs.doi }}
          COLLECTION_SLUG: ${{ steps.tag.outputs.slug }}
          COLLECTION_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python - <<'PYEOF'
          import os, pathlib, re

          doi = os.environ["DOI"]
          slug = os.environ["COLLECTION_SLUG"]
          version = os.environ["COLLECTION_VERSION"]

          # Update root CITATION.cff if it exists
          root_cff = pathlib.Path("CITATION.cff")
          if root_cff.exists():
            text = root_cff.read_text()
            text = re.sub(r'^(doi:\s*).*$', f'doi: {doi}', text, flags=re.MULTILINE)
            root_cff.write_text(text)
            print(f"Updated root CITATION.cff with doi: {doi}")

          # Update collection-level CITATION.cff
          col_cff = pathlib.Path("collections") / slug / f"v{version}" / "CITATION.cff"
          if col_cff.exists():
            text = col_cff.read_text()
            text = re.sub(r'^(doi:\s*).*$', f'doi: {doi}', text, flags=re.MULTILINE)
            col_cff.write_text(text)
            print(f"Updated collection CITATION.cff with doi: {doi}")
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff "collections/${{ steps.tag.outputs.slug }}/v${{ steps.tag.outputs.version }}/CITATION.cff" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No CITATION.cff changes"
          else
            git commit -m "chore: update CITATION.cff with Zenodo DOI ${{ steps.zenodo.outputs.doi }}"
            git push origin HEAD:main
          fi

      - name: Trigger mirror-to-hf.yml
        # Gated OFF by default — the HuggingFace mirror is not live yet. Set the
        # repo variable ENABLE_HF_MIRROR=true to opt in.
        if: vars.ENABLE_HF_MIRROR == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'mirror-to-hf.yml',
              ref: 'main',
              inputs: {
                collection_slug: '${{ steps.tag.outputs.slug }}',
                collection_version: '${{ steps.tag.outputs.version }}'
              }
            });
            console.log('Triggered mirror-to-hf.yml for ${{ steps.tag.outputs.tag }}');
