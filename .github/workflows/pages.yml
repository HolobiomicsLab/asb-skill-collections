# pages.yml — deploy docs-site/ to GitHub Pages on push to main.
name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "catalogue.jsonld"
      - "leaderboard/**"
      # Also rebuild when collection content changes — the search index
      # walks corpus.yaml + skills + tools, so any of these can shift its
      # contents and the deployed site should reflect them.
      - "collections/**/corpus.yaml"
      - "collections/**/skills/**/SKILL.md"
      - "collections/**/tools/*.yaml"
      - "staged-collections/**/corpus.yaml"
      - "staged-collections/**/skills/**/SKILL.md"
      - "staged-collections/**/tools/*.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install indexer deps
        run: pip install pyyaml

      - name: Regenerate search index
        run: |
          python docs-site/build_search_index.py
          # Sanity check — index must exist and be non-trivial.
          test -s docs-site/search_index.json
          ls -lh docs-site/search_index.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs-site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
